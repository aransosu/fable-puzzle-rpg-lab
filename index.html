  const perCell = Math.max(1, Math.min(3 + tier, Math.floor(FX_MAX_SHARDS / Math.max(1, cellCount)))); // v0.33: 기본 파편 +1 (총량 상한은 그대로 — 다량 동시 터짐은 자동 감축)
  const nodes = [];
  const frag = document.createDocumentFragment();
  for(const g of groups){
    const color = TYPE_COLORS[g.type] || '#fff';
    let cx = 0, cy = 0, n = 0;
    const pts = []; // v0.18B: 폭발 가루 출발점 풀 (그룹 셀 좌표)
    for(const i of g.cells){
      const el = document.querySelector('.cell[data-i="'+i+'"]');
      if(!el) continue;
      const r = el.getBoundingClientRect();
      const x = r.left + r.width/2 - wrapR.left;
      const y = r.top + r.height/2 - wrapR.top;
      cx += x; cy += y; n++;
      pts.push([x, y]);
      // ① 셀 중심 속성색 섬광
      const fl = document.createElement('div');
      fl.className = 'fxFlash';
      fl.style.left = x+'px'; fl.style.top = y+'px';
      fl.style.setProperty('--fc', color);
      frag.appendChild(fl); nodes.push(fl);
      // ② 보석 파편: 무작위 방향/크기/초기각 — 연쇄일수록 멀리 (v0.17: 단면 하이라이트)
      for(let s=0; s<perCell; s++){
        const sh = document.createElement('div');
        sh.className = 'fxShard';
        const ang = Math.random()*Math.PI*2;
        const dist = (18 + Math.random()*15) * (1 + tier*0.3); // v0.33: 방출 반경 소폭 상향
        const sz = (4 + Math.random()*3.5).toFixed(1); // v0.18: 4~7.5px — 마나석 조각감 강화
        sh.style.left = x+'px'; sh.style.top = y+'px';
        sh.style.width = sz+'px'; sh.style.height = sz+'px';
        sh.style.setProperty('--fc', color);
        sh.style.setProperty('--r0', Math.floor(Math.random()*90)+'deg');
        sh.style.setProperty('--hop', ((SHARD_HOP*0.7 + Math.random()*SHARD_HOP*0.7)*FAKE_3D_DEPTH).toFixed(1)+'px'); // 위로 튀는 높이
        sh.style.setProperty('--dx', (Math.cos(ang)*dist)+'px');
        sh.style.setProperty('--dy', (Math.sin(ang)*dist)+'px');
        frag.appendChild(sh); nodes.push(sh);
      }
    }
    if(n > 0){
      cx /= n; cy /= n;
      // ③ 그룹 중심 확산 링: 연쇄 단계로 반경 강화
      const ring = document.createElement('div');
      ring.className = 'fxRing';
      ring.style.left = cx+'px'; ring.style.top = cy+'px';
      ring.style.setProperty('--fc', color);
      ring.style.setProperty('--fs', (3.0 + tier*1.2).toFixed(2)); // v0.33: 충격파 복구 + 반경 상향
      frag.appendChild(ring); nodes.push(ring);
      // ④ 에너지 발자취는 spawnTrailFX(전역 레이어)가 담당 (v0.17: 보드 경계를 넘어 영웅까지)
      // ⑤ v0.18B 폭발 가루: 팡 순간 그룹 셀들에서 사방으로 촤악 — 짧고 즉발 (.32s)
      //    역할 분리: 이 가루는 "깨져 나온 마력", 영웅에게 가는 건 spawnTrailFX의 전달 가루
      const sCount = Math.max(3, Math.min(4 + tier*BURST_DUST_PER_TIER,
                              Math.floor(BURST_DUST_MAX / Math.max(1, groups.length))));
      for(let k=0; k<sCount; k++){
        const [px,py] = pts[Math.floor(Math.random()*pts.length)];
        const sd = document.createElement('div');
        sd.className = 'fxScatter';
        const ang = Math.random()*Math.PI*2;
        const dist = (18 + Math.random()*16) * (1 + tier*0.2);
        sd.style.left = px+'px'; sd.style.top = py+'px';
        sd.style.setProperty('--fc', color);
        sd.style.setProperty('--sx', (Math.cos(ang)*dist).toFixed(1)+'px');
        sd.style.setProperty('--sy', (Math.sin(ang)*dist).toFixed(1)+'px');
        const z = (3 + Math.random()*2.5).toFixed(1);
        sd.style.width = z+'px'; sd.style.height = z+'px';
        frag.appendChild(sd); nodes.push(sd);
      }
    }
  }
  layer.appendChild(frag);
  // 이번 호출분만 제거 (다음 연쇄 FX와 간섭 없음) — DOM 누적 방지
  setTimeout(()=>{ nodes.forEach(nd=>nd.remove()); }, FX_LIFE_MS);
}

/* ── v0.17: 에너지 발자취 — "요정가루가 해당 영웅에게 스르륵" (FABLE_TASK_017 B항목)
   fxWisp(v0.15.5)의 후계: 보드 안에서 잘리던 잔상을 #trailLayer(앱 전역)로 옮겨
   터진 그룹 중심에서 해당 계열 영웅 아바타까지 실제로 도달시킨다.
   원칙: 입자 총량 상한 / transform·opacity만 / 수명 후 전부 제거 / 큐·수치 무관 */
const TRAIL_FLY_MS   = 560; // 가루 비행 시간 (도착 반짝임 타이밍 기준) — 총량/증가량은 DUST_MAX/DUST_PER_CHAIN

function spawnTrailFX(groups, chain){
  const layer = $('#trailLayer');
  if(!layer) return;
  const appR = $('#app').getBoundingClientRect();
  const tier = Math.min(chain, 3);
  // 그룹당 가루 수: 연쇄가 높을수록 풍성(DUST_PER_CHAIN), 다중 그룹이면 자동 감축 (총량 ≤ DUST_MAX)
  const per = Math.max(2, Math.min(Math.round(3 + tier*DUST_PER_CHAIN), Math.floor(DUST_MAX / Math.max(1, groups.length))));
  const nodes = [];
  const frag = document.createDocumentFragment();
  for(const g of groups){
    const gType = g.type;
    const down = isFallen(gType); // v0.19: 받을 영웅이 쓰러짐 — 가루는 가다가 꺼진다
    const color = down
      ? 'color-mix(in srgb, '+(TYPE_COLORS[gType]||'#fff')+' 38%, #6e6880)' // 흐린 속성색
      : (TYPE_COLORS[gType] || '#fff');
    const hero = heroChipEl(gType);
    if(!hero) continue;
    // 출발점: 그룹 중심 (#app 좌표 — 셀 삭제 전 호출이 전제)
    let sx = 0, sy = 0, n = 0;
    for(const i of g.cells){
      const el = document.querySelector('.cell[data-i="'+i+'"]');
      if(!el) continue;
      const r = el.getBoundingClientRect();
      sx += r.left + r.width/2 - appR.left;
      sy += r.top + r.height/2 - appR.top;
      n++;
    }
    if(!n) continue;
    sx /= n; sy /= n;
    const [hx, hy0] = centerOf(hero);
    const hy = hy0 - 14; // 도착점: 영웅 머리께
    const sparkEvery = tier >= 3 ? 2 : tier === 2 ? 3 : 4; // v0.29: 연쇄가 클수록 강한 별 비율↑ (1/4→1/3→1/2)
    for(let k=0; k<per; k++){
      const d = document.createElement('div');
      d.className = down ? 'fxDust dying'
                  : (k % sparkEvery === 0 ? 'fxDust spark' : 'fxDust');
      // v0.18: 종점은 영웅 정중앙 정밀 — 흩어진 가루가 도착 직전 한 점으로 모여드는 흡인 (산포는 경유점이 담당)
      // v0.31: 쓰러진 영웅 — "이동하다 실패"가 아니라 처음부터 받아줄 대상이 없다.
      //   가루는 영웅으로 향하지 않고 매치 자리에서 작게 터져(위로 살짝) 주변으로 낮게 흩어지며 산화
      let tx, ty, mxv, myv;
      if(down){
        d.dataset.fxMode = 'oxidize'; // 비전달형 마커 (테스트/디버그)
        const ang = Math.random()*Math.PI*2;
        mxv = Math.cos(ang)*(7 + Math.random()*9);   // 작은 터짐의 경유점
        myv = -(7 + Math.random()*9);                //   — 위로 살짝 떴다가
        tx  = Math.cos(ang)*(13 + Math.random()*15); // 제자리 주변으로
        ty  = 4 + Math.random()*8;                   //   낮게 가라앉는 종점 (+키프레임 18px 침강)
      } else {
        tx = hx - sx;
        ty = hy - sy;
        const L = Math.hypot(tx, ty) || 1;
        // 경유점: 직선 절반 + 수직 흔들림 — 가루마다 다른 곡선으로 "스르륵"
        const sway = (Math.random()*30 - 15) * (1 + tier*0.12);
        mxv = tx*0.5 + (-ty/L)*sway;
        myv = ty*0.5 + ( tx/L)*sway;
      }
      d.style.left = (sx + Math.random()*16 - 8) + 'px';
      d.style.top  = (sy + Math.random()*10 - 5) + 'px';
      d.style.setProperty('--fc', color);
      d.style.setProperty('--mx', mxv.toFixed(1)+'px');
      d.style.setProperty('--my', myv.toFixed(1)+'px');
      d.style.setProperty('--tx', tx.toFixed(1)+'px');
      d.style.setProperty('--ty', ty.toFixed(1)+'px');
      if(down) d.style.setProperty('--sx', (Math.random()*36 - 18).toFixed(1)+'px'); // v0.29: 갈 곳 잃은 산포
      const sz = (5 + Math.random()*3.5).toFixed(1); // v0.18: 5~8.5px — 가루 밀도/존재감 강화
      d.style.width = sz+'px'; d.style.height = sz+'px';
      d.style.animationDelay = (40 + Math.floor(Math.random()*130))+'ms'; // v0.33: 팡(응축~방출) 직후 출발 — "터졌다 → 힘이 나왔다" 순서
      frag.appendChild(d); nodes.push(d);
    }
    // 도착: 별 십자 반짝임 + 영웅 짧은 흡수 바운스 (재렌더 대비 — 도착 시점에 칩을 다시 조회)
    // v0.19: 쓰러진 영웅은 도착 반짝임/gainPop 미발생 — "힘을 보냈지만 받아낼 수 없다"
    if(!down) setTimeout(()=>{
      const chip = heroChipEl(gType);
      if(!chip || isFallen(gType)) return; // 비행 중 쓰러진 경우도 흡수 안 함
      spawnAbsorb(chip, color, (1 + tier*0.22) * ABSORB_POP_STRENGTH); // v0.29: 연쇄 도착감 상향 (.12→.22)
      if(tier >= 3) setTimeout(()=>{ // v0.29: 대연쇄 — 흰빛 2차 잔광 (도착의 여운)
        const c2 = heroChipEl(gType);
        if(c2 && !isFallen(gType)) spawnAbsorb(c2, '#fff', 0.8 * ABSORB_POP_STRENGTH);
      }, 110);
      if(!chip.classList.contains('down')){
        chip.classList.add('gain');
        setTimeout(()=>chip.classList.remove('gain'), 270);
      }
    }, TRAIL_FLY_MS);
  }
  layer.appendChild(frag);
  setTimeout(()=>{ nodes.forEach(nd=>nd.remove()); }, 1100); // v0.29: 산화 연장(.82s)+지연(140ms) 수명 커버
}

// 도착/회복 반짝임: 대상 위 4방 별 십자 (속성색)
function spawnAbsorb(el, color, scale){
  const layer = $('#trailLayer');
  if(!layer || !el) return;
  const [x,y] = centerOf(el);
  const a = document.createElement('div');
  a.className = 'fxAbsorb';
  a.style.left = x+'px'; a.style.top = (y-14)+'px';
  a.style.setProperty('--fc', color);
  a.style.setProperty('--as', (scale||1).toFixed(2));
  layer.appendChild(a);
  setTimeout(()=>a.remove(), 340);
}

// 타격 스파크: 명중 지점의 짧은 십자 섬광 (D항목 — 모든 타격 공통, big=강공/필살)
function spawnImpact(el, color, big){
  const layer = $('#trailLayer');
  if(!layer || !el) return;
  const [x,y] = centerOf(el);
  const a = document.createElement('div');
  a.className = 'fxImpact';
  a.style.left = x+'px'; a.style.top = y+'px';
  a.style.setProperty('--fc', color || '#fff');
  a.style.setProperty('--is', big ? '1.7' : '1');
  layer.appendChild(a);
  setTimeout(()=>a.remove(), 240);
}

/* ── 행동선: 하단 영웅 → 퍼즐판 침범 → 상단 적 ── */
// 영웅 칩 참조: 블록 타입 ID → PARTY 내 위치로 변환 (편성 유연화 대응)
function heroChipEl(typeId){
  const pos = FORMATION_ORDER.indexOf(typeId); // v0.30: 표시 순서 = 진형 순서
  return pos >= 0 ? ($('#heroes').children[pos] || null) : null;
}

// 요소 중심 좌표 (#app 기준 px)
function centerOf(el){
  const a = $('#app').getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return [r.left + r.width/2 - a.left, r.top + r.height/2 - a.top];
}

// SVG 행동선: 짧게 그려졌다 사라진다. 레이어는 pointer-events:none
// v0.17: 계열별 행동선 튜닝 — opts {dashed,width,bend,duration,alpha}
// 문법 불변: 실선=타격, 점선=조준/예고. bend=0이면 기존과 동일한 직선.
// 구 시그니처 호환: 4번째 인자가 true면 {dashed:true}로 해석 (궁수 점선)
function drawLine(fromEl, toEl, color, opts){
  const o = (opts===true) ? {dashed:true} : (opts || {});
  const fx = $('#fxLayer');
  if(!fromEl || !toEl) return;
  // 연쇄 폭주 시 행동선 과밀 방지: 최대 10개 유지
  while(fx.children.length >= 10) fx.removeChild(fx.firstChild);
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const [x1,y1] = centerOf(fromEl);
  const [x2,y2] = centerOf(toEl);
  const dx = x2-x1, dy = y2-y1, len0 = Math.hypot(dx,dy) || 1;
  const bend = o.bend || 0; // 수직 방향 곡률 (+/-로 휘는 방향)
  const cx = (x1+x2)/2 + (-dy/len0)*bend;
  const cy = (y1+y2)/2 + ( dx/len0)*bend;
  const ln = document.createElementNS('http://www.w3.org/2000/svg','path');
  ln.setAttribute('d','M'+x1.toFixed(1)+','+y1.toFixed(1)
                  +' Q'+cx.toFixed(1)+','+cy.toFixed(1)
                  +' ' +x2.toFixed(1)+','+y2.toFixed(1));
  ln.setAttribute('fill','none');
  ln.setAttribute('stroke',color);
  ln.setAttribute('stroke-width', o.width || 3);
  ln.setAttribute('stroke-linecap','round');
  const alpha = (o.alpha != null) ? o.alpha : 0.85;
  ln.setAttribute('opacity', alpha);
  fx.appendChild(ln);
  const len = ln.getTotalLength ? ln.getTotalLength() : len0;
  if(o.dashed){
    ln.setAttribute('stroke-dasharray','7 6'); // 점선: 조준/관통 문법
  }else{
    ln.setAttribute('stroke-dasharray', len);
    ln.setAttribute('stroke-dashoffset', len);
    ln.animate([{strokeDashoffset:len},{strokeDashoffset:0}],
               {duration:o.duration || 200, fill:'forwards'});
  }
  // v0.31: 생명주기 연장 — "누가 누구에게"가 읽힐 시간 (전투 텀이 있는 실시간이므로 가능).
  // 기본 잔류 420ms 후 페이드. 과밀은 위 children 10개 상한이 차단, pointer-events 영향 없음(svg 레이어)
  const linger = (o.linger != null) ? o.linger : 420;
  ln.animate([{opacity:alpha},{opacity:0}], {duration:280, delay:linger, fill:'forwards'});
  setTimeout(()=>ln.remove(), linger + 320);
}

// 방패 병사: 파티를 감싸는 보호 링 펄스
function drawGuardRing(){
  const fx = $('#fxLayer');
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const a = app.getBoundingClientRect();
  const p = $('#partyArea').getBoundingClientRect();
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', p.left-a.left-3); rect.setAttribute('y', p.top-a.top-3);
  rect.setAttribute('width', p.width+6); rect.setAttribute('height', p.height+6);
  rect.setAttribute('rx','12');
  rect.setAttribute('fill','none');
  rect.setAttribute('stroke','#ffd97a');
  rect.setAttribute('stroke-width','2.5');
  fx.appendChild(rect);
  rect.animate([{opacity:1, strokeWidth:'2.5'},{opacity:0, strokeWidth:'5'}], {duration:550, fill:'forwards'});
  setTimeout(()=>rect.remove(), 580);
  // v0.17: 안쪽 방패석 남청 2차 펄스 — "막아준다"의 두께감 (120ms 시차)
  setTimeout(()=>{
    const r2 = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r2.setAttribute('x', p.left-a.left+1); r2.setAttribute('y', p.top-a.top+1);
    r2.setAttribute('width', p.width-2); r2.setAttribute('height', p.height-2);
    r2.setAttribute('rx','10'); r2.setAttribute('fill','none');
    r2.setAttribute('stroke', TYPE_COLORS[3]); r2.setAttribute('stroke-width','2');
    fx.appendChild(r2);
    r2.animate([{opacity:.9, strokeWidth:'2'},{opacity:0, strokeWidth:'4'}], {duration:450, fill:'forwards'});
    setTimeout(()=>r2.remove(), 480);
  }, 120);
}

// 마법사 원형 파동: 적 진영 중앙에서 원형 충격파가 확산 (직선 행동선과 구별되는 연출)
function drawWave(){
  const fx = $('#fxLayer');
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const a = app.getBoundingClientRect();
  const e = $('#enemyArea').getBoundingClientRect();
  const cx = e.left - a.left + e.width/2;
  const cy = e.top - a.top + e.height/2;
  // 발사선: 마법사 → 적 진영 중앙 (짧게)
  drawLine(heroChipEl(1), $('#enemyArea'), '#b88aff'); // v0.15.5: 마나 별빛
  // 확산 원 2겹: 채움 + 테두리
  for(let k=0; k<2; k++){
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', 18);
    c.setAttribute('fill', k===0 ? 'rgba(170,120,255,.28)' : 'none'); // v0.15.5: 마나 파동
    c.setAttribute('stroke', '#b88aff');
    c.setAttribute('stroke-width', k===0 ? 1.5 : 3.5);
    c.style.transformBox = 'fill-box';
    c.style.transformOrigin = 'center';
    fx.appendChild(c);
    c.animate(
      [{transform:'scale(.25)', opacity:1},{transform:'scale('+(9+k*2)+')', opacity:0}], // v0.11: 확대된 진영 커버
      {duration:520 + k*90, easing:'ease-out', fill:'forwards'}
    );
    setTimeout(()=>c.remove(), 650 + k*90);
  }
}

/* ══ 행동선 문법 (v0.12) ══
   기본 공격선  = drawStrikeLine : 직선/완만한 곡선 — 빠르고 명확
   점선 행동선  = drawAimLine    : 예고/조준/집중 — 느린 맥동, 피해 없음
   번개형      = drawBoltLine   : 특수 스킬 전용 (마왕의 균열 등) — 지그재그 ══ */

/* ── 기본 공격선: 완만한 2차 곡선 (스킬처럼 보이지 않는 단순 타격) ── */
function drawStrikeLine(fromEl, toEl, color, blocked){
  const fx = $('#fxLayer');
  if(!fromEl || !toEl) return;
  while(fx.children.length >= 12) fx.removeChild(fx.firstChild);
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const [x1,y1] = centerOf(fromEl);
  const [x2,y2] = centerOf(toEl);
  // 중점에서 수직 방향으로 살짝 휘는 고정 곡률 (지터 없음 — 기본기다움)
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const dx = x2-x1, dy = y2-y1;
  const len0 = Math.hypot(dx,dy) || 1;
  const bend = 14; // 완만한 곡률
  const cx = mx + (-dy/len0)*bend;
  const cy = my + (dx/len0)*bend;
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', 'M'+x1.toFixed(1)+','+y1.toFixed(1)+' Q'+cx.toFixed(1)+','+cy.toFixed(1)+' '+x2.toFixed(1)+','+y2.toFixed(1));
  p.setAttribute('fill','none');

function drawBoltLine(fromEl, toEl, blocked){
  const fx = $('#fxLayer');

  while(fx.children.length >= 10) fx.removeChild(fx.firstChild);

  for(let k=1; k<=2; k++){
    const t = k/3;

/* ====================== 보드 생성/판정 ====================== */
function genBoard(){
  const b = new Array(ROWS*COLS);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let t;
      do{
        t = rand(TYPES.length);
      }while(
        (c>=2 && b[idx(r,c-1)]===t && b[idx(r,c-2)]===t) ||
        (r>=2 && b[idx(r-1,c)]===t && b[idx(r-2,c)]===t)
      );
      b[idx(r,c)] = t;
    }
  }
  return b;
}

// 매치된 셀 집합 반환
function findMatchedCells(b){
  const matched = new Set();
  // 가로
  for(let r=0;r<ROWS;r++){
    let run=1;
    for(let c=1;c<=COLS;c++){
      if(c<COLS && b[idx(r,c)]!==null && b[idx(r,c)]===b[idx(r,c-1)]) run++;
      else{
        if(run>=3 && b[idx(r,c-1)]!==null)
          for(let k=c-run;k<c;k++) matched.add(idx(r,k));
        run=1;
      }
    }
  }
  // 세로
  for(let c=0;c<COLS;c++){
    let run=1;
    for(let r=1;r<=ROWS;r++){
      if(r<ROWS && b[idx(r,c)]!==null && b[idx(r,c)]===b[idx(r-1,c)]) run++;
      else{
        if(run>=3 && b[idx(r-1,c)]!==null)
          for(let k=r-run;k<r;k++) matched.add(idx(k,c));
        run=1;
      }
    }
  }
  return matched;
}

// 매치 셀을 같은 타입 연결 그룹으로 묶기 (L/T 모양은 하나의 그룹 = 더 큰 행동)
function findMatchGroups(b){
  const matched = findMatchedCells(b);
  const visited = new Set();
  const groups = [];
  for(const start of matched){
    if(visited.has(start)) continue;
    const type = b[start];
    const cells = [];
    const stack = [start];
    visited.add(start);
    while(stack.length){
      const i = stack.pop();
      cells.push(i);
      const [r,c] = rc(i);
      [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
        const ni = idx(nr,nc);
        if(matched.has(ni) && !visited.has(ni) && b[ni]===type){
          visited.add(ni);
          stack.push(ni);
        }
      });
    }
    groups.push({type, cells});
  }
  return groups;
}

function hasValidMove(b){
  const test = b.slice();
  const trySwap = (a,bI)=>{
    [test[a],test[bI]] = [test[bI],test[a]];
    const ok = findMatchedCells(test).size>0;
    [test[a],test[bI]] = [test[bI],test[a]];
    return ok;
  };
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(c<COLS-1 && trySwap(idx(r,c), idx(r,c+1))) return true;
      if(r<ROWS-1 && trySwap(idx(r,c), idx(r+1,c))) return true;
    }
  }
  return false;
}

function ensurePlayable(){
  if(!hasValidMove(board)){
    board = genBoard();
    addLog('교환 가능한 블록이 없어 보드를 재배열했다.', 'sys');
    renderBoard();
  }
}

// 영웅 행동 1건 실행 (연출 포함) — 실행 시점에 대상 생존 재확인
async function performHeroAction(a){
    if(isFallen(a.type)){
      // v0.19: 실행 시점 HP 0 재검사 — 큐 진입 후 쓰러진 경우도 행동 불가 (큐 구조 자체는 불변)
      floatText(heroChipEl(a.type), '💫 행동 불가', 'guard');
      return;
    }
    const job = jobOf(a.type);
    const act = job.actions[a.tier];
    const OFFENSIVE = ['strikeFront','snipeWeak','novaAll','poison'];
    if(aliveEnemies().length===0 && OFFENSIVE.includes(act.type)) return;
    renderParty(a.type); // 행동하는 영웅 칩 강조 (act 클래스)
    // v0.21: 행동값 = Power × 매치계수 × 연쇄계수 (FABLE_TASK_021 — ACTS 폐지, JOBS 단일 소스)
    let val = actionValue(job, a.tier, a.mult);
    // v0.25: action 버프 소비 — 피해 행동(베기/저격/파동)에만. 회복/독/방깎/보호막/반격 비적용
    let empowered = false;
    if(['strikeFront','snipeWeak','novaAll'].includes(act.type)){
      const m = consumeEmpower(a.type);
      if(m > 1){
        val = Math.round(val * m); // 반올림 정책: 기존 전투 숫자와 동일 (Math.round)
        empowered = true;
        sceneText('✦ '+heroNameOf(a.type)+' — 강화된 일격! ×'+m, {color:'#caa6ff'}); // v0.31: 로그→자막
        spawnRingFX(heroChipEl(a.type), '#caa6ff', false); // v0.36: 저장된 힘의 방출 — 주입(in)과 대칭(out)
        renderParty(a.type); // 배지 소거 즉시 반영
      }
    }

    // 공통 피해 처리: 방어 공식 + 플로팅/로그 (reduced면 🛡 표기)
    const hitEnemy = (e, raw, opts)=>{
      const r = dealDamage(e, raw, opts);
      // v0.31: 틈(armorDown) 이용 타격 — ✂ 마커 (피해가 커진 이유가 읽힌다)
      if(r.brokeArmor) spawnRingFX(enemyEl(enemies.indexOf(e)), '#bcd0ec', false); // v0.36: 틈이 벌어지는 강철 링
      // v0.37 (B항목): 철갑 의도 — 최종 1까지 깎였으면 clang("안 박힌다"), 강화 소비면 dmgBig
      const fcls = (r.eff <= 1 && r.reduced) ? 'clang' : (empowered ? 'dmgBig' : 'dmg');
      floatText(enemyEl(enemies.indexOf(e)), (empowered?'✦ ':'')+'-'+r.eff+(r.brokeArmor?' ✂':r.reduced?' 🛡':''), fcls);
      if(e.hp<=0) addLog(e.name+' 처치!', 'gold');
      else checkBossReaction(e); // v0.23: 피해 적용 후 보스 반응 검사
      return r;
    };

    if(act.type==='strikeFront'){ // 대검 전사/분쇄자: 선두 단일 (+분쇄자는 방어 감소)
      const tgt = aliveEnemies()[0];
      if(tgt){
        const ti0 = enemies.indexOf(tgt);
        // v0.31 (D항목): 공방 시퀀스 — ①행동자 강조(act) ②행동선 ③도착 ④베기 FX ⑤피해/피격 반응
        drawLine(heroChipEl(a.type), enemyEl(ti0), TYPE_COLORS[a.type], {width:6, bend:10, duration:150}); // v0.32: a.type 일반화
        await delay(160); // 선이 닿는 텀 — "공방"이 보인다
        if(tgt.hp <= 0){ renderEnemies(); return; } // v0.31: 텀 사이 사망(독 틱 등) — 헛스윙 처리
        spawnSlashFX(enemyEl(ti0), TYPE_COLORS[a.type], a.tier===3); // v0.31: 베기 궤적 (5매치는 큼)
        if(a.tier===3) setTimeout(()=>{ // v0.37: 5매치 — 역방향 2격, X자 교차 대베기
          const el2 = enemyEl(ti0);
          if(el2) spawnFxNode(el2, 'fxSlash big', TYPE_COLORS[a.type], {angle: 26 + Math.random()*16});
        }, 110);
        spawnImpact(enemyEl(ti0), TYPE_COLORS[0], a.tier===3);
        hitEnemy(tgt, val);
        if(act.armorBreak && tgt.hp > 0){
          // v0.26: 피해(기존 방어 기준) → 부여 순서 — 자기 타격은 새 uses를 즉시 소모하지 않는다.
          // "장갑을 깨는 타격"과 "깨진 장갑을 이용하는 후속타"의 분리 (태스크 추천안 그대로)
          applyArmorDown(tgt, act.armorBreak);
          const ad = tgt.status.armorDown;
          if(ad){
            spawnRingFX(enemyEl(enemies.indexOf(tgt)), '#9fb0cc', false); // v0.31: 장갑 파편/균열 링
            floatText(enemyEl(enemies.indexOf(tgt)), '🛡 장갑 균열! -'+ad.amount+'×'+ad.uses, 'guard');
          }
        }
        renderEnemies(ti0);
      }
    }
    else if(act.type==='novaAll' || act.type==='charge'){ // 마법사: 집중 → 예고 → 원형 파동
      const targets = aliveEnemies();
      if(act.type==='novaAll' && mageCharge){
        // 집중 해방: 비축 마력 + 현재 위력의 원형 파동 (피해는 개별 방어 적용)
        const total = mageCharge.dmg + val;
        mageCharge = null;
        drawWave(); // 원형 확산 폭발 연출 (구조 불변)
        targets.forEach((e,k)=>setTimeout(()=>     // v0.31: 파동이 닿는 순서로 폭발 FX
          spawnBlastFX(enemyEl(enemies.indexOf(e)), '#b88aff', true), 140 + k*45));
        banner('💥 원형 파동! 적 전체에 '+total+' 위력', 'boss'); // 자막은 banner가 담당 — 로그 제거 (v0.31 F항목)
        targets.forEach(e=>hitEnemy(e, total));
        renderEnemies(null, true);
      } else if(act.type==='charge'){
        // 4매치 이상: 즉시 공격 대신 집중 (마력 비축)
        mageCharge = { dmg: val };
        banner('🔮 '+job.name+' 집중! 다음 마나석 매치에 원형 파동', 'shield'); // v0.31: 로그 제거 — banner+링이 자막
        renderParty(a.type);   // 집중 링 표시
        renderEnemies();       // 적 진영에 예고 원 표시
        floatText(heroChipEl(a.type), '🔮 집중', 'guard'); // v0.32: a.type 일반화 (충전 시스템 휴면 — 부활 시 owner 필요)
      } else {
        // 3매치: 즉시 광역 — v0.31: 선 → (텀) → 도착 폭발 → 피해 (공방 시퀀스)
        targets.forEach((e,k)=>{
          drawLine(heroChipEl(a.type), enemyEl(enemies.indexOf(e)), TYPE_COLORS[a.type], // v0.32: a.type — 마법사는 이제 조준석(t4)
                   {width:3, bend:26 + k*4, alpha:.8, duration:220});
        });
        await delay(220);
        targets.forEach((e,k)=>{
          if(e.hp <= 0) return; // v0.31: 텀 사이 사망 — 시체 타격/중복 처치 로그 방지
          if(a.tier >= 3){ // v0.37: 유성 낙하 — 하늘에서 떨어지는 빛줄기 → 폭발 (낙하감)
            setTimeout(()=>spawnFxNode(enemyEl(enemies.indexOf(e)), 'fxMeteor', TYPE_COLORS[a.type]), k*55);
          }
          setTimeout(()=>spawnBlastFX(enemyEl(enemies.indexOf(e)), TYPE_COLORS[a.type], a.tier>=3),
                     k*55 + (a.tier>=3 ? 140 : 0));
          hitEnemy(e, val);
        });
        renderEnemies(null, true);
      }
    }
    else if(act.type==='poison'){ // v0.21 덫꾼: 방어 무시 독 — 철갑의 답 (F/G항목)
      const pool = aliveEnemies();
      let targets;
      if(act.target==='all') targets = pool;
      else { // 단일: 유효 방어가 가장 높은 적 우선 (철갑 대응 정체성), 동률이면 HP 높은 쪽
        const tgt = pool.length ? pool.reduce((m,e)=>{
          const a1=effDef(e), b1=effDef(m);
          return (a1>b1 || (a1===b1 && e.hp>m.hp)) ? e : m;
        }, pool[0]) : null;
        targets = tgt ? [tgt] : [];
      }
      // v0.31: 선 → (텀) → 침투 링 + ☠ — "독이 스며든다". 반복 로그 제거 (배지+림라이트가 정보)
      targets.forEach((e,k)=>{
        drawLine(heroChipEl(a.type), enemyEl(enemies.indexOf(e)), '#7cc25a', // v0.32: a.type 일반화
                 {width:2.6, bend:18 + k*5, alpha:.75, duration:200});
      });
      await delay(200);
      targets.forEach((e,k)=>{
        if(e.hp <= 0) return; // v0.31: 텀 사이 사망 — 시체 중독 방지
        applyPoison(e, act.tickDmg); // v0.24: 시간 기반 — 연쇄 무관 고정 수치 (단독 승리 엔진 방지)
        spawnRingFX(enemyEl(enemies.indexOf(e)), '#9fe07a', true); // 침투 — 안으로 감기는 링
        floatText(enemyEl(enemies.indexOf(e)), '☠ 중독!', 'guard');
      });
      renderEnemies();
    }
    else if(act.type==='healSingle' || act.type==='cleanseHeal' || act.type==='cleanseAll'){ // 사제/정화사
      const alive = aliveHeroes();
      if(!alive.length){ /* 전멸 직전 — 회복 대상 없음 */ }
      else if(act.type==='cleanseAll'){
        // v0.21 정화사 5매치: 아군 전체 정화 + 각 소량 회복
        let removed = 0;
        alive.forEach(t=>{
          const r = cleanseHero(t); removed += r;
          heroHp[t] = Math.min(heroMaxOf(t), heroHp[t] + val);
          floatText(heroChipEl(t), '+'+val+' ✨', 'heal');
          if(r){
            floatText(heroChipEl(t), '✦ 정화!', 'guard'); // v0.27: 해제된 아군에게만
            spawnRingFX(heroChipEl(t), '#9fe07a', false); // v0.31: 해로운 효과가 벗겨지는 소거 링
          }
          spawnAbsorb(heroChipEl(t), TYPE_COLORS[2], 1.05);
        });
        renderParty(a.type);
        if(removed) sceneText('✦ 대정화!', {color:'#9fe07a', big:true}); // v0.31: 특수 순간 자막
        addLog(job.name+'의 대정화! 아군 전체 정화'+(removed?' ('+removed+'개 해제)':'')+' + 각 '+val+' 회복', 'gold');
      } else {
        // v0.27 정화(4매치) 대상 선정: poison 보유 아군 우선 → 그중 HP 비율 최저 (태스크 추천안).
        // poison이 없으면 기존 규칙(최저 HP 비율) 그대로 — 회복만 조용히 수행
        const poisoned = alive.filter(t=>heroStatus[t] && heroStatus[t].poison);
        const pool = (act.type==='cleanseHeal' && poisoned.length) ? poisoned : alive;
        const tgt = pool.reduce((m,t)=>
          (heroHp[t]/heroMaxOf(t)) < (heroHp[m]/heroMaxOf(m)) ? t : m, pool[0]);
        const before = heroHp[tgt];
        heroHp[tgt] = Math.min(heroMaxOf(tgt), heroHp[tgt] + val);
        const gained = heroHp[tgt] - before;
        let cleansed = 0;
        if(act.type==='cleanseHeal') cleansed = cleanseHero(tgt, 1); // 해로운 효과 1개 해제
        renderParty(a.type); // 회복: 대상 플로팅+회복선으로 전달 (☠ 배지도 즉시 소거)
        // v0.31: 회복 아치 → (텀) → 도착 금빛 반짝임 — 회복선이 닿는 게 보인다
        drawLine(heroChipEl(a.type), heroChipEl(tgt), TYPE_COLORS[a.type], // v0.32: a.type 일반화
                 {width:3.5, bend:-24, alpha:.9, duration:260});
        await delay(240);
        spawnAbsorb(heroChipEl(tgt), TYPE_COLORS[2], 1.15);
        spawnHealSparkles(heroChipEl(tgt), a.tier===3 ? 8 : 5); // v0.37 (D-7): 머리 위 "촤라라랑" 금빛 분수
        floatText(heroChipEl(tgt), '+'+gained+(cleansed?' ✨':''), 'heal');
        if(cleansed){ // v0.27: 정화 성공은 반드시 읽혀야 한다
          spawnRingFX(heroChipEl(tgt), '#9fe07a', false); // v0.31: 벗겨지는 소거 링
          floatText(heroChipEl(tgt), '✦ 정화!', 'guard');
          addLog(job.name+'이(가) '+heroNameOf(tgt)+'의 중독을 걷어냈다!', 'gold');
        }
      }
    }
    else if(act.type==='empower'){ // v0.25 마법사: 마력 주입/전투 증폭 — 공격 아군의 다음 일격 강화
      // 대상 선정: 살아있는 "공격 가능" 아군 중 Power 최고 순 (본인 제외) — 구현 단순안 채택.
      // 결과적으로 근딜(10) → 원딜/분쇄자(8) 순이 되어 태스크 권장 우선순위와 일치
      const pool = aliveHeroes().filter(t=>t!==a.type && canDealDamage(t));
      const targets = pool.slice().sort((x,y)=>jobOf(y).power - jobOf(x).power).slice(0, act.targets||1);
      // v0.31: 주입선 → (텀) → 보라 주입 링 — "스며드는 강화". 반복 로그 제거 (✦N 배지가 정보)
      targets.forEach((t,k)=>{
        drawLine(heroChipEl(a.type), heroChipEl(t), TYPE_COLORS[1],
                 {width:3, bend:-20 - k*6, alpha:.85, duration:240});
      });
      if(targets.length) await delay(230);
      targets.forEach(t=>{
        if(isFallen(t)) return; // v0.31: 텀 사이 쓰러짐 — 쓰러진 아군에게 버프 비부여
        applyEmpower(t, act.dmgMult, job.name);
        spawnRingFX(heroChipEl(t), '#b88aff', true); // 안으로 감기는 주입
        spawnAbsorb(heroChipEl(t), '#b88aff', 1.1);
        if(a.tier === 3) spawnNotesFX(heroChipEl(t)); // v0.37: 승전가 — 음표가 감긴다 (3매치는 조용히)
        floatText(heroChipEl(t), '♪ 다음 행동 강화!', 'guard'); // v0.32: 바드 — 노래가 힘이 된다
      });
      renderParty(a.type); // ✦N 배지 즉시 표시
      if(!targets.length){
        floatText(heroChipEl(a.type), '대상 없음', 'guard'); // 공격 아군 전멸 등 — 헛발 안내
      }
      // (v0.31: 주입 addLog 폐지 — 연출+배지로 대체)
    }
    else if(act.type==='guard'){ // 방패 병사: 피해 감소 — v0.12: 6초 지속 창
      shieldRed = Math.max(shieldRed, act.red);
      shieldUntil = Date.now() + SHIELD_MS;
      if(act.counter){
        shieldCounter = Math.max(shieldCounter, Math.round(act.counter * a.mult));
      }
      renderParty(a.type); // shielded 외곽선 즉시 반영
      drawGuardRing(); // 임시 정책: 보호는 "파티 전체" — 링이 진영을 감싼다
      floatText(heroChipEl(a.type), '🛡 방어', 'guard');
    }
    else if(act.type==='frontGuard'){ // v0.32 철벽 수호자: 전열 한정 피해 감소 — "앞줄을 버틴다"
      frontRed = Math.max(frontRed, act.red);
      frontUntil = Date.now() + (act.dur || SHIELD_MS);
      renderParty(a.type); // 전열 fortified 강조 즉시 반영
      // 전열 칩들에 강철 링 — "벽이 선다" (전체 링과 구분: 진영 전체가 아니라 앞줄만)
      aliveHeroes().filter(t=>heroLine(t)==='front')
        .forEach(t=>spawnRingFX(heroChipEl(t), '#7fa2d8', false));
      floatText(heroChipEl(a.type), '🧱 전열 보호', 'guard');
    }
    else if(act.type==='snipeWeak'){ // 궁수: 최저 HP 적 저격
      const pool = aliveEnemies();
      const tgt = pool.length ? pool.reduce((m,e)=> e.hp<m.hp ? e : m, pool[0]) : null;
      if(tgt){
        const ti = enemies.indexOf(tgt);
        if(a.tier === 3){
          /* v0.37 (E항목): 5매치 속사 샘플 — "찌이잉" 조준 → 푯푯푯 3발 순차 → 최종 피해 1회.
             피해 계산은 기존 1회 유지 (연출만 다단) — 실시간 전투의 연속 행동감 */
          spawnFxNode(enemyEl(ti), 'fxScope', TYPE_COLORS[a.type]);
          floatText(heroChipEl(a.type), '🎯 조준...', 'guard');
          await delay(440);
          for(let k = 0; k < 3; k++){
            if(tgt.hp <= 0) break; // 조준 중 사망(독 틱 등) — 사격 중단
            drawLine(heroChipEl(a.type), enemyEl(ti), TYPE_COLORS[a.type],
                     {dashed:true, width:2, bend:(k-1)*8, alpha:.85, linger:220});
            spawnPierceFX(enemyEl(ti), TYPE_COLORS[a.type]);
            renderEnemies(ti); // 발마다 짧은 피격 흔들림
            await delay(120);
          }
          if(tgt.hp <= 0){ renderEnemies(); return; } // 속사 도중 사망 — 헛발
          spawnImpact(enemyEl(ti), TYPE_COLORS[a.type], true);
        } else {
          // v0.17: 얇고 빠른 화살 점선 — 4매치(연속 사격)는 90ms 간격 2발 잔상
          drawLine(heroChipEl(a.type), enemyEl(ti), TYPE_COLORS[a.type], {dashed:true, width:2.2, linger:300});
          if(a.tier >= 2){
            setTimeout(()=>drawLine(heroChipEl(a.type), enemyEl(ti), TYPE_COLORS[a.type],
                                    {dashed:true, width:2.2, bend:9, alpha:.7, linger:300}), 90);
          }
          await delay(110); // v0.31: 화살이 닿는 짧은 텀 — 저격은 빠르다
          if(tgt.hp <= 0){ renderEnemies(); return; } // v0.31: 텀 사이 사망 — 헛발
          spawnPierceFX(enemyEl(ti), TYPE_COLORS[a.type]); // v0.31: 관통/박힘
        }
        const r = dealDamage(tgt, val);
        if(r.brokeArmor) spawnRingFX(enemyEl(ti), '#bcd0ec', false); // v0.36: 틈 이용 가시화 (저격 경로도 동일 언어)
        const scls = (r.eff <= 1 && r.reduced) ? 'clang' : (empowered ? 'dmgBig' : 'dmg'); // v0.37
        floatText(enemyEl(ti), (empowered?'✦ ':'')+'🎯 -'+r.eff+(r.brokeArmor?' ✂':r.reduced?' 🛡':''), scls);
        if(tgt.hp<=0){
          floatText(enemyEl(ti), '🎯 마무리!', 'guard'); // v0.36: 궁수 정체성 — 저격으로 끝냈다
          addLog(tgt.name+' 처치!', 'gold');
        } else { checkBossReaction(tgt); } // v0.23
        renderEnemies(ti);
      }
    }
}

/* ── 영웅 행동 큐 프로세서 (v0.13): 보드와 독립 — 조작을 막지 않는다 ──
   매치가 만든 행동을 0.45초 간격으로 순차 재생. 큐 실행 중 새 매치 → 뒤에 이어 쌓임 */
const HERO_ACTION_GAP = 450; // 0.4~0.55초 권장 범위
async function processHeroActions(){
  if(heroQueueBusy) return;
  heroQueueBusy = true;
  const seq = runSeq; // v0.29
  while(actionQueue.length){
    if(!(await pauseGate(seq))) return; // v0.29: 일시정지 대기 / 런 전환 시 소멸 (플래그는 새 런이 리셋)
    if(state==='over'){ actionQueue = []; break; } // 승리/패배 후 결과 뒤집기 방지
    const a = actionQueue.shift();
    updateQueueBadge();
    await performHeroAction(a);
    if(aliveEnemies().length===0){
      actionQueue = [];
      updateQueueBadge();
      heroQueueBusy = false;
      await onBattleWon();
      return;
    }
    await delay(HERO_ACTION_GAP);
  }
  heroQueueBusy = false;
  updateQueueBadge();
  renderParty(); // act 강조 클래스 해제 (행동 종료)
}

// 적 공격 대상 선정 (임시 우선순위): 방패 병사(탱커) 생존 → 대검 전사 생존 → 최저 HP 생존 영웅
// 향후 몬스터별 타겟팅으로 확장 가능하도록 단일 지점으로 분리
function pickDefender(attacker){
  /* v0.30: 전열/후열 타겟팅 — 단순 샘플 (어그로/도발/위협도 없음, 차기 R&D)
     일반 적: 전열(근접·탱커) 우선 — HP 비율 최저, 동률이면 탱커가 받아낸다. 전열 전멸 시 후열.
     박쥐 계열(kind 'bat' — 독성 박쥐 포함): 후열 우선 압박 샘플. 후열 전멸 시 전열. */
  const alive = aliveHeroes();
  if(!alive.length) return null;
  const front = alive.filter(t=>heroLine(t)==='front');
  const back  = alive.filter(t=>heroLine(t)==='back');
  const pool = (attacker && attacker.kind === 'bat')
    ? (back.length ? back : front)
    : (front.length ? front : back);
  return pool.reduce((m,t)=>{
    const rm = heroHp[m]/heroMaxOf(m), rt = heroHp[t]/heroMaxOf(t);
    if(rt < rm) return t;
    if(rt === rm && t === 3) return t; // 동률: 탱커 우선
    return m;
  }, pool[0]);
}

/* ══ 실시간 행동 게이지 엔진 (v0.12) ══
   - 100ms 틱: 게이지 증가, 만충 시 공격 큐 투입
   - 큐는 150ms 간격으로 순차 처리 (다수전 연출 폭주 방지)
   - 게이지는 퍼즐 해소 중에도 계속 흐른다 (전장이 멈추지 않음)
   - 정지 조건: 승리/패배/전환(state==='over'), 쇼케이스 표시 중 ══ */
const TICK_MS = 100;
const SHIELD_MS = 6000;     // v0.12 임시: 방패 효과는 6초 지속 (페이즈 개념 소멸로 시간제 전환)
const BOSS_PREP_MS = 2600;  // 마왕 강공 준비 시간 — 방패 블록을 찾을 여유
const SPEEDS = {slime:9, goblin:12, bat:17, elite:8, boss:11}; // %/초 (임시값)

let shieldUntil = 0;
/* v0.32: 철벽 수호자 — 전열 한정 피해 감소 (FABLE_TASK_032 F항목)
   방패 병사(shieldRed, 파티 전체)와 곱연산 중첩 — 상위호환 없음: 전체 vs 전열의 양자택일.
   도발/어그로/pickDefender 무변경 */
let frontRed = 0;
let frontUntil = 0;
let attackQueue = [];
let attackBusy = false;

function queueAttack(e, big){
  attackQueue.push({e, big});
  processAttacks();
}

async function processAttacks(){
  if(attackBusy) return;
  attackBusy = true;
  const seq = runSeq; // v0.29
  while(attackQueue.length){
    if(!(await pauseGate(seq))) return; // v0.29: 일시정지 대기 / 런 전환 시 소멸
    const job = attackQueue.shift();
    if(state==='over') break;
    if(job.e.hp<=0) continue;
    if(aliveHeroes().length===0) break;
    if(job.big) await bossBigAttack(job.e);
    else await enemyAttack(job.e);
    await delay(150); // 동시 만충 시 짧은 시차 처리
  }
  attackBusy = false;
}

// 일반 공격: 완만한 곡선 타격선 → 임팩트 → 개별 피해
async function enemyAttack(e){
  const ei = enemies.indexOf(e);
  if(e.hp <= 0) return; // v0.24: 큐 대기 중 독(시간 틱)으로 사망 — 공격 불발 (기존 안전 처리 승계)
  const tgt = pickDefender(e); // v0.30: 공격자 종에 따라 전열/후열 우선이 갈린다
  if(tgt===null) return;
  const raw = e.atk;
  // v0.21: 방패 감소 후 영웅 Defense 감산 — 최종 = max(1, ...)
  // v0.32: 전열 보호(frontGuard) — 대상이 전열이면 추가 감산 (방패 병사와 곱연산 중첩)
  let shielded = Math.round(raw * (1 - shieldRed));
  if(frontRed > 0 && heroLine(tgt) === 'front') shielded = Math.round(shielded * (1 - frontRed));
  const eff = Math.max(1, shielded - heroDefOf(tgt));
  const frontHit = frontRed > 0 && heroLine(tgt) === 'front'; // v0.36: 철벽 감산 기여 — 피격 표기 구분용
  const blocked = (shieldRed>0 || frontHit || heroDefOf(tgt)>0) && eff<raw;
  drawStrikeLine(enemyEl(ei), heroChipEl(tgt), '#e0504a', blocked);
  await delay(160);
  if(blocked) drawBlockFlash(heroChipEl(tgt));
  const prevHp = heroHp[tgt];
  heroHp[tgt] -= eff;
  if(heroHp[tgt] < 0) heroHp[tgt] = 0; // v0.19: 0 미만 유지 안 함 (이미 0이면 추가 피해 무의미)
  if(prevHp > 0 && heroHp[tgt] <= 0){
    addLog('💔 '+heroNameOf(tgt)+'이(가) 쓰러졌다!', 'boss'); // 강한 정보 (v0.14 토스트 정책 유지)
    if(tgt===1 && mageCharge){ mageCharge = null; addLog('마법사의 집중이 흩어졌다...', 'sys'); } // v0.19
  }
  // 일반 피해/막힘: 대상 플로팅("-N" / "🛡 raw→eff")이 전달 — 토스트 X
  renderParty();
  hurtHero(tgt);
  spawnImpact(heroChipEl(tgt), blocked ? '#ffd97a' : '#e0504a', false); // v0.17: 피격 스파크
  // v0.36 (D-5항목): 무엇이 막았는지 구분 — 철벽(전열 한정)은 🧱, 방패/방어는 🛡.
  // "철벽은 앞줄을 버틴다"가 매 피격 플로팅에서 읽힌다
  floatText(heroChipEl(tgt), blocked ? (frontHit ? '🧱 ' : '🛡 ')+raw+'→'+eff : '-'+eff, blocked?'guard':'dmg');
  // v0.27: 독성 박쥐 — 즉시 피해(위 기존 규칙: 방패→영웅 방어) 후 time 중독 부여
  if(e.venom && heroHp[tgt] > 0){
    applyHeroPoison(tgt, 1, 'venomBat'); // v0.28: 10초간 2초마다 1 — 총 5, 방어 무시 (구 6초/2×3=6)
    // v0.31: 매 공격 반복 로그 폐지 — ☠ 플로팅 + 배지 + 림라이트가 정보 전달
    floatText(heroChipEl(tgt), '☠ 중독!', 'dmg');
    spawnRingFX(heroChipEl(tgt), '#9fe07a', true); // 침투 링 (덫꾼 독과 동일 언어)
    renderParty(); // ☠ 배지 즉시 표시
  }
  if(shieldCounter>0){
    const cr = dealDamage(e, shieldCounter); // v0.21: 반격도 방어 공식 통과
    if(e.hp > 0) checkBossReaction(e); // v0.23
    renderEnemies(enemies.indexOf(e));
    spawnImpact(enemyEl(enemies.indexOf(e)), '#ffd97a', false); // v0.17: 반격 스파크
    floatText(enemyEl(enemies.indexOf(e)), '⚔ -'+cr.eff+(cr.reduced?' 🛡':''), 'guard'); // 반격: 플로팅
    if(e.hp<=0){
      addLog(e.name+' 처치!', 'gold');
      if(aliveEnemies().length===0){ await onBattleWon(); return; }
    }
  }
  if(aliveHeroes().length===0){
    clearAimLines();
    onDefeat();
  }
}

// 마왕 강공 준비: 점선 조준선(전원) + 붉은 펄스 — 보고 대응하는 공격
function startBossPrep(e){
  e.charging = true;
  e.prepEnd = Date.now() + BOSS_PREP_MS;
  banner('😈 '+e.name+'이(가) 힘을 모은다!', 'boss'); // v0.22: 보스 일반화
  addLog(e.name+'이(가) 힘을 모은다. 강공이 온다 — 방패를!', 'boss');
  renderEnemies();
  const ei = enemies.indexOf(e);
  aliveHeroes().forEach(t=>drawAimLine(enemyEl(ei), heroChipEl(t), '#d8554a'));
}

// 마왕 강공 (C안 유지): 암흑 파동 + 전원 균열 번개 — 번개형은 특수 스킬 전용 문법
async function bossBigAttack(e){
  clearAimLines();
  const ei = enemies.indexOf(e);
  if(e.hp <= 0) return; // v0.24: 강공 직전 독 사망 — 강공 불발
  const eff = Math.round(BOSS_BIG_EACH * (1 - shieldRed)); // 기준치 (배너용) — 개별 최종은 영웅 방어 감산
  const blocked = shieldRed>0 && eff<BOSS_BIG_EACH;
  banner(blocked
    ? '🛡 방패 병사의 방패! 전원 '+BOSS_BIG_EACH+' → '+eff
    : '💢 마왕의 균열 일격! 전원 '+eff+' 피해', blocked?'shield':'boss');
  drawDarkWave(enemyEl(ei));
  const hitList = aliveHeroes();
  hitList.forEach((t,k)=>{
    setTimeout(()=>drawBoltLine(enemyEl(ei), heroChipEl(t), blocked), k*45);
  });
  await delay(300);
  hitList.forEach(t=>{
    const prev = heroHp[t];
    // v0.32: 전열 보호 — 강공도 전열에게는 감산 (배너 기준치 eff는 파티 공통 표기 유지)
    const frontHit = frontRed > 0 && heroLine(t) === 'front';
    const base = frontHit ? Math.round(eff * (1 - frontRed)) : eff;
    const fin = Math.max(1, base - heroDefOf(t)); // v0.21: 영웅 방어 감산
    if(frontHit) floatText(heroChipEl(t), '🧱 '+eff+'→'+fin, 'guard'); // v0.36: 전열만 덜 맞는 게 보인다
    heroHp[t] -= fin;
    if(heroHp[t] < 0) heroHp[t] = 0; // v0.19: 클램프
    if(prev > 0 && heroHp[t] <= 0){
      addLog('💔 '+heroNameOf(t)+'이(가) 쓰러졌다!', 'boss');
      if(t===1 && mageCharge){ mageCharge = null; addLog('마법사의 집중이 흩어졌다...', 'sys'); } // v0.19
    }
  });
  addLog(blocked
    ? '방패 병사의 방패! 마왕의 일격, 전원 '+BOSS_BIG_EACH+' 피해가 '+eff+'로 감소.'
    : '마왕의 일격! 생존 영웅 전원에게 '+eff+' 피해!', blocked?'shield':'boss');
  renderParty();
  if(!blocked){ // v0.17 보강: 균열이 꽂히는 순간 파티 진영만 아주 약한 진동 (예고/번개 구조 불변)
    const pa = $('#partyArea');
    pa.classList.add('thump');
    setTimeout(()=>pa.classList.remove('thump'), 200);
  }
  hitList.forEach((t,k)=>{
    hurtHero(t);
    if(blocked) drawBlockFlash(heroChipEl(t));
    setTimeout(()=>spawnImpact(heroChipEl(t), blocked ? '#ffd97a' : '#d8554a', true), k*40); // 강 스파크
    const fin = Math.max(1, eff - heroDefOf(t));
    floatText(heroChipEl(t), blocked ? '🛡 '+BOSS_BIG_EACH+'→'+fin : '-'+fin, blocked?'guard':'dmg');
  });
  if(shieldCounter>0){
    const cr = dealDamage(e, shieldCounter); // v0.21: 반격도 방어 공식 통과
    if(e.hp > 0) checkBossReaction(e); // v0.23
    renderEnemies(ei);
    floatText(enemyEl(ei), '⚔ -'+cr.eff+(cr.reduced?' 🛡':''), 'guard'); // 반격: 플로팅
    if(e.hp<=0){
      addLog(e.name+' 처치!', 'gold');
      if(aliveEnemies().length===0){ await onBattleWon(); return; }
    }
  }
  if(aliveHeroes().length===0){
    clearAimLines();
    onDefeat();
  }
}

// 게이지 UI 증분 갱신 (재렌더 없이 width/클래스만 — idle 애니메이션 보존, 부하 최소)
function updateGauges(){
  enemies.forEach((e,i)=>{
    const el = enemyEl(i);
    if(!el) return;
    const g = el.querySelector('.gauge i');
    if(g) g.style.width = Math.min(100, e.gauge||0) + '%';
    el.classList.toggle('ready', e.hp>0 && !e.charging && (e.gauge||0) >= 85);
  });
}

// 메인 틱: 게이지 진행/방패 만료/공격 트리거
function tick(){
  if(screen!=='battle') return;          // v0.20: battle 화면 밖에서는 전투 진행 정지
  if(state==='over' || showcase) return; // 승리/패배/전환·쇼케이스 중 정지
  if(paused) return;                     // v0.29: 일시정지 — 게이지/상태 틱 전부 정지
  const now = Date.now();
  updateStatusEffects(now); // v0.24: time 기반 상태이상 — 단일 루프에서 진행
  if(shieldRed>0 && now >= shieldUntil){
    shieldRed = 0; shieldCounter = 0;
    renderParty();
  }
  if(frontRed>0 && now >= frontUntil){ // v0.32: 전열 보호 만료
    frontRed = 0;
    renderParty();
  }
  for(const e of enemies){
    if(e.hp<=0) continue;
    if(e.boss && e.charging){
      if(now >= e.prepEnd){
        e.charging = false;
        e.gauge = 0;
        renderEnemies();
        queueAttack(e, true);
      }
      continue;
    }
    e.gauge = (e.gauge||0) + e.speed * (TICK_MS/1000); // speed = %/초 → 틱당 speed×0.1
    if(e.gauge >= 100){
      if(e.boss){
        bossTurn++;
        if(bossTurn % 3 === 0){ e.gauge = 100; startBossPrep(e); continue; }
      }
      e.gauge = 0;
      queueAttack(e, false);
    }
  }
  updateGauges();
}
setInterval(tick, TICK_MS);

/* ====================== 진행 흐름 ====================== */
async function resolveBoard(){
  let chain = 0;
  const seq = runSeq; // v0.29: 일시정지/런 전환 안전 토큰
  while(true){
    if(!(await pauseGate(seq))) return; // v0.29: 일시정지 대기 — 런이 바뀌었으면 새 보드를 만지지 않고 소멸
    const groups = findMatchGroups(board);
    if(groups.length===0) break;
    chain++;
    /* v0.31 (B/C항목): 일반 획득 텍스트 폐지 — 3매치는 침묵 (가루 색/전달/흡수가 정보 전달).
       특수 순간만 연출 텍스트: 2연쇄+ "연쇄 증폭 ×N" / 4매치 "강한 문장" / 5매치 행동명 강조 */
    let slot = 0;
    if(chain>1){
      sceneText('연쇄 증폭 ×'+chain+'  (위력 +'+Math.round(CHAIN_BONUS*100*(chain-1))+'%)',
                {big: chain>=3}); // 3연쇄+: 큰 자막 — 기존 럼블/흔들림과 합쳐져 "더!" 체감
    }
    for(const g of groups){
      const t = TYPES[g.type];
      if(isFallen(g.type)){
        // v0.19: 쓰러진 영웅의 블록 — 매치/연쇄/낙하는 정상, 행동만 미발생 (봉인은 차기 R&D)
        // v0.31: 반복 안내 축소 — 전투당 영웅별 1회만 (이후는 제자리 산화 연출이 정보를 대신)
        if(!fallenNoticed.has(g.type)){
          fallenNoticed.add(g.type);
          floatBoard(t.sym+' '+heroNameOf(g.type)+' 쓰러짐 — 행동 불가', 'sys', slot++, '#8d87a0');
        }
        continue;
      }
      queueAction(g.type, g.cells.length, chain);
      if(g.cells.length >= 5){
        // 5매치: 직업 행동명이 자막으로 — "장갑 분쇄!" "전투 증폭!" "대정화!" 등
        sceneText('✦ '+jobOf(g.type).actions[3].label+'!', {color: TYPE_COLORS[g.type], big:true});
      } else if(g.cells.length === 4){
        sceneText(t.block+' — 강한 문장!', {color: TYPE_COLORS[g.type], small:true}); // v0.36: 가장 흔한 자막 — 작게
      }
      // 3매치: 침묵
    }

    // 삭제 연출 (v0.15): ① 응축 반응(primed) → ② 팡 터짐(removing + 버스트 FX)
    // v0.18: 셀별 가중 단계 — p2(4매치/2연쇄), p3(5매치/3연쇄+) — 큰 힘일수록 더 적극적으로
    const removeSet = new Set();
    const cellTier = new Map(); // cellIdx → 1/2/3 (응축·팡 강도)
    groups.forEach(g=>{
      const sizeT = g.cells.length>=5 ? 3 : g.cells.length===4 ? 2 : 1;
      const pT = Math.max(sizeT, chain>=3 ? 3 : chain===2 ? 2 : 1);
      g.cells.forEach(c=>{ removeSet.add(c); cellTier.set(c, Math.max(pT, cellTier.get(c)||1)); });
    });
    const matchedEls = [];
    document.querySelectorAll('.cell').forEach(c=>{
      if(removeSet.has(+c.dataset.i)) matchedEls.push(c);
    });
    matchedEls.forEach(c=>{
      const pT = cellTier.get(+c.dataset.i) || 1;
      c.classList.add('primed');
      if(pT>=2) c.classList.add(pT===3 ? 'p3' : 'p2');
    });
    await delay(PRIME_MS);
    spawnBurstFX(groups, chain);              // 좌표는 셀 삭제 전에 채취
    spawnTrailFX(groups, chain);              // v0.17: 요정가루 발자취 → 해당 영웅 (비차단)
    if(chain >= BOARD_RUMBLE_CHAIN_THRESHOLD && OVERCHAIN_RUMBLE_STRENGTH > 0){
      // v0.18B: 대연쇄 전용 럼블 — 보드판이 터덜터덜 (thump 대체, 보드판 한정)
      const bw = $('#boardWrap');
      bw.style.animationDuration = OVERCHAIN_RUMBLE_MS+'ms';
      bw.classList.add('rumble');
      setTimeout(()=>{ bw.classList.remove('rumble'); bw.style.animationDuration=''; }, OVERCHAIN_RUMBLE_MS + 40);
    }
    else if(BOARD_SHAKE_STRENGTH > 0 && (chain >= 3 || groups.some(g=>g.cells.length >= 5))){
      const bw = $('#boardWrap'); // 묵직한 pop: 보드만 — 강도는 --shake-k 상수 (1~4연쇄 기존 유지)
      bw.classList.add('thump');
      setTimeout(()=>bw.classList.remove('thump'), 200);
    }
    matchedEls.forEach(c=>c.classList.add('removing')); // 가중 클래스(p2/p3)는 그대로 → popOut2/3 적용
    await delay(POP_MS);

    // 삭제 → 낙하 → 생성
    removeSet.forEach(i=>{ board[i]=null; });
    const spawnSet = new Set();
    for(let c=0;c<COLS;c++){
      let write = ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(board[idx(r,c)]!==null){
          board[idx(write,c)] = board[idx(r,c)];
          if(write!==r) board[idx(r,c)] = null;
          write--;
        }
      }
      for(let r=write;r>=0;r--){
        board[idx(r,c)] = rand(TYPES.length);
        spawnSet.add(idx(r,c));
      }
    }
    renderBoard(spawnSet);
    await delay(260);
  }

  // 보드 안정: 즉시 조작 해제 (v0.13 핵심 — 연출이 손을 막지 않는다)
  boardBusy = false;
  sel = null;
  ensurePlayable();
  updateQueueBadge();
  processHeroActions(); // 영웅 행동은 뒤에서 순차 재생 (비차단)
}

async function onBattleWon(){
  if(state==='over') return; // 영웅 큐/몬스터 큐 동시 도달 시 중복 방지
  state = 'over';            // 즉시 게이지/큐 정지
  attackQueue = [];
  actionQueue = [];
  updateQueueBadge();
  clearAimLines();
  addLog('── '+BATTLES[battleIdx].label+' 승리! ──', 'gold');
  await delay(500);
  if(battleIdx >= BATTLES.length-1){
    // v0.20 result flow: 클리어 — 다시 도전 / 타이틀로
    showOverlay('전체 클리어!', '철갑 대장을 물리쳤다!\n다섯 영웅의 모험은 계속된다...', [
      {label:'다시 도전', onClick:startRun},
      {label:'타이틀로', onClick:()=>showScreen('title')},
    ]);
    return;
  }
  // 승리 회복 (v0.9 임시): 영웅 전원 각자 +15, 각자 최대 HP 초과 불가
  // 쓰러진 영웅도 회복 — 사망/봉인 시스템 미도입이므로 다음 전투 참여 보장
  PARTY.forEach(t=>{
    heroHp[t] = Math.min(heroMaxOf(t), Math.max(0, heroHp[t]) + VICTORY_HEAL);
  });
  addLog('전투 승리! 파티가 숨을 고르며 각자 HP '+VICTORY_HEAL+' 회복.', 'good');
  renderParty();
  PARTY.forEach(t=>floatText(heroChipEl(t), '+', 'heal'));
  showOverlay('승리!',
    BATTLES[battleIdx].label+'을(를) 돌파했다.\n파티가 숨을 고르며 각자 HP '+VICTORY_HEAL+' 회복.',
    '다음 전투 ▶', ()=>{
    battleIdx++;
    setupBattle();
    state = 'idle';
  });
}

function onDefeat(){
  if(state==='over') return;
  state = 'over';
  attackQueue = [];
  actionQueue = [];
  updateQueueBadge();
  clearAimLines();
  addLog('파티가 쓰러졌다...', 'bad');
  // v0.20 result flow: 패배 — "편성을 바꿔 다시 도전한다"의 자리 확보
  showOverlay('패배', '파티의 HP가 0이 되었다.\n편성을 바꿔 다시 도전하자.', [
    {label:'다시 도전', onClick:startRun},
    {label:'편성으로', onClick:()=>showScreen('partySelect'), ghost:true},
    {label:'타이틀로', onClick:()=>showScreen('title'), ghost:true},
  ]);
}

function setupBattle(){
  // 실시간 게이지: 종별 속도 부여 + 0~35% 무작위 시차 (동시 만충 방지)
  enemies = BATTLES[battleIdx].enemies.map(e=>({
    ...e, hp:e.maxHp, charging:false,
    status:{}, // v0.21: 상태이상은 전투마다 새 객체 — 이월/누적 원천 차단
    speed: SPEEDS[e.kind] || 10,
    gauge: Math.random()*35,
  }));
  attackQueue = [];
  actionQueue = [];
  boardBusy = false;
  updateQueueBadge();
  clearAimLines();
  shieldUntil = 0;
  bossTurn = 0;
  shieldRed = 0;
  shieldCounter = 0;
  frontRed = 0; frontUntil = 0; // v0.32: 전열 보호 전투 간 미이월
  mageCharge = null; // 전투 간 집중 미이월 (v0.25: 집중 발동 직업은 없으나 시스템 보존)
  heroBuffs = {};    // v0.25: action 버프 전투 간 미이월 — 다시 도전 초기화 보장
  heroStatus = {};   // v0.27: 아군 상태이상(중독) 전투 간 미이월 — 다시 도전 초기화 보장
  fallenNoticed = new Set(); // v0.31: 쓰러짐 안내 1회 카운터 리셋
  showcase = false;
  board = genBoard();
  if(!hasValidMove(board)) board = genBoard();
  sel = null;
  addLog('═══ '+BATTLES[battleIdx].label+' 시작 ═══', 'gold');
  enemies.forEach(e=>addLog(e.name+' 등장! (HP '+e.maxHp+(e.defense ? ', 방어 '+e.defense : '')+')', 'sys'));
  if(enemies.some(e=>e.armorNote)){ // v0.21: 철갑 테스트임을 드러냄 (E항목)
    addLog('⚙ 철갑 테스트: 물리 피해는 방어력에 막힌다 — 독이나 방어 감소로 뚫어라!', 'gold');
  }
  renderAll();
}

/* ════ v0.20: 화면 상태 시스템 — title | partySelect | codex | battle (+ result는 overlay) ════ */
let screen = 'title';
function showScreen(name){
  if(screen === 'battle' && name !== 'battle'){ runSeq++; paused = false; } // v0.29: 전투 이탈 = 구 루프 무효화
  screen = name;
  document.body.dataset.screen = name;
  hideOverlay();
  if(name === 'partySelect') renderPartySelect();
  if(name === 'codex'){ codexMode = 'category'; selectedCodexSlot = null; renderCodex(); } // v0.20B: 진입은 항상 카테고리
  // battle 외 화면에서는 tick/입력이 screen 가드로 정지 — 전투 상태는 startRun이 항상 새로 구성
}
// 전투 시작 (편성 → 전투): 항상 깨끗한 상태로 — 타이머/큐/상태 꼬임 방지
function startRun(){
  runSeq++;            // v0.29: 잠들어 있던 구 async 루프 무효화 (pauseGate가 차단)
  paused = false;
  boardBusy = false; heroQueueBusy = false; attackBusy = false; // 구 루프가 잡고 있던 플래그 회수
  attackQueue = [];
  clearAimLines();
  resetGame();         // battleIdx=0, HP 초기화, 큐 비움, state='idle'
  showScreen('battle');
}

function renderPartySelect(){
  const list = $('#slotList');
  list.innerHTML = '';
  JOB_SLOTS.forEach(slot=>{
    const job = JOBS[equippedJobs[slot.id]];
    const t = TYPES[slot.blockType];
    const d = document.createElement('div');
    d.className = 'slotCard';
    d.innerHTML =
      '<div class="sym" style="--tc:'+TYPE_COLORS[slot.blockType]+'">'+t.sym+'</div>'
      + '<div class="info">'
      +   '<div class="slotName">'+slot.name+' · '+slot.blockName
      +     ' <i class="lineTag'+(slot.line==='front'?' front':'')+'">'+(slot.line==='front'?'전열':'후열')+'</i></div>' // v0.30
      +   '<div class="slotAsk">'+slot.desc+'</div>' // v0.32: 역할군의 양자택일 질문 — 선택 이유가 한 줄로
      +   '<div class="jobName">'+job.name+'</div>'
      +   '<div class="jobSummary">'+job.summary+'</div>'
      +   '<div class="slotPicks">'+SLOT_JOBS[slot.id].map(jid=>{
            if(!jid) return '<i>준비 중</i>';
            const cur = equippedJobs[slot.id]===jid;
            return '<i class="pick'+(cur?' cur':'')+'" data-slot="'+slot.id+'" data-job="'+jid+'">'+JOBS[jid].name+'</i>';
          }).join('')+'</div>'
      + '</div>'
      + '<div class="stats">HP '+job.hp+'<br>Power '+job.power+'<br>Def '+job.defense+'</div>';
    list.appendChild(d);
  });
  // v0.21: 직업 선택 — 탭 시 장착 교체 → 전투가 equippedJobs를 직접 읽는다 (H항목)
  list.querySelectorAll('.pick').forEach(el=>{
    el.addEventListener('click', ()=>{
      equippedJobs[el.dataset.slot] = el.dataset.job;
      renderPartySelect(); // 스탯/설명/선택 표시 즉시 갱신
    });
  });
}

/* ── v0.20B: 도감 2단계 — 카테고리 목록 → 카테고리 상세 (한 화면 20칸 나열 폐지) ── */
let codexMode = 'category';     // 'category' | 'detail'
let selectedCodexSlot = null;   // 'tank' | 'melee' | 'ranged' | 'support' | 'healer'

function renderCodex(){
  if(codexMode === 'detail' && selectedCodexSlot) renderCodexDetail(selectedCodexSlot);
  else renderCodexCategory();
}

function renderCodexCategory(){
  codexMode = 'category';
  selectedCodexSlot = null;
  $('#codexBack').style.display = 'none';
  $('#codexTitle').textContent = '직업 도감';
  $('#codexSub').textContent = '5개의 역할군 × 2직업 = 10직업 — 역할군마다 양자택일 (장기: 카테고리당 4직업)'; // v0.32
  const body = $('#codexBody');
  body.innerHTML = '';
  body.scrollTop = 0;
  JOB_SLOTS.forEach(slot=>{
    const t = TYPES[slot.blockType];
    const count = SLOT_JOBS[slot.id].filter(Boolean).length;
    const d = document.createElement('button');
    d.className = 'catCard';
    d.innerHTML =
      '<div class="sym" style="--tc:'+TYPE_COLORS[slot.blockType]+'">'+t.sym+'</div>'
      + '<div style="flex:1;min-width:0">'
      +   '<div class="catName">'+slot.name+'</div>'
      +   '<div class="catBlock">'+slot.blockName+' · '+(slot.line==='front'?'전열 — 맞아주는 위치':'후열 — 지원 위치')+'</div>' // v0.30
      +   '<div class="catDesc">'+slot.desc+'</div>'
      + '</div>'
      + '<div class="catCount">'+count+' / 4 등록<small>보기 ▶</small></div>';
    d.addEventListener('click', ()=>renderCodexDetail(slot.id));
    body.appendChild(d);
  });
}

function renderCodexDetail(slotId){
  codexMode = 'detail';
  selectedCodexSlot = slotId;
  const slot = JOB_SLOTS.find(x=>x.id===slotId);
  const t = TYPES[slot.blockType];
  $('#codexBack').style.display = '';
  $('#codexTitle').textContent = t.sym+' '+slot.name+' / '+slot.blockName;
  $('#codexSub').textContent = slot.desc;
  const body = $('#codexBody');
  body.innerHTML = '';
  body.scrollTop = 0;
  SLOT_JOBS[slotId].forEach(jobId=>{
    if(!jobId){
      const p = document.createElement('div');
      p.className = 'codexCard pending';
      p.innerHTML = '<div class="pnm">'+slot.name+' 슬롯 — 준비 중</div>'
        + '<div class="pdesc">이 슬롯에는 앞으로 다른 '+slot.name+' 직업이 추가됩니다.</div>';
      body.appendChild(p);
      return;
    }
    const job = JOBS[jobId];
    const d = document.createElement('div');
    d.className = 'codexCard';
    d.innerHTML =
      '<div class="nm">'+job.name+'</div>'
      + '<div class="desc">'+job.summary+'</div>'
      + '<div class="statRow"><span><b>HP</b>'+job.hp+'</span><span><b>Power</b>'+job.power+'</span><span><b>Defense</b>'+job.defense+'</span></div>'
      + '<div class="tagRow">'+job.tags.map(x=>'<i>'+x+'</i>').join('')+'</div>'
      + '<div class="mrow"><b>3매치</b><span>'+actionDesc(job,1)+'</span></div>'
      + '<div class="mrow"><b>4매치</b><span>'+actionDesc(job,2)+'</span></div>'
      + '<div class="mrow"><b>5매치</b><span>'+actionDesc(job,3)+'</span></div>';
    body.appendChild(d);
  });
}

// v0.20: 다중 버튼 오버레이 — buttons: [{label, onClick, ghost?}] (단일 호출 호환 유지)
function showOverlay(title, text, buttons, legacyOnClick){
  $('#ovTitle').textContent = title;
  $('#ovText').textContent = text;
  const wrap = $('#ovBtns');
  wrap.innerHTML = '';
  const list = (typeof buttons === 'string') ? [{label:buttons, onClick:legacyOnClick}] : buttons;
  list.forEach((b,i)=>{
    const btn = document.createElement('button');
    btn.textContent = b.label;
    if(b.ghost || i>0) btn.className = 'ghost';
    btn.onclick = ()=>{ hideOverlay(); b.onClick(); };
    wrap.appendChild(btn);
  });
  $('#overlay').classList.add('show');
}
function hideOverlay(){ $('#overlay').classList.remove('show'); }

function resetGame(){
  battleIdx = 0;
  initHeroHp(); // 영웅별 HP 초기화 (전투 간에는 이월)
  actionQueue = [];
  $('#ticker').innerHTML = '';
  $('#banner').className = '';
  addLog('Emblem Quest Lab — 블록을 맞춰 영웅을 움직여라!', 'gold');
  addLog('블록을 탭해 선택하고, 인접한 블록을 탭해 교환한다.', 'sys');
  setupBattle();
  state = 'idle';
}

/* ====================== 입력 ====================== */
function adjacent(a,b){
  const [r1,c1]=rc(a), [r2,c2]=rc(b);
  return Math.abs(r1-r2)+Math.abs(c1-c2)===1;
}

async function trySwap(a,b){
  if(showcase){ showcase = false; renderEnemies(); } // v0.29: 쇼케이스 복귀 (전용 버튼 폐지 — 보드 터치/⚙)
  boardBusy = true; // 보드 변형 시작 — 교환/삭제/낙하/연쇄 동안만 잠금
  [board[a],board[b]] = [board[b],board[a]];
  sel = null;
  renderBoard();
  await delay(170);
  if(findMatchedCells(board).size===0){
    [board[a],board[b]] = [board[b],board[a]];
    renderBoard();
    await delay(150);
    boardBusy = false;
    return;
  }
  await resolveBoard();
}

// 탭-탭 교환 (fallback): 블록 선택 → 인접 블록 선택
function tapCell(i){
  if(!canPlay()) return;
  if(sel===null){
    sel = i; renderBoard();
  }else if(sel===i){
    sel = null; renderBoard();
  }else if(adjacent(sel,i)){
    trySwap(sel,i);
  }else{
    sel = i; renderBoard();
  }
}

/* ── 스와이프 교환: 누르고 → 밀면 → 가장 큰 방향으로 인접 교환 ── */
const SWIPE_DIST = 18; // 판정 거리(px)

// 스와이프 방향 판정: 큰 축 우선. 보드 밖이면 null (무시)
function swipeTarget(i, dx, dy){
  const dir = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? [0,1] : [0,-1])
    : (dy > 0 ? [1,0] : [-1,0]);
  const [r,c] = rc(i);
  const nr = r + dir[0], nc = c + dir[1];
  if(nr<0 || nr>=ROWS || nc<0 || nc>=COLS) return null; // 보드 밖 스와이프 무시
  return idx(nr,nc);
}

let drag = null;
const boardEl = $('#board');

boardEl.addEventListener('pointerdown', e=>{
  const cell = e.target.closest('.cell');
  if(!cell || !canPlay()) return;
  drag = { i:+cell.dataset.i, x:e.clientX, y:e.clientY, swiped:false };
});

boardEl.addEventListener('pointermove', e=>{
  if(!drag || drag.swiped || !canPlay()) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if(Math.hypot(dx,dy) < SWIPE_DIST) return;
  drag.swiped = true; // 한 번의 스와이프 = 한 번의 교환
  const target = swipeTarget(drag.i, dx, dy);
  if(target===null){ drag = null; return; }
  sel = null;
  trySwap(drag.i, target); // 매치 없으면 trySwap이 자동 복귀
  drag = null;
});

boardEl.addEventListener('pointerup', e=>{
  if(!drag) return;
  const moved = Math.hypot(e.clientX - drag.x, e.clientY - drag.y);
  const i = drag.i;
  drag = null;
  if(moved < 10 && canPlay()) tapCell(i); // 거의 안 움직였으면 탭으로 처리
});

boardEl.addEventListener('pointercancel', ()=>{ drag = null; });

/* v0.29: ⚙ 환경설정 — 일시정지 팝업 (구 ↻ 즉시 중단 + 👁 진형 버튼 통합).
   구 중단 flow와 달리 비파괴: 큐/게이지/상태를 보존한 채 멈추고, [이어서 하기]로 복귀.
   쇼케이스 표시 중에는 ⚙ = 전투 복귀 단축 (보드 터치와 동일) */
$('#pauseBtn').addEventListener('click', ()=>{
  if(screen !== 'battle') return;
  if(showcase){ showcase = false; renderEnemies(); return; }
  pauseGame();
});

/* ====================== 시작 (v0.20: 타이틀부터) ====================== */
applyFxTune(); // 연출 상수 주입은 화면과 무관하게 1회
$('#btnToParty').addEventListener('click', ()=>showScreen('partySelect'));
$('#btnToCodex').addEventListener('click', ()=>showScreen('codex'));
$('#btnStartRun').addEventListener('click', startRun);
$('#btnPartyToCodex').addEventListener('click', ()=>showScreen('codex'));
$('#btnPartyToTitle').addEventListener('click', ()=>showScreen('title'));
$('#btnCodexToParty').addEventListener('click', ()=>showScreen('partySelect'));
$('#codexBack').addEventListener('click', renderCodexCategory); // v0.20B: 상세 → 카테고리
$('#btnCodexToTitle').addEventListener('click', ()=>showScreen('title'));
showScreen('title'); // 게임은 타이틀에서 시작 — 전투는 편성의 [전투 시작]으로
</script>
