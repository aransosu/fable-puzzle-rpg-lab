<html lang="ko">
<head>
<!-- Emblem Quest Lab v0.43 — FABLE_TASK_043: Healer Gem 4 Job Foundation / Recovery Choice Pass (20직업 완성)
     계보: v0.15: Stone Burst / v0.15.5: Five Roles / v0.16: Front Avatars /
           v0.17: Energy Trail & Impact / v0.18: Actor Feedback & 2.5D Stage / v0.18B: Scatter & Rumble /
           v0.19: Fallen Hero & Dead Block / v0.20: Game Flow Shell / v0.20B: Codex Navigation /
           v0.21: 20 Job Framework & Armor / v0.22: 5 Battle Mini Run / v0.23: Boss Reaction /
           v0.24: Hybrid Effect Timing / v0.25: Mage Empower / v0.26: Hit ArmorDown /
           v0.27: Enemy Poison & Cleanse / v0.28: Readability & Status Visibility /
           v0.29: Presence & Space Expansion / v0.30: Ally Formation / v0.31: Exchange FX /
           v0.32: 10 Job Roster / v0.33: Block Presence Hotfix / v0.34: Grip & Rear Perspective /
           v0.35: Stage Composition / v0.36: Readability Playtest / v0.37: Damage & Signature FX /
           v0.38: Chain Momentum / v0.39: Shield Gem 4 Jobs / v0.39A: Float Anchor & Banner /
           v0.39B: Float Visibility & Air-Rise / v0.40: Greatsword 4 Jobs / v0.40A: Combat Grammar /
           v0.40B: Board Soft Settlement / v0.40C: Combat Text Readability /
           v0.40D: Board Impact Echo / v0.40E: Chain Visual Polish /
           v0.41: Aim Gem 4 Jobs / v0.41A: Board Feel Recovery /
           v0.42: Mana Gem 4 Jobs -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emblem Quest Lab</title>
<style>
  :root{
    --bg:#14121f;
    --panel:#201c31;
    --panel2:#2a2440;
    --line:#3a3354;
    --ink:#e8e4f2;
    --dim:#9a93b5;
    --gold:#e8b34b;
    --hp:#5fc77a;
    --hp-low:#d8554a;
    --enemy-hp:#d8554a;
    /* v0.15.5: 5계열 블록 색상 언어 확정 (FABLE_TASK_015B) */
    --c-blade:#cf5b45;  /* 대검석 · 근접 딜러 — 적/주홍 */
    --c-mana:#9b6fd0;   /* 마나석 · 서포터 — 보라/별빛 */
    --c-heal:#e2c878;   /* 치유석 · 힐러 — 금/크림 */
    --c-guard:#5d83c4;  /* 방패석 · 탱커 — 강철 남청 */
    --c-bow:#4fae8e;    /* 조준석 · 원거리 딜러 — 청록/바람 (v0.32: 활석→조준석, 내부 변수명은 보존) */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    display:flex;justify-content:center;
    touch-action:manipulation;
    user-select:none;-webkit-user-select:none;
  }
  #app{
    width:100%;max-width:430px;
    min-height:100dvh;
    display:flex;flex-direction:column;
    padding:8px 10px 8px;
    gap:7px;
    position:relative;
  }
  /* ---------- 상단 ---------- */
  /* ---------- 상단 HUD (v0.29: 액자 프레임 제거 — 부유 오버레이) ---------- */
  #hud{
    position:absolute;top:13px;left:18px;right:18px;z-index:30;
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none; /* 전장 터치를 막지 않음 — 버튼만 예외 */
  }
  #hud #stageLabel{
    font-size:10.5px;color:var(--dim);
    background:rgba(16,12,28,.6);border-radius:7px;padding:2px 9px;
    letter-spacing:.3px;
  }
  #pauseBtn{
    pointer-events:auto;cursor:pointer;
    width:32px;height:32px;border-radius:50%;
    background:rgba(32,28,49,.82);color:var(--dim);
    border:1px solid var(--line);font-size:16px;line-height:1;
    transition:color .2s, border-color .2s;
  }
  #pauseBtn:active{color:var(--gold);border-color:var(--gold);}
  /* ---------- 적 진영: 아바타 전장 (전열/후열) ---------- */
  /* v0.39A (C항목): 필살기 띠지 배너 — 왼쪽에서 슈악 → 파팟 → 사라짐.
     enemyArea 상단의 빈 공간(몬스터는 하단 정렬)에 떠서 전투 정보를 가리지 않는다 */
  #ultBanner{ /* v0.39B (C항목): boardWrap 기준 top:-46px — 전장 하단/보드 직상, 해상도 무관 고정 */
    position:absolute;left:0;top:-46px;z-index:30;
    transform:translateX(-105%);opacity:0;
    background:linear-gradient(90deg, rgba(22,15,44,.96) 0%, rgba(56,38,94,.92) 58%, rgba(56,38,94,0) 100%);
    border-left:4px solid var(--ub,#e8b34b);
    color:#fff;font-size:16.5px;font-weight:900;letter-spacing:1.5px;
    padding:7px 30px 7px 13px;
    text-shadow:0 0 10px var(--ub,#e8b34b), 0 2px 4px rgba(0,0,0,.8);
    pointer-events:none;white-space:nowrap;
  }
  #ultBanner.show{animation:ultIn 1.25s cubic-bezier(.2,.9,.3,1) forwards;} /* v0.40C: 읽힘 ≈2배 (.62s→1.25s) — 돌입 임팩트 유지 + 읽는 시간 길게 + 후반 페이드 */
  @keyframes ultIn{ /* v0.40C: 단발 forwards (무한 0). 전반 돌입 → ~62% 또렷 → 100% 우측 흩어지며 소멸 */
    0%{transform:translateX(-105%);opacity:0}
    9%{transform:translateX(0);opacity:1}       /* 슈악 — 좌→우 돌입 (전반 압축) */
    14%{transform:translateX(-5px);opacity:1}   /* 파팟 — 짧은 반동 */
    18%{transform:translateX(0)}
    62%{transform:translateX(0);opacity:1}      /* 필살기명 읽는 시간 — 길게 유지 */
    100%{transform:translateX(20px);opacity:0}  /* 후반 오른쪽으로 서서히 흩어짐 (부드러운 소멸) */
  }
  #enemyArea{
    flex:1; /* 남는 세로 공간을 몬스터 진영이 흡수 — 위로 넓어진 전장 */
    min-height:150px;
    position:relative;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:12px 8px 10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
  }
  /* 3열 진영: 후후열(가장 멀리) → 중간열 → 전열 */
  /* v0.11: 적은 수일 때도 가로로 퍼져 전장을 점유 (space-evenly), 다수일 때는 gap이 최소 간격 */
  /* v0.28: 모바일 최소 표현 크기 우선 — 원근감은 유지하되 축소 배율을 완화 (.68→.74 / .84→.88),
     음수 여백도 완화해 후열 HP바/배지가 전열 몸체에 덜 묻히게 */
  .rowBack{
    display:flex;justify-content:space-evenly;align-items:flex-end;gap:6px;
    transform:scale(.74);opacity:.88;
    margin-bottom:-3px;
  }
  .rowMid{
    display:flex;justify-content:space-evenly;align-items:flex-end;gap:7px;
    transform:scale(.88);opacity:.94;
    margin-bottom:-5px;
  }
  .rowFront{
    display:flex;justify-content:space-evenly;align-items:flex-end;gap:8px;
  }
  /* 마법사 원형 파동 예고: 적 진영 중앙의 점선 원 */
  .wavePre{
    position:absolute;left:50%;top:50%;
    width:128px;height:128px;transform:translate(-50%,-50%);
    border:2px dashed rgba(190,150,255,.8);border-radius:50%; /* v0.15.5: 마나 별빛 */
    animation:preePulse 1.3s ease-in-out infinite;
    pointer-events:none;z-index:5;
  }
  @keyframes preePulse{
    0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.75}
    50%{transform:translate(-50%,-50%) scale(1.12);opacity:1}
  }
  .mob{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:opacity .3s;
  }
  /* v0.13: 같은 열 안 사선 층위 — 짝수 번째가 살짝 위로, 바끼리 겹치지 않음 */
  .rowFront .mob:nth-child(even){margin-bottom:10px;}
  .rowMid .mob:nth-child(even){margin-bottom:8px;}
  .rowBack .mob:nth-child(even){margin-bottom:7px;}
  /* HP바/게이지에 어두운 외곽선 — 뒤 몸체 위에서도 읽힘 */
  .mob .mini,.mob .gauge{box-shadow:0 0 0 1.5px rgba(13,10,22,.75);}
  .mob.dead{opacity:.15;filter:grayscale(1);}
  .mob.hit{animation:shake .28s;} /* v0.17: 진폭/회전 과장 + 짧은 명중 섬광 */
  @keyframes shake{
    0%{transform:translateX(0);filter:brightness(1)}
    18%{transform:translateX(-7px) rotate(-2deg);filter:brightness(1.55)}
    45%{transform:translateX(6px) rotate(1.5deg);filter:brightness(1.15)}
    72%{transform:translateX(-3px);filter:brightness(1)}
    100%{transform:translateX(0);filter:brightness(1)}
  }
  .mob.charge .mAv{animation:chargeGlow .9s infinite;}
  @keyframes chargeGlow{
    0%,100%{filter:drop-shadow(0 0 3px rgba(216,85,74,.4))}
    50%{filter:drop-shadow(0 0 11px rgba(216,85,74,.95))}
  }
  .mob.reactShake{animation:armorClench .45s ease-out;} /* v0.23: 장갑 강화 1회 반응 */
  @keyframes armorClench{
    0%{transform:translateX(0)}
    15%{transform:translateX(-4px) scale(1.05)}
    32%{transform:translateX(4px) scale(1.05)}
    48%{transform:translateX(-3px) scale(1.02)}
    64%{transform:translateX(2px)}
    100%{transform:translateX(0)}
  }
  .mob.armored::after{ /* v0.22: 철갑(고방어) 표식 — 정적, 카드 우상단 */
    content:'🛡';position:absolute;top:-6px;right:-4px;font-size:11px;z-index:7;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));
  }
  .mob.armored{border-color:#4a6090;} /* 강철톤 테두리 — 한눈에 "단단함" */
  .mob.venom{border-color:#6c4a90;} /* v0.27: 독성 박쥐 — 보랏빛 테두리 (아바타 재작업 없이 구분) */
  .mob.venom .mAv{filter:hue-rotate(40deg) saturate(1.3);} /* 박쥐 조형 재사용 + 독기 틴트 */
  .mob .stRow{ /* v0.21 도입 → v0.28: 모바일 가독 보정 (크기/패딩/대비 상향) */
    position:absolute;top:-5px;left:-5px;display:flex;gap:2px;z-index:7;
  }
  .mob .stRow i{
    font-style:normal;font-size:9.5px;font-weight:800;line-height:14px;
    background:#171022;border:1px solid #6e4a78;border-radius:7px;
    padding:0 5px;color:#e8c8ff;
    box-shadow:0 1px 4px rgba(0,0,0,.6);
  }
  /* v0.29: 색 언어 통일 — 같은 효과는 양 진영에서 같은 색으로 읽힌다.
     독(해로움) = 녹색 / 방깎(틈) = 강철청 / 강화(이로움) = 보라 / 남은 사용 횟수 = 골드 */
  .mob .stRow i.stP{border-color:#5d8a4a;color:#cdf0a8;background:#16210f;}
  .mob .stRow i.stA{border-color:#4a6aa4;color:#bcd0ec;}
  .mob .stRow b{ /* v0.28: 남은 사용 횟수 — "앞으로 몇 번 더 틈을 이용할 수 있는가" */
    font-weight:900;color:#ffd97a;margin-left:1px;
  }
  .mob .intent{
    position:absolute;top:-16px;left:50%;transform:translateX(-50%);
    background:#5b1f1f;color:#ffd28a;border:1px solid #a35b2c;
    font-size:10px;padding:1px 7px;border-radius:8px;white-space:nowrap;
    animation:pulse 1s infinite;z-index:6;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .mob .mini{width:48px;height:5px;background:#171425;border-radius:3px;overflow:hidden;}
  .mob .mini i{display:block;height:100%;background:var(--enemy-hp);border-radius:3px;transition:width .3s;}
  .mAv{position:relative;}
  /* 대량 쇼케이스(18체): HP바 간소화로 지저분함 방지 */
  #enemyArea.showcase .mob .mini{width:28px;height:3px;}
  #enemyArea.showcase .mob .gauge{display:none;}
  /* 행동 게이지: HP바와 구분되는 청회색, 만충 임박 시 주황 + 떨림 */
  .mob .gauge{width:48px;height:3px;background:#171425;border-radius:2px;overflow:hidden;margin-top:1px;}
  .mob .gauge i{display:block;height:100%;width:0%;background:#7e8fc0;border-radius:2px;}
  .kind-boss .gauge{width:152px;}
  .mob.ready .gauge i{background:#e08a3a;}
  .mob.ready{animation:tremble .16s linear infinite;}
  /* v0.28: poison tick 림라이트 — "지금 독이 발동했다"의 단발 신호 (0.42s, 무한 총량 불변).
     녹색 = 독의 시각 언어 통일 (덫꾼 독/박쥐 독침 동일). ☠-N 플로팅과 역할 분담:
     플로팅 = 수치, 림라이트 = 발동 순간의 체감. 적 .charge와 겹치면 림라이트가 잠깐 우선,
     아군 .act(행동 런지)와 겹치면 행동 연출 우선 (캐스케이드 순서 — 의도된 우열) */
  .mob.ptick .mAv{animation:poisonPulse .42s ease-out;}
  .ally.ptick .av{animation:poisonPulse .42s ease-out;}
  @keyframes poisonPulse{
    0%{filter:brightness(1)}
    30%{filter:drop-shadow(0 0 9px rgba(140,225,95,.95)) brightness(1.3) saturate(1.3)}
    100%{filter:brightness(1)}
  }
  @keyframes tremble{0%,100%{transform:translateX(0)}50%{transform:translateX(1.7px)}}
  @keyframes bob{0%,100%{transform:translateY(0) scale(var(--bobScale,1))}50%{transform:translateY(-3px) scale(var(--bobScale,1))}} /* v0.30: --bobScale 합성 (전열 미세 확대용 — 고블린 등 미지정=1) */

  /* 슬라임: 말랑한 덩어리 */
  .kind-slime .mAv{width:52px;height:38px;}
  .slBody{
    width:52px;height:38px;position:relative;
    background:radial-gradient(circle at 32% 26%, #a8ecb8, #4aa862 72%);
    border-radius:46% 46% 42% 42% / 64% 64% 38% 38%;
    animation:squish 1.9s ease-in-out infinite;
  }
  .slBody::before{ /* v0.29: 정면 응시 강화 — 눈 확대 (6×8→7×9) */
    content:'';position:absolute;top:12px;left:13px;
    width:7px;height:9px;background:#173021;border-radius:50%;
    box-shadow:17px 0 #173021;
  }
  .slBody::after{ /* v0.29: 작은 입 — "나를 보는 생물" */
    content:'';position:absolute;top:25px;left:50%;transform:translateX(-50%);
    width:8px;height:4px;background:#173021;border-radius:0 0 8px 8px;opacity:.8;
  }
  @keyframes squish{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.86) scaleX(1.07)}}

  /* 고블린 일반 */
  .kind-goblin .mAv{width:54px;height:64px;animation:bob 2.2s ease-in-out infinite;}
  .gHead{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:26px;height:22px;background:#8fae5a;border-radius:8px;z-index:2;
  }
  .gHead::before,.gHead::after{
    content:'';position:absolute;top:4px;width:9px;height:9px;
    background:#8fae5a;border-radius:1px 5px 1px 5px;
  }
  .gHead::before{left:-7px;transform:rotate(-18deg);}
  .gHead::after{right:-7px;transform:rotate(18deg) scaleX(-1);}
  .gTorso{
    position:absolute;top:19px;left:50%;transform:translateX(-50%);
    width:34px;height:33px;background:#6d5234;border-radius:8px 8px 10px 10px;
  }
  .gFace{ /* v0.29: 고블린/정예 공용 눈 — 정면 응시 (글린트 포함) */
    position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
    width:18px;height:7px;z-index:3;
  }
  .gFace::before,.gFace::after{
    content:'';position:absolute;bottom:1px;width:5px;height:6px;border-radius:50%;
    background:radial-gradient(circle at 35% 28%, #d8efa8 22%, #1d2b12 34%);
  }
  .gFace::before{left:2px;} .gFace::after{right:2px;}
  .gClub{
    position:absolute;right:0;top:10px;width:8px;height:29px;
    background:#5a4226;border-radius:4px 4px 3px 3px;transform:rotate(14deg);
  }

  /* 고블린 정예: 더 크고 무장 */
  .kind-elite .mAv{width:70px;height:84px;animation:bob 2.6s ease-in-out infinite;}
  .kind-elite .gHead{top:7px;}
  .eHelm{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:31px;height:12px;background:#aab4c8;border-radius:8px 8px 0 0;z-index:3;
  }
  .eHelm::after{
    content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
    width:8px;height:13px;background:#c84a3a;border-radius:4px;
  }
  .eTorso{
    position:absolute;top:26px;left:50%;transform:translateX(-50%);
    width:45px;height:41px;background:#52607a;
    border:2.5px solid #2e3850;border-radius:9px;
  }
  .eBlade{
    position:absolute;right:-4px;top:8px;width:9px;height:47px;
    background:linear-gradient(#eef2fa,#9fb0cc);border-radius:4px;transform:rotate(16deg);
  }

  /* 박쥐: 날갯짓 */
  /* v0.28: 소형 몬스터 최소 표현 크기 — hover에 --mScale 합성 (레이아웃 박스 불변, 시각만 보정).
     박쥐(62×36 본체 ~18px)가 후열 축소까지 겹치면 식별 불가 → 행별 역보정 (실루엣 개성은 유지) */
  .kind-bat .mAv{width:62px;height:36px;animation:hover 1.6s ease-in-out infinite;}
  .rowBack .kind-bat .mAv{--mScale:1.16;}
  .rowMid .kind-bat .mAv{--mScale:1.08;}
  .bBody{
    position:absolute;left:50%;top:7px;transform:translateX(-50%);
    width:18px;height:22px;background:#4a3a5e;border-radius:9px;z-index:2;
  }
  .bBody::before{ /* v0.29: 눈 확대(4→5px) + 발광 — 몸이 작아도 눈은 읽힌다 */
    content:'';position:absolute;top:5px;left:3px;
    width:5px;height:5px;background:#ffb09f;border-radius:50%;
    box-shadow:7px 0 #ffb09f, 0 0 5px rgba(255,130,110,.95), 7px 0 5px rgba(255,130,110,.95);
  }
  .wing{position:absolute;top:6px;width:25px;height:19px;background:#3a2c4a;}
  .wl{left:0;clip-path:polygon(100% 15%,0 0,22% 100%,100% 85%);transform-origin:right center;animation:flapL .5s ease-in-out infinite alternate;}
  .wr{right:0;clip-path:polygon(0 15%,100% 0,78% 100%,0 85%);transform-origin:left center;animation:flapR .5s ease-in-out infinite alternate;}
  @keyframes flapL{from{transform:rotate(10deg)}to{transform:rotate(-20deg)}}
  @keyframes flapR{from{transform:rotate(-10deg)}to{transform:rotate(20deg)}}
  @keyframes hover{0%,100%{transform:translateY(0) scale(var(--mScale,1))}50%{transform:translateY(-5px) scale(var(--mScale,1))}}

  /* 거대 보스: 상단 공간을 점유하는 단독 아바타 */
  .kind-boss .mAv{width:196px;height:142px;animation:breath 3s ease-in-out infinite;}
  .bossBody{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:168px;height:122px;
    background:radial-gradient(circle at 50% 26%, #5e2c50, #2a1230 76%);

    border-radius:42% 42% 30% 30% / 55% 55% 24% 24%;
  }
  .hornL,.hornR{
    position:absolute;top:-6px;width:0;height:0;z-index:2;
    border-left:14px solid transparent;border-right:14px solid transparent;

  }
  .hornL{left:28px;transform:rotate(-24deg);}
  .hornR{right:28px;transform:rotate(24deg);}
  .eye{
    position:absolute;top:40px;width:17px;height:11px;
    background:#ffd24a;border-radius:50%;
    box-shadow:0 0 9px #ffae3a;animation:blink 4.2s infinite;
  }
  .eye::after{ /* v0.29: 동공 — 정면(플레이어)을 내려다보는 시선 */
    content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
    width:7px;height:7px;background:#3a1408;border-radius:50%;
  }
  .el{left:50px;} .er{right:50px;}
  .maw{
    position:absolute;top:70px;left:50%;transform:translateX(-50%);
    width:58px;height:16px;background:#160a18;border-radius:0 0 21px 21px;
  }
  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  @keyframes blink{0%,46%,50%,100%{transform:scaleY(1)}48%{transform:scaleY(.12)}}
  .kind-boss .mini{width:152px;height:7px;}

  /* 플로팅 텍스트 (기존 유지) */
  .float{
    /* v0.39B: 전장 오버레이(#trailLayer, z29) 절대좌표 — 유닛 재렌더와 독립 (좌표는 JS 인라인).
       Air-Rise: 머리 위에서 팟 하고 출발 → 더 위 공중(-36px)으로 상승하며 페이드아웃 */
    position:absolute;
    transform:translateX(-50%);
    font-size:15px;font-weight:800;
    pointer-events:none;
    animation:floatUp .85s ease-out forwards;
    text-shadow:0 1px 3px rgba(0,0,0,.7);
    white-space:nowrap;
  }
  /* v0.37 (A항목): 데미지 = 전투 판단 정보. 종류별 언어 분리 —
     dmg 일반(적) / dmgBig 강화 일격 / clang 철갑 막힘("안 박힌다") / poison 독("흐르는 피해") */
  .float.dmg{color:#ff8a7d;font-size:16px;}
  .float.dmgBig{
    color:#e7c4ff;font-size:18.5px;font-weight:900;
    text-shadow:0 0 9px rgba(202,166,255,.75), 0 1px 3px rgba(0,0,0,.7);
  }
  .float.clang{ /* 철갑/방어 막힘 — 탁한 강철, 둔탁하게 튕겨 떨어짐: "이건 그냥은 안 들어간다" */
    color:#9aa6b8;font-size:13.5px;font-weight:900;
    animation:clangDrop .8s ease-out forwards;
  }
  @keyframes clangDrop{
    0%{opacity:0;transform:translate(-50%,2px) scale(.9)}
    18%{opacity:1;transform:translate(calc(-50% + 3px),-4px) scale(1.06)}
    36%{transform:translate(calc(-50% - 2px),-7px) scale(1)}
    100%{opacity:0;transform:translate(-50%,3px) scale(.9)}
  }
  .float.poison{ /* 독 — 녹색 + 좌우 흔들림 (나라님 PASS 표현의 명문화) */
    color:#9fe07a;animation:poisonShake .85s ease-out forwards;
  }
  @keyframes poisonShake{
    0%{opacity:0;transform:translate(-50%,6px) scale(.8)}
    16%{opacity:1;transform:translate(calc(-50% - 3px),0) scale(1.08)}
    32%{transform:translate(calc(-50% + 3px),-5px)}
    48%{transform:translate(calc(-50% - 2px),-10px)}
    100%{opacity:0;transform:translate(-50%,-32px) scale(1)} /* v0.39B: 공중 상승 동기 */
  }
  .float.heal{color:#7df0a0;}
  .float.guard{color:#ffd97a;}
  .float.shout{ /* v0.40A (B항목): 액터 머리 위 "대사 외침" — 4블록 타이틀/스킬 발동.
     피해 숫자(floatUp 상승)와 모션 분리: 살짝 튀어올랐다 제자리 소멸 + 같은 스태거 큐로 비겹침 */
    color:#ffe9b0;font-size:16.5px;font-weight:900;letter-spacing:.5px;
    text-shadow:0 0 8px rgba(232,179,75,.8), 0 1px 3px rgba(0,0,0,.8);
    animation:shoutPop 1.5s cubic-bezier(.2,.9,.3,1) forwards; /* v0.40C: 읽힘 시간 ≈2배 (.75s→1.5s) — 등장 임팩트 전반 압축 + 유지 길게 + 후반 페이드 */
  }
  @keyframes shoutPop{ /* v0.40C: 단발 forwards (무한 0). 9% 튀어오름 → ~60% 또렷 유지 → 100% 서서히 소멸 */
    0%{opacity:0;transform:translate(-50%,6px) scale(.6)}
    9%{opacity:1;transform:translate(-50%,-7px) scale(1.18)}  /* 외침 — 튀어오름 (전반 압축) */
    17%{transform:translate(-50%,-4px) scale(1)}
    60%{opacity:1;transform:translate(-50%,-6px) scale(1)}    /* 또렷하게 읽는 시간 — 길게 유지 */
    100%{opacity:0;transform:translate(-50%,-14px) scale(.94)} /* 후반 서서히 페이드아웃 (뚝 꺼지지 않음) */
  }
  @keyframes floatUp{ /* v0.39B Air-Rise: 머리 위 출발 → 공중 -36px */
    0%{opacity:0;transform:translate(-50%,4px) scale(.7)}
    16%{opacity:1;transform:translate(-50%,-3px) scale(1.14)} /* 팟! */
    100%{opacity:0;transform:translate(-50%,-36px) scale(1)}
  }
  /* ---------- 보드 ---------- */
  #boardWrap{position:relative;perspective:700px;} /* v0.18: 2.5D 전장판 — #board rotateX 원근 (FAKE_3D_DEPTH) */
  /* v0.18: 전장판 하단 두께 — 판이 살짝 떠 있는 받침 인상 */
  #boardWrap::after{
    content:'';position:absolute;left:5px;right:5px;bottom:-6px;height:8px;
    background:linear-gradient(#1c1730,#0a0814);
    border-radius:0 0 11px 11px;z-index:-1;
  }
  #board{
    transform-origin:50% 60%; /* v0.18: rotateX 기준점 — 하단 변형 최소화 (조작 시야 보호) */
    display:grid;
    grid-template-columns:repeat(7,1fr);
    touch-action:none; /* 스와이프 입력과 스크롤 충돌 방지 */
    gap:5px;
    aspect-ratio:1/1; /* 7×7 정사각 전장 */
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:7px;
  }
  /* v0.15: 블록 = 2.5D 전투 스톤 — 상단 하이라이트 + 측면 베벨 + 하단 두께감.
     그라데이션/inset 그림자만 사용. blur·상시 filter 없음 (모바일 성능). */
  .cell{
    --tc:#5a5470; /* 속성색: t0~t4가 덮어씀 */
    position:relative;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(15px,5.4vw,24px);
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s, opacity .2s, border-color .1s;
    background:#171425; /* 빈 칸 (낙하 과도기) */
  }
  /* ⚠ v0.33 결함 수선: v0.32의 .tN→.jb-* 일괄 치환이 보드 셀 CSS까지 오염 — JS는 'cell t'+t를
     부여하므로 v0.32 빌드에서 블록 배경/베벨/속성색이 전부 미적용(빈 칸 배경만)이었다.
     이번 핫픽스("블록이 밋밋하다")의 주 원인. .t0~.t4로 원복 + B/C항 강화 통합 */
  .cell.t0,.cell.t1,.cell.t2,.cell.t3,.cell.t4{
    border-color:color-mix(in srgb,var(--tc) 48%,#06040c);
    background:
      radial-gradient(circle at 32% 22%, rgba(255,255,255,.32), rgba(255,255,255,0) 44%), /* 상단 글로스 */
      linear-gradient(168deg,
        color-mix(in srgb,var(--tc) 60%,#332b4d) 0%,
        color-mix(in srgb,var(--tc) 36%,#191427) 56%,
        color-mix(in srgb,var(--tc) 18%,#0d0a16) 100%);
    box-shadow:
      inset 0 2px 2.5px rgba(255,255,255,.24),  /* 상단 유리 하이라이트 */
      inset 1.5px 0 1.5px rgba(255,255,255,.07),/* 좌측 미세 베벨 */
      inset -1.5px 0 2px rgba(0,0,0,.30),       /* v0.33: 우측 음영 — 4면 볼륨 */
      inset 0 -4px 5px rgba(0,0,0,.55),         /* 하단 두께/음영 */
      inset 0 0 9px color-mix(in srgb,var(--tc) 36%,transparent), /* v0.33: 내부 발광 — 담긴 힘 (정적) */
      0 2.5px 4px rgba(0,0,0,.42);              /* 보드에서 살짝 뜬 느낌 */
    text-shadow:0 2px 3px rgba(0,0,0,.55);      /* 심볼도 조각처럼 박힌 인상 */
  }
  /* v0.33 (C항목): 마나 코어 — 심볼 아래 깔리는 중심 발광. 정적 1레이어 ("몸체 + 그 안의 상징") */
  .cell.t0::before,.cell.t1::before,.cell.t2::before,.cell.t3::before,.cell.t4::before{
    content:'';position:absolute;inset:20% 17%;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,
      color-mix(in srgb,var(--tc) 52%,#ffffff22) 0%,
      color-mix(in srgb,var(--tc) 28%,transparent) 44%, transparent 70%);
    opacity:.55;
  }
  .cell.t0{--tc:var(--c-blade);}
  .cell.t1{--tc:var(--c-mana);}
  .cell.t2{--tc:var(--c-heal);}
  .cell.t3{--tc:var(--c-guard);}
  .cell.t4{--tc:var(--c-bow);}
  /* v0.33 (F항목): 타입별 몸체 개성 — "힘의 매개체" 공통 구조 위의 가벼운 차이 */
  .cell.t0{border-radius:7px;} /* 대검석: 각진 단면 + 사선 빛줄기 — 날카로움 */
  .cell.t0::after{
    content:'';position:absolute;inset:0;border-radius:7px;pointer-events:none;
    background:linear-gradient(135deg, transparent 44%, rgba(255,255,255,.15) 50%, transparent 56%);
  }
  .cell.t3{ /* 방패석: 매트 강철 — 금속 림 1줄, 글로스 절제 */
    box-shadow:
      inset 0 2px 2px rgba(255,255,255,.16),
      inset 0 0 0 1.5px rgba(186,202,228,.22),
      inset -1.5px 0 2px rgba(0,0,0,.30),
      inset 0 -4px 5px rgba(0,0,0,.58),
      inset 0 0 9px color-mix(in srgb,var(--tc) 32%,transparent),
      0 2.5px 4px rgba(0,0,0,.42);
  }
  .cell.t2{border-radius:13px;} /* 치유석: 둥글고 부드러운 성질 */
  .cell.t2::before{opacity:.7;inset:16% 13%;} /* 밝은 코어 */
  .cell.t1::before{opacity:.75;} /* 마나석: 가장 짙은 코어 — 신비 */
  .cell.t1{box-shadow:
      inset 0 2px 2.5px rgba(255,255,255,.24), inset 1.5px 0 1.5px rgba(255,255,255,.07),
      inset -1.5px 0 2px rgba(0,0,0,.30), inset 0 -4px 5px rgba(0,0,0,.55),
      inset 0 0 11px color-mix(in srgb,var(--tc) 46%,transparent),
      0 0 5px rgba(155,111,208,.28), 0 2.5px 4px rgba(0,0,0,.42);} /* 외광은 절제 수위 */
  .cell.t4::before{ /* 조준석: 동심 링 1개 — 집중/정확 */
    box-shadow:inset 0 0 0 1.5px color-mix(in srgb,var(--tc) 55%,transparent);
  }
  /* v0.15.5: 마나석(✦)/치유석(✚)은 텍스트 글리프 — 밝은 색 + 미세 발광으로 이모지급 가독 확보 */
  .cell.t1,.cell.t2{font-weight:900;font-size:clamp(17px,6.1vw,27px);}
  .cell.t1{color:#efe6ff;text-shadow:0 0 6px rgba(190,150,255,.85),0 2px 3px rgba(0,0,0,.55);}
  .cell.t2{color:#fff6dc;text-shadow:0 0 6px rgba(240,210,130,.85),0 2px 3px rgba(0,0,0,.55);}
  .cell:active{transform:scale(.94);} /* 누르는 손맛 */
  .cell.sel{
    border-color:var(--gold);transform:scale(1.08);
    box-shadow:
      inset 0 2px 2px rgba(255,255,255,.24),
      inset 0 -3px 4px rgba(0,0,0,.50),
      0 0 8px rgba(232,179,75,.55);
  }
  /* v0.15: 매치 직전 반응 — 힘이 응축되며 squash&stretch로 부르르
     v0.18: 3단계 가중 (p2=4매치/2연쇄, p3=5매치/3연쇄+) + 위로 솟는 2.5D 높이감(--lift)
     배율 상수: PRIME_INTENSITY(--prime-k), STONE_LIFT_STRENGTH(--lift) */
  .cell.primed{
    border-color:#fff;
    filter:brightness(1.45); /* 200ms 한정 사용 — 상시 아님 */
    animation:prime .2s ease-in forwards;
    z-index:2;
  }
  @keyframes prime{
    0%{transform:scale(1)}
    30%{transform:scale(1.07,.92) rotate(-3deg)}
    60%{transform:scale(.93,1.08) rotate(3deg)}
    100%{transform:translateY(calc(var(--lift,7px)*-.45)) scale(calc(1 + .12*var(--prime-k,1)))}
  }
  .cell.primed.p2{ /* 4매치/2연쇄: 더 강한 부풀음+발광 */
    filter:brightness(1.6);
    animation:prime2 .2s ease-in forwards;
  }
  @keyframes prime2{
    0%{transform:scale(1)}
    28%{transform:scale(1.1,.88) rotate(-5deg)}
    58%{transform:scale(.9,1.12) rotate(5deg)}
    100%{transform:translateY(calc(var(--lift,7px)*-.7)) scale(calc(1 + .17*var(--prime-k,1)))}
  }
  .cell.primed.p3{ /* 5매치/3연쇄+: 내부 압력 — 명확한 압축 후 팡 직전까지 */
    filter:brightness(1.8);
    animation:prime3 .2s ease-in forwards;
  }
  @keyframes prime3{
    0%{transform:scale(1)}
    26%{transform:scale(1.12,.84) rotate(-6deg)}
    52%{transform:scale(.84,1.14) rotate(6deg)}
    74%{transform:scale(.8)} /* 압축: 안으로 응축 */
    100%{transform:translateY(calc(var(--lift,7px)*-1)) scale(calc(1 + .24*var(--prime-k,1)))}
  }
  /* v0.15: 팡! 터짐 — 한 번 부풀었다가 수축 소멸 (단순 fade 아님). v0.18: 가중 변형 추가 */
  /* v0.33 (D항목): 파괴 = ①짧은 응축+증광 ②팡! ③수축 소멸 — "힘이 담긴 조각이 깨지며 방출" */
  .cell.removing{animation:popOut .21s ease-in forwards;}
  @keyframes popOut{
    0%{transform:scale(1.06);opacity:1;filter:brightness(1.25)}
    28%{transform:scale(.80);opacity:1;filter:brightness(1.8)}   /* 응축 — 힘이 안으로 모인다 */
    60%{transform:scale(1.45);opacity:.95;filter:brightness(1.5)} /* 팡! */
    100%{transform:scale(.12);opacity:0;filter:brightness(1)}
  }
  .cell.removing.p2{animation:popOut2 .21s ease-in forwards;}
  @keyframes popOut2{
    0%{transform:translateY(calc(var(--lift,7px)*-.7)) scale(1.1);opacity:1;filter:brightness(1.4)}
    28%{transform:translateY(calc(var(--lift,7px)*-.7)) scale(.76);opacity:1;filter:brightness(2)}
    60%{transform:translateY(calc(var(--lift,7px)*-.7)) scale(1.58);opacity:.95;filter:brightness(1.6)}
    100%{transform:scale(.1);opacity:0;filter:brightness(1)}
  }
  .cell.removing.p3{animation:popOut3 .22s ease-in forwards;}
  @keyframes popOut3{
    0%{transform:translateY(calc(var(--lift,7px)*-1)) scale(.86);opacity:1;filter:brightness(1.6)} /* prime3 압축에서 */
    26%{transform:translateY(calc(var(--lift,7px)*-1)) scale(.7);opacity:1;filter:brightness(2.2)} /* 한계 응축 */
    58%{transform:translateY(calc(var(--lift,7px)*-1)) scale(1.7);opacity:.95;filter:brightness(1.7)} /* 대팡! */
    100%{transform:scale(.08);opacity:0;filter:brightness(1)}
  }
  /* v0.40B (FABLE_TASK_040B): 보드 물성 — 딱딱한 정렬감 제거.
     ① spawn(신규 낙하): 직선 "딱 멈춤" → ease-out 낙하(0~68%) + 미세 눌림·갸우뚱 settle(68~100%).
        총 시간 .25s 불변 — 내부 배분만 바꿔 Chain Momentum 템포/정착 대기(260×mo)와 정합 유지.
     ② slide(기존 블록 정렬): 종전엔 renderBoard 전체 재렌더로 "순간이동" — 기계적 강제 정렬감의
        진범. 이동 거리(--fall)만큼 위에서 미끄러져 내려와 settle. 셀+gap ≈ 111%/칸 근사.
     ③ --wb(짝수 셀 역방향 갸우뚱 — 전부 같은 방향이면 기계적) / --st(6연쇄+ 들썩 강화, 기본 1).
        전부 forwards 아님·단발(.25s/.23s) — 무한 0 추가, 셀은 다음 렌더에서 재생성되어 잔존 0 */
  .cell.spawn{animation:drop .25s cubic-bezier(.3,.75,.4,1);}
  .cell.spawn:nth-child(even){--wb:-1;}
  @keyframes drop{
    0%{transform:translateY(-18px) scale(.96);opacity:.25}
    68%{transform:translateY(0) scale(1);opacity:1}
    82%{transform:translateY(calc(1.4px * var(--st,1))) rotate(calc(.9deg * var(--wb,1) * var(--st,1))) scale(.985)}
    100%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  }
  .cell.slide{animation:slideSettle .23s cubic-bezier(.3,.75,.4,1);}
  .cell.slide:nth-child(odd){--wb:-1;}
  @keyframes slideSettle{
    0%{transform:translateY(var(--fall,-111%))}
    70%{transform:translateY(0)}
    85%{transform:translateY(calc(1.2px * var(--st,1))) rotate(calc(-.7deg * var(--wb,1) * var(--st,1))) scale(.99)}
    100%{transform:translateY(0) rotate(0deg) scale(1)}
  }
  /* v0.40D (FABLE_TASK_040D): Match Impact Echo — 블록이 깨진 자리 "주변 생존 블록"에 전달되는 미세 여파.
     ★ 충돌 방지: echo는 이번에 이동/생성하지 않은 정지 블록에만 부여(resolveBoard에서 spawnSet/movedBy 제외) →
     slide(slideSettle)·spawn(drop)과 같은 셀에 절대 동시 적용 안 됨 = transform 덮어쓰기 0.
     단발 .15s forwards 아님(다음 렌더에서 셀 재생성 → 잔존 0). 무한 0. "폭발 FX 아님 — 여파". */
  .cell.echo{animation:impactEcho .15s ease-out;}
  .cell.echo:nth-child(even){--eo:-1;} /* 블록마다 다른 방향 — 전부 같으면 기계적 */
  @keyframes impactEcho{ /* 빠르게 살짝 밀렸다 제자리 — rotate≤1.6deg / translate≤1.6px / scale .99~1.01 (--ec=연쇄 강도) */
    0%{transform:translate(0,0) rotate(0deg) scale(1)}
    40%{transform:translate(calc(.8px * var(--eo,1) * var(--ec,1)), calc(-1.2px * var(--ec,1))) rotate(calc(1.4deg * var(--eo,1) * var(--ec,1))) scale(calc(1 + .008 * var(--ec,1)))}
    72%{transform:translate(calc(-.5px * var(--eo,1) * var(--ec,1)), calc(.6px * var(--ec,1))) rotate(calc(-.6deg * var(--eo,1) * var(--ec,1))) scale(calc(1 - .006 * var(--ec,1)))}
    100%{transform:translate(0,0) rotate(0deg) scale(1)}
  }
  /* ---------- v0.15: 터짐 FX 레이어 (보드 위, 터치 통과, 연출 후 노드 즉시 제거) ---------- */
  #burstLayer{position:absolute;inset:0;pointer-events:none;z-index:24;overflow:hidden;border-radius:12px;}
  .fxFlash{ /* 셀 중심 속성색 섬광 — v0.33: 코어 더 크고 짧게 — "방출" 체감 */
    position:absolute;width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#fff 24%,var(--fc,#fff) 48%,transparent 70%);
    transform:translate(-50%,-50%) scale(.35);opacity:1;
    animation:flashOut .2s ease-out forwards;
  }
  @keyframes flashOut{
    32%{transform:translate(-50%,-50%) scale(2.1);opacity:1}
    100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}
  }
  .fxRing{ /* v0.17: 평면 테두리 링 → 에너지 충격파 밴드 (radial 연성 + 살짝 눌린 타원) */
    position:absolute;width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle,
      rgba(255,255,255,0) 42%, var(--fc,#fff) 56%, rgba(255,255,255,.85) 63%, transparent 72%);
    transform:translate(-50%,-50%) scale(.4,.34);opacity:.95;
    animation:ringOut .36s ease-out forwards;
  }
  @keyframes ringOut{
    to{transform:translate(-50%,-50%) scale(var(--fs,3),calc(var(--fs,3)*.84));opacity:0}
  }
  .fxShard{ /* v0.17: 보석 파편 — 흰 하이라이트 단면 + 무작위 크기/초기각 (transform만) */
    position:absolute;width:5px;height:5px;border-radius:1.5px;
    background:linear-gradient(145deg,#fff 10%,var(--fc,#fff) 48%,
      color-mix(in srgb,var(--fc,#fff) 50%,#000) 100%);
    transform:translate(-50%,-50%) rotate(var(--r0,0deg));opacity:.97;
    animation:shardFly .4s ease-out forwards;
  }
  @keyframes shardFly{ /* v0.18: 위로 튀었다가 흩어지며 낙하 — 평면이 아닌 높이감 */
    0%{transform:translate(-50%,-50%) rotate(var(--r0,0deg)) scale(1);opacity:.97}
    32%{transform:translate(calc(-50% + var(--dx,0px)*.4),calc(-50% + var(--dy,0px)*.3 - var(--hop,12px)))
        rotate(calc(var(--r0,0deg) + 90deg)) scale(1.06);opacity:1}
    100%{transform:translate(calc(-50% + var(--dx,0px)),calc(-50% + var(--dy,0px) + var(--hop,12px)*.55))
       rotate(calc(var(--r0,0deg) + 230deg)) scale(.25);opacity:0}
  }
  /* ════ v0.17: 전역 발자취/임팩트 레이어 (#app 전체 — 보드 경계를 넘어 영웅 아바타까지) ════ */
  #trailLayer{position:absolute;inset:0;pointer-events:none;z-index:29;overflow:hidden;}
  .fxDust{ /* 요정가루: 터진 그룹 → 해당 영웅으로 휘어 흐르는 마력 입자 (fxWisp의 후계, v0.15.5→v0.17) */
    position:absolute;width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,var(--fc,#fff) 52%,transparent 78%);
    box-shadow:0 0 6px var(--fc,#fff); /* v0.29: 정적 글로우 — blur() 아님, "별가루" 반짝임의 기초 */
    transform:translate(-50%,-50%) scale(.5);opacity:0;
    animation:dustFly .56s ease-in forwards;
  }
  .fxDust.spark{ /* v0.29: 연쇄 가루의 일부가 더 강한 별 — 연쇄가 클수록 비율 증가 */
    box-shadow:0 0 9px var(--fc,#fff), 0 0 16px rgba(255,255,255,.42);
  }
  @keyframes dustFly{
    0%{transform:translate(-50%,-50%) scale(.5);opacity:0}
    12%{transform:translate(-50%,-50%) scale(1.05);opacity:.95}
    45%{ /* 경유점: 수직 흔들림 경유 — 스르륵 휘어 넘어가는 곡선 + 반짝 팽창 (v0.29: 진폭 상향) */
      transform:translate(calc(-50% + var(--mx,0px)),calc(-50% + var(--my,0px))) scale(1.42);
      opacity:1;
    }
    66%{ /* 두 번째 깜빡임 — 별가루 호흡 */
      transform:translate(calc(-50% + var(--tx,0px)*.72 + var(--mx,0px)*.18),calc(-50% + var(--ty,0px)*.72)) scale(.82);
      opacity:.78;
    }
    84%{ /* v0.18: 도착 직전 — 영웅 쪽으로 모여드는 흡인감 (v0.29: 재점화 상향) */
      transform:translate(calc(-50% + var(--tx,0px)*.95),calc(-50% + var(--ty,0px)*.95)) scale(1.22);
      opacity:1;
    }
    100%{transform:translate(calc(-50% + var(--tx,0px)),calc(-50% + var(--ty,0px))) scale(.25);opacity:0}
  }
  /* v0.29: 쓸쓸한 산화 → v0.31: 제자리 산화 — 좌표(--mx/--tx)가 매치 자리 주변의 작은 터짐/흩어짐으로
     바뀌어 "받아줄 대상이 처음부터 없다"로 읽힌다. ① 생긴다 ② 잠깐 반짝 ③ 힘을 잃고 흩어지며
     ④ 잔불 깜빡 후 가라앉아 산화. 글로우 제거(빛을 잃은 가루) + 산포(--sx) */
  .fxDust.dying{animation:dustDie .82s ease-out forwards;box-shadow:none;}
  @keyframes dustDie{
    0%{transform:translate(-50%,-50%) scale(.5);opacity:0}
    12%{transform:translate(-50%,-50%) scale(1.12);opacity:.95}
    40%{transform:translate(calc(-50% + var(--mx,0px)),calc(-50% + var(--my,0px))) scale(.95);opacity:.62}
    62%{ /* 힘이 빠짐 — 좌우로 흩어지기 시작 (v0.31: 종점 = 제자리 주변) */
      transform:translate(calc(-50% + var(--tx,0px)*.92 + var(--sx,0px)*.45),calc(-50% + var(--ty,0px)*.92 + 4px)) scale(.74);
      opacity:.42;
    }
    74%{opacity:.58} /* 잔불 — 꺼지기 직전 마지막 깜빡임 */
    100%{ /* 받아줄 손이 없는 가루: 퍼지며 가라앉아 소멸 */
      transform:translate(calc(-50% + var(--tx,0px) + var(--sx,0px)),calc(-50% + var(--ty,0px) + 18px)) scale(.16);
      opacity:0;
    }
  }
  .fxAbsorb{ /* 도착 반짝임: 에너지가 영웅에게 닿는 4방 별 십자 */
    position:absolute;width:26px;height:26px;
    transform:translate(-50%,-50%) scale(.3);opacity:0;
    animation:absorbPop .3s ease-out forwards;
  }
  .fxAbsorb::before,.fxAbsorb::after{
    content:'';position:absolute;left:50%;top:50%;
    background:linear-gradient(90deg,transparent,#fff 30%,var(--fc,#fff) 50%,#fff 70%,transparent);
    border-radius:2px;transform:translate(-50%,-50%);
  }
  .fxAbsorb::before{width:100%;height:4px;}
  .fxAbsorb::after{width:4px;height:100%;background:linear-gradient(180deg,transparent,#fff 30%,var(--fc,#fff) 50%,#fff 70%,transparent);}
  @keyframes absorbPop{
    0%{transform:translate(-50%,-50%) scale(.3) rotate(0deg);opacity:0}
    30%{opacity:1}
    100%{transform:translate(-50%,-50%) scale(var(--as,1)) rotate(45deg);opacity:0}
  }
  /* ════ v0.31: 연출 텍스트 — 로그가 아니라 "전투 장면의 자막" (FABLE_TASK_031 C항목)
     보드 상단 중앙, 짧게 떴다 사라짐. 특수 순간(4/5매치·연쇄·강화·대정화)에만 — 3매치는 침묵 */
  .sceneText{
    position:absolute;left:50%;top:8%;
    transform:translateX(-50%) scale(.7);
    font-size:17px;font-weight:900;letter-spacing:1px;
    color:var(--sc,#ffe9b8);
    text-shadow:0 2px 6px rgba(0,0,0,.85), 0 0 13px var(--sc,rgba(232,179,75,.6));
    pointer-events:none;z-index:24;white-space:nowrap;
    animation:scenePop 1s ease-out forwards;
  }
  .sceneText.big{font-size:21px;letter-spacing:2px;}
  .sceneText.small{font-size:14.5px;letter-spacing:.5px;opacity:.95;} /* v0.36: 4매치 — 위계 최하단 (small < 기본 < big) */
  /* v0.39B → v0.40A (A항목) → v0.40E (A/C항목): 연쇄 = "보드 전장의 마나 반응".
     단계별 감정선: c2 "붙었다!"(금) → c3 "흐름이 생겼다"(금+기운) → c4 "보드가 반응한다"(청록 가세)
     → c5 "마나가 끓는다"(보라 점화) → c6 "마나 엔진 폭주"(백보라 max, 6연쇄+ 동일 유지).
     텍스트만 커지지 않게: box-shadow 마나 패널 글로우 + 은은한 배경/테두리로 "에너지 자막"화. filter:blur() 0, 흔들림 0. */
  .sceneText.c2{font-size:19.5px;letter-spacing:1.5px;padding:1px 12px;border-radius:11px;
    text-shadow:0 2px 6px rgba(0,0,0,.9), 0 0 13px var(--sc,rgba(232,179,75,.7));
    box-shadow:0 0 14px rgba(232,179,75,.18);} /* "붙었다!" — 첫 마나 반응 */
  .sceneText.c3{font-size:22px;letter-spacing:2px;padding:1.5px 14px;border-radius:12px;
    text-shadow:0 2px 7px rgba(0,0,0,.9), 0 0 17px var(--sc,rgba(240,196,110,.8));
    box-shadow:0 0 20px rgba(240,196,110,.22);} /* "흐름이 생겼다" */
  .sceneText.c4{font-size:24.5px;letter-spacing:2.5px;padding:2px 16px;border-radius:13px;
    color:#fbecc4;
    text-shadow:0 2px 7px rgba(0,0,0,.92), 0 0 20px rgba(120,210,200,.6), 0 0 12px rgba(240,196,110,.7);
    box-shadow:0 0 26px rgba(120,200,210,.2), inset 0 0 14px rgba(255,240,200,.08);} /* "보드가 반응한다" — 청록 기운 가세 */
  .sceneText.c5{font-size:27px;letter-spacing:3px;padding:2.5px 18px;border-radius:14px;color:#ecdcff;
    text-shadow:0 2px 8px rgba(0,0,0,.92), 0 0 26px rgba(184,138,255,.95);
    box-shadow:0 0 32px rgba(184,138,255,.34), inset 0 0 16px rgba(200,170,255,.12);} /* "마나가 끓는다" — 보라 점화 */
  .sceneText.c6{font-size:29px;letter-spacing:3.5px;padding:3px 20px;border-radius:15px;color:#f4ecff; /* max — 6연쇄+ 동일 유지 */
    text-shadow:0 2px 9px rgba(0,0,0,.95), 0 0 34px rgba(200,160,255,1);
    box-shadow:0 0 40px rgba(190,140,255,.45), inset 0 0 20px rgba(214,180,255,.16);} /* "마나 엔진 폭주" — 백보라 max */
  @keyframes scenePop{
    0%{opacity:0;transform:translateX(-50%) scale(.6)}
    14%{opacity:1;transform:translateX(-50%) scale(1.12)}
    27%{transform:translateX(-50%) scale(1)}
    76%{opacity:1;transform:translateX(-50%) scale(1)}
    100%{opacity:0;transform:translateX(-50%) translateY(-11px) scale(.96)}
  }
  /* ════ v0.31: 도착 FX 프리미티브 (E항목) — 직업 행동의 결과가 도착 지점에서 구분된다.
     전부 단발 forwards, transform/opacity(+정적 그림자) — 무한 총량 불변 */
  .fxSlash{ /* 베기 궤적 — 대검 전사/분쇄자 */
    position:absolute;width:34px;height:5px;border-radius:3px;
    background:linear-gradient(90deg,transparent,#fff 28%,var(--fc,#fff) 55%,transparent);
    box-shadow:0 0 7px var(--fc,#fff);
    transform:translate(-50%,-50%) rotate(var(--ra,-38deg)) scaleX(.2);opacity:0;
    animation:slashSweep .3s ease-out forwards;pointer-events:none;
  }
  .fxSlash.big{width:48px;height:6px;}
  @keyframes slashSweep{
    0%{transform:translate(-58%,-50%) rotate(var(--ra,-38deg)) scaleX(.25);opacity:0}
    28%{opacity:1;transform:translate(-50%,-50%) rotate(var(--ra,-38deg)) scaleX(1.15)}
    100%{transform:translate(-40%,-50%) rotate(var(--ra,-38deg)) scaleX(1.3);opacity:0}
  }
  .fxBlast{ /* 폭발 — 마법사 화염탄/원형 파동 도착점 */
    position:absolute;width:30px;height:30px;border-radius:50%;
    background:radial-gradient(circle, #fff 0%, var(--fc,#fff) 36%, transparent 68%);
    transform:translate(-50%,-50%) scale(.25);opacity:0;
    animation:blastPop .36s ease-out forwards;pointer-events:none;
  }
  .fxBlast::after{content:'';position:absolute;inset:-4px;border:2px solid var(--fc,#fff);border-radius:50%;opacity:.8;}
  .fxBlast.big{width:44px;height:44px;}
  @keyframes blastPop{
    0%{transform:translate(-50%,-50%) scale(.25);opacity:0}
    22%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}
  }
  .fxPierce{ /* 관통/화살 박힘 — 궁수 */
    position:absolute;width:20px;height:2.5px;border-radius:2px;
    background:linear-gradient(90deg,transparent,#fff 40%,var(--fc,#fff));
    box-shadow:0 0 5px var(--fc,#fff);
    transform:translate(-50%,-50%) rotate(-26deg);opacity:0;
    animation:piercePop .2s ease-out forwards;pointer-events:none;
  }
  @keyframes piercePop{
    0%{opacity:0;transform:translate(-95%,-6%) rotate(-26deg) scaleX(.5)}
    45%{opacity:1;transform:translate(-50%,-50%) rotate(-26deg) scaleX(1.1)}
    100%{opacity:0;transform:translate(-44%,-58%) rotate(-26deg) scaleX(1)}
  }
  /* ⚠ v0.33 결함 수선: v0.31이 보드 충격파(.fxRing/@ringOut)와 동명의 도착 FX 링을 추가 —
     뒤 정의가 이겨 보드 팡 링이 점선 링으로 오염되고 있었다 ("팡이 죽은" 두 번째 원인).
     도착 FX를 fxAura/auraOut/auraIn으로 개명, 보드 fxRing/ringOut은 원형 복구 */
  .fxAura{ /* 효과 링 — outward: 정화(벗겨짐)/장갑 균열, .in: 독 침투/마력 주입 */
    position:absolute;width:30px;height:30px;border-radius:50%;
    border:2.5px dashed var(--fc,#fff);
    transform:translate(-50%,-50%) scale(.5);opacity:0;
    animation:auraOut .42s ease-out forwards;pointer-events:none;
  }
  .fxAura.in{animation:auraIn .42s ease-out forwards;}
  @keyframes auraOut{
    0%{transform:translate(-50%,-50%) scale(.5) rotate(0deg);opacity:0}
    25%{opacity:.95}
    100%{transform:translate(-50%,-50%) scale(1.5) rotate(50deg);opacity:0}
  }
  @keyframes auraIn{
    0%{transform:translate(-50%,-50%) scale(1.5) rotate(0deg);opacity:0}
    30%{opacity:.95}
    100%{transform:translate(-50%,-50%) scale(.4) rotate(-50deg);opacity:0}
  }
  .fxRowSlash{ /* v0.40: 선봉대장 가로 검기 — 줄의 높이에서 전장을 좌→우로 가른다 */
    position:absolute;left:4%;right:4%;height:3px;border-radius:2px;
    background:linear-gradient(90deg, transparent, #fff 18%, var(--fc,#fff) 55%, transparent);
    box-shadow:0 0 9px var(--fc,#fff);
    transform:translateY(-50%) scaleX(0);transform-origin:left center;opacity:0;
    animation:rowSlash .42s cubic-bezier(.2,.85,.3,1) forwards;pointer-events:none;
  }
  .fxRowSlash.big{height:5px;box-shadow:0 0 14px var(--fc,#fff), 0 0 26px var(--fc,#fff);}
  @keyframes rowSlash{
    0%{opacity:0;transform:translateY(-50%) scaleX(0)}
    14%{opacity:1}
    52%{opacity:1;transform:translateY(-50%) scaleX(1)} /* 슈악 — 끝까지 가른다 */
    100%{opacity:0;transform:translateY(-50%) scaleX(1)}
  }
  .fxScope{ /* v0.37: 궁수 5매치 조준 — 십자선 링이 "찌이잉" 수축 잠금 */
    position:absolute;width:34px;height:34px;border-radius:50%;
    border:2px solid var(--fc,#fff);
    box-shadow:0 0 7px var(--fc,#fff), inset 0 0 5px var(--fc,#fff);
    transform:translate(-50%,-50%) scale(1.8);opacity:0;
    animation:scopeLock .44s ease-in forwards;pointer-events:none;
  }
  .fxScope::before,.fxScope::after{content:'';position:absolute;background:var(--fc,#fff);opacity:.9;}
  .fxScope::before{left:50%;top:-5px;bottom:-5px;width:1.5px;transform:translateX(-50%);}
  .fxScope::after{top:50%;left:-5px;right:-5px;height:1.5px;transform:translateY(-50%);}
  @keyframes scopeLock{
    0%{opacity:0;transform:translate(-50%,-50%) scale(1.9) rotate(24deg)}
    35%{opacity:.95}
    100%{opacity:.9;transform:translate(-50%,-50%) scale(.85) rotate(0deg)}
  }
  .fxSpark{ /* v0.41: 번개술사 전이 도착 — 전기 스파크 방사 (단발, 무한 0) */
    position:absolute;width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle, #fff 0%, #8fd0ff 42%, transparent 70%);
    box-shadow:0 0 9px #8fd0ff, 0 0 16px rgba(143,208,255,.6);
    transform:translate(-50%,-50%) scale(.3);opacity:0;
    animation:sparkPop .26s ease-out forwards;pointer-events:none;
  }
  @keyframes sparkPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
    40%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(.95)}
  }
  .fxMeteor{ /* v0.37: 마법사 유성 — 위에서 떨어지는 빛줄기 (직후 폭발과 연결) */
    position:absolute;width:5px;height:34px;border-radius:3px;
    background:linear-gradient(transparent,#fff 38%,var(--fc,#fff));
    box-shadow:0 0 7px var(--fc,#fff);
    transform:translate(-50%,-54px);opacity:0;
    animation:meteorDrop .26s ease-in forwards;pointer-events:none;
  }
  @keyframes meteorDrop{
    0%{opacity:0;transform:translate(-50%,-56px)}
    30%{opacity:1}
    100%{opacity:.9;transform:translate(-50%,-12px)}
  }
  .fxHealDrop{ /* v0.37: 치유 분수 입자 — 솟았다 반짝이며 떨어짐 */
    position:absolute;width:5px;height:5px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#f0d282 55%,transparent 80%);
    box-shadow:0 0 5px rgba(240,210,130,.95);
    transform:translate(-50%,-8px);opacity:0;
    animation:healFount .62s ease-out forwards;pointer-events:none;
  }
  .fxNote{ /* v0.37: 바드 음표 — 같은 분수 곡선, 글리프 */
    position:absolute;font-size:12.5px;font-weight:900;color:#caa6ff;
    text-shadow:0 0 6px rgba(184,138,255,.95);
    transform:translate(-50%,-8px);opacity:0;
    animation:healFount .72s ease-out forwards;pointer-events:none;
  }
  @keyframes healFount{
    0%{opacity:0;transform:translate(-50%,-8px) scale(.5)}
    24%{opacity:1;transform:translate(calc(-50% + var(--hx,0px)*.6),-27px) scale(1.12)}
    62%{opacity:.95;transform:translate(calc(-50% + var(--hx,0px)*.9),-18px) scale(.95)}
    100%{opacity:0;transform:translate(calc(-50% + var(--hx,0px)),-4px) scale(.55)}
  }
  .fxImpact{ /* 타격 스파크: 명중 지점의 짧은 십자 섬광 (D항목) */
    position:absolute;width:22px;height:22px;
    transform:translate(-50%,-50%) scale(.4);opacity:0;
    animation:impactPop .2s ease-out forwards;
  }
  .fxImpact::before,.fxImpact::after{
    content:'';position:absolute;left:50%;top:50%;
    background:linear-gradient(90deg,transparent,var(--fc,#fff) 35%,#fff 50%,var(--fc,#fff) 65%,transparent);
    border-radius:2px;transform:translate(-50%,-50%);
  }
  .fxImpact::before{width:100%;height:5px;}
  .fxImpact::after{width:5px;height:100%;background:linear-gradient(180deg,transparent,var(--fc,#fff) 35%,#fff 50%,var(--fc,#fff) 65%,transparent);}
  @keyframes impactPop{
    0%{transform:translate(-50%,-50%) scale(.4) rotate(0deg);opacity:0}
    35%{opacity:1}
    100%{transform:translate(-50%,-50%) scale(var(--is,1)) rotate(-20deg);opacity:0}
  }
  .fxScatter{ /* v0.18B 폭발 가루: 팡 순간 사방으로 촤악 — 짧은 즉발 (영웅 전달 가루 fxDust와 별개) */
    position:absolute;width:4px;height:4px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,var(--fc,#fff) 55%,transparent 80%);
    transform:translate(-50%,-50%) scale(.4);opacity:0;
    animation:scatterFly .32s ease-out forwards;
  }
  @keyframes scatterFly{ /* 살짝 떠올랐다 가라앉으며 소멸 — 2.5D 높이감 일관 */
    0%{transform:translate(-50%,-50%) scale(.4);opacity:1}
    55%{transform:translate(calc(-50% + var(--sx,0px)*.8),calc(-50% + var(--sy,0px)*.75 - 4px)) scale(1.1);opacity:.95}
    100%{transform:translate(calc(-50% + var(--sx,0px)),calc(-50% + var(--sy,0px) + 3px)) scale(.2);opacity:0}
  }
  /* 묵직한 pop: 큰 매치/높은 연쇄의 미세 진동 — 아주 약하게, 컨테이너 한정 (화면 전체 X) */
  /* v0.18B: 5연쇄+ 대연쇄 전용 럼블 — 좌우 덜컹 + 약한 상하 + 아주 미세한 회전, 감쇠하며 멎음
     강도 --rumble-k(OVERCHAIN_RUMBLE_STRENGTH), 길이는 JS가 OVERCHAIN_RUMBLE_MS로 주입 */
  .rumble{animation:boardRumble .32s ease-out;}
  .surge{ /* v0.38: 5연쇄+ 마나 폭주 — 보드 외곽 보라 펄스 (단발) */
    animation:boardRumble .32s ease-out, manaSurge .45s ease-out;
  }
  /* v0.40E (B항목): Board Mana Aura — 3~4연쇄 구간 "보드가 마나에 반응" 단발 펄스(금빛 예열).
     ★ 레이어 분리: transform은 rumble(boardRumble)이, box-shadow는 aura(3~4)→surge(5+ 보라)가 이어받음 → 같은 채널이지만 시점이 안 겹침(충돌 0).
     5연쇄+는 기존 surge가 box-shadow 폭주를 담당하므로 aura 양보(과밀 방지). --ak=단계 강도(3:.7/4:1.0). 무한 0. */
  .manaPulse{animation:manaAura .5s ease-out;}
  @keyframes manaAura{
    0%{box-shadow:0 0 0 rgba(232,200,140,0)}
    34%{box-shadow:0 0 calc(20px * var(--ak,1)) rgba(232,200,140,calc(.32 * var(--ak,1))), inset 0 0 calc(10px * var(--ak,1)) rgba(255,240,200,calc(.1 * var(--ak,1)))}
    100%{box-shadow:0 0 0 rgba(232,200,140,0)}
  }
  @keyframes manaSurge{
    0%{box-shadow:0 0 0 rgba(184,138,255,0)}
    30%{box-shadow:0 0 calc(24px * var(--surge-k,1)) rgba(184,138,255,.5)} /* v0.39B: 7연쇄+ 강화 */
    100%{box-shadow:0 0 0 rgba(184,138,255,0)}
  }
  @keyframes boardRumble{
    0%,100%{transform:translate(0,0) rotate(0deg)}
    12%{transform:translate(calc(-5px*var(--rumble-k,1)),calc(2px*var(--rumble-k,1))) rotate(calc(-.5deg*var(--rumble-k,1)))}
    26%{transform:translate(calc(4px*var(--rumble-k,1)),calc(-2px*var(--rumble-k,1))) rotate(calc(.4deg*var(--rumble-k,1)))}
    42%{transform:translate(calc(-3px*var(--rumble-k,1)),calc(3px*var(--rumble-k,1))) rotate(calc(-.3deg*var(--rumble-k,1)))}
    58%{transform:translate(calc(2px*var(--rumble-k,1)),calc(-2px*var(--rumble-k,1))) rotate(calc(.2deg*var(--rumble-k,1)))}
    74%{transform:translate(calc(-2px*var(--rumble-k,1)),calc(1px*var(--rumble-k,1))) rotate(calc(-.12deg*var(--rumble-k,1)))}
    88%{transform:translate(calc(1px*var(--rumble-k,1)),0) rotate(0deg)}
  }
  .thump{animation:thumpShake .18s;}
  @keyframes thumpShake{ /* v0.18: 강도 배율 --shake-k (0이면 끔) */
    0%,100%{transform:translate(0,0)}
    30%{transform:translate(0,calc(3px*var(--shake-k,1)))}
    60%{transform:translate(calc(-2px*var(--shake-k,1)),calc(-1px*var(--shake-k,1)))}
  }
  /* ---------- 파티 ---------- */
  #partyArea{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 9px 9px; /* v0.28: 상단 +6px — 상태 배지(필) 헤드룸 확보 */
    margin-top:-5px; /* v0.35 (A항목): 진영 상향 — 보드 두께판과 맞닿아 "전장과 이어진 전투 라인".
                        절약분은 enemyArea(flex:1)가 흡수 — 전장도 함께 넓어짐 */
    position:relative;
    transition:border-color .25s, box-shadow .25s;
  }
  #partyArea::after{ /* v0.28: 공통 바닥선 = 전열 전장선 — 간격을 벌려도 "한 팀" 무리감 유지 (정적) */
    content:'';position:absolute;left:6%;right:6%;bottom:16px;height:2px;
    border-radius:2px;pointer-events:none;z-index:0;
    background:linear-gradient(90deg, transparent, rgba(154,147,181,.30) 16%,
               rgba(154,147,181,.30) 84%, transparent);
  }
  #partyArea::before{ /* v0.30: 후열 전장선 — v0.35: 단차 34px 동기 */
    content:'';position:absolute;left:14%;right:14%;bottom:50px;height:1.5px;
    border-radius:2px;pointer-events:none;z-index:0;
    background:linear-gradient(90deg, transparent, rgba(154,147,181,.15) 22%,
               rgba(154,147,181,.15) 78%, transparent);
  }
  /* 방패 효과 활성: 파티 전체에 방어막 표시 */
  #partyArea.shielded{
    border-color:var(--gold);
    box-shadow:0 0 10px rgba(232,179,75,.4), inset 0 0 14px rgba(232,179,75,.08);
  }
  /* 아군 5인: 정면 레고형 아바타 무리 (v0.16: 정면 응시 + 조립형 파츠)
     v0.28: 겹침(-7px) 구도 → 간격 구도. 정보량(독/강화/사용횟수) 증가에 따라 각 영웅 단위
     가독성을 우선. "한 팀" 느낌은 공통 바닥선(#partyArea::after) + 약한 높낮이 차로 유지
     v0.30: 전열/후열 진형 — 지그재그(후/전/후/전/후). 높낮이는 nth-child가 아니라
     formation(.front/.back) 클래스가 결정. "한 파티 안의 앞줄/뒷줄" — 멀리 흩어지지 않게 22px 단차 */
  #heroes{
    display:flex;justify-content:space-evenly;align-items:flex-end;
    min-height:150px; /* v0.35: 후열 단차 34px 수용 */
    position:relative;z-index:1; /* 바닥선 위 */
  }
  .ally{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    /* 화면폭 적응: 좁은 기기(≤340px 내부폭)는 -7px(기존 겹침)까지 허용,
       넓을수록 0~+5px로 벌어짐 — 5인 × 76px가 한 줄을 안 깨는 한계식 */
    margin:0 clamp(-7px, calc((100% - 396px) / 10), 5px);
    transition:transform .15s;
  }
  /* v0.30: 진형 — 전열은 앞(아래)·위로 솟은 z, 후열은 뒤(위)·낮은 z. 크기는 줄이지 않는다 */
  .ally.front{z-index:4;}
  .ally.front .av{--bobScale:1.05;} /* 전열 미세 확대 — "앞에 서 있다" (bob 합성 변수) */
  .ally.front .shadow{ /* 접지 강화 — 앞줄이 땅을 딛고 버티는 인상 */
    width:62px;height:11px;
    background:radial-gradient(ellipse, rgba(0,0,0,.52) 0%, rgba(0,0,0,0) 74%);
  }
  /* v0.35 (B/C항목): 후열 원근 강화 — 28→34px 더 뒤로 + 0.85배 (나라님 목표 체감치).
     bob 합성 변수 — 레이아웃 박스 불변: HP바/배지는 비축소라 가독 유지. 전열 1.05 대비 ≈1.24:1 */
  .ally.back{z-index:2;margin-bottom:34px;}
  .ally.back .av{--bobScale:.85;}
  .ally.back .shadow{opacity:.65;width:40px;} /* 축소된 시각 폭에 맞춘 접지 */
  .ally.act{z-index:9;}
  .ally.act .av{ /* v0.17: 행동 시 앞으로(위로) 튀어나가는 런지 후 정착 */
    filter:drop-shadow(0 0 10px var(--gold)) brightness(1.3);
    transform:translateY(-8px);
    animation:actLunge .3s ease-out;
  }
  @keyframes actLunge{
    0%{transform:translateY(0) scale(1)}
    40%{transform:translateY(-15px) scale(1.08)}
    100%{transform:translateY(-8px) scale(1)}
  }
  .av{
    position:relative;width:76px;height:98px;
    animation:bob 2.4s ease-in-out infinite;
    transition:transform .15s, filter .2s;
  }
  .ally:nth-child(1) .av{animation-delay:0s;}
  .ally:nth-child(2) .av{animation-delay:.45s;}
  .ally:nth-child(3) .av{animation-delay:.9s;}
  .ally:nth-child(4) .av{animation-delay:.25s;}
  .ally:nth-child(5) .av{animation-delay:.65s;}
  /* ════ v0.16: 정면 레고형 아바타 (FABLE_TASK_016) ════
     구조: shadow / legs / armL·armR(+손) / torso / head(+face) / gear·gear2(장비)
     원칙: 정면 응시(눈), SD 비율(큰 머리), 직업색 = 블록 속성색, transform 위주 idle */
  .head{
    position:absolute;top:13px;left:50%;transform:translateX(-50%);
    width:38px;height:30px;background:linear-gradient(#f4ddbc,#e6c699);
    border-radius:11px;z-index:5;
  }
  .face{ /* 정면 응시: 두 눈 — "나를 바라보는 동료" */
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:22px;height:6px;
  }
  .face::before,.face::after{
    content:'';position:absolute;bottom:0;
    width:5px;height:6px;background:#2a2335;border-radius:50%;
  }
  .face::before{left:1px;} .face::after{right:1px;}
  .torso{
    position:absolute;top:41px;left:50%;transform:translateX(-50%);
    width:44px;height:34px;border-radius:10px 10px 9px 9px;z-index:3;
  }
  .armL,.armR{ /* 레고 팔: 토르소 양옆 + 살구색 손 */
    position:absolute;top:45px;width:12px;height:24px;
    background:var(--arm,#41395c);border-radius:6px;z-index:4;
  }
  .armL{left:6px;} .armR{right:6px;}
  .armL::after,.armR::after{ /* 손 */
    content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    width:10px;height:10px;background:#e6c699;border-radius:50%;
  }
  .legs{
    position:absolute;bottom:7px;left:50%;transform:translateX(-50%);
    width:36px;height:14px;z-index:1;
  }
  .legs::before,.legs::after{
    content:'';position:absolute;bottom:0;
    width:14px;height:14px;border-radius:5px 5px 6px 6px;
    background:var(--leg,#41395c);
  }
  .legs::before{left:2px;} .legs::after{right:2px;}
  .shadow{ /* 접지 그림자 (blur 미사용 — radial 페이드) */
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:52px;height:9px;border-radius:50%;
    background:radial-gradient(ellipse, rgba(0,0,0,.42) 0%, rgba(0,0,0,0) 72%);
    z-index:0;
  }
  .gear,.gear2{position:absolute;z-index:6;}
  .ally .mini{width:56px;height:5px;background:#171425;border-radius:3px;overflow:hidden;}
  .ally .mini i{display:block;height:100%;background:var(--hp);border-radius:3px;transition:width .3s;}

  /* ── t0 대검 전사 · 근접 딜러 · ⚔️ 대검석(적/주홍) — 큰 대검을 어깨에, 방패 없음 ── */
  .jb-greatswordWarrior{--leg:#6e2a25;--arm:#a8453a;}
  .jb-greatswordWarrior .torso{background:linear-gradient(#cf5b45,#9e3c30);}
  .jb-greatswordWarrior .torso::after{ /* 가슴 흉갑 라인 */
    content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);
    width:30px;height:9px;background:#e07a5e;border-radius:5px;
  }
  .jb-greatswordWarrior .armL,.jb-greatswordWarrior .armR{ /* 어깨 장갑: 어깨선만 진한 적갈 */
    border-top:5px solid #7e2e29;
  }
  .jb-greatswordWarrior .armR{ /* v0.35: 오른팔을 들어 대검 자루를 쥔다 — 팔↔자루 세로 정렬 */
    top:31px;transform:rotate(-14deg);z-index:7;
  }
  .jb-greatswordWarrior .gear{ /* 어깨에 걸친 대검 — v0.34: 손 위치로 6px 당김 (자루가 오른손에 옴) */
    right:-1px;top:-14px;width:11px;height:62px;
    background:linear-gradient(#f4f8fe,#a9b9d4);
    clip-path:polygon(50% 0,100% 12%,100% 100%,0 100%,0 12%);
    transform:rotate(9deg);border-radius:0 0 3px 3px;
  }
  .jb-greatswordWarrior .gear::after{ /* 십자 손잡이 + 자루 */
    content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    width:23px;height:6px;background:#caa54a;border-radius:3px;
    box-shadow:0 7px 0 -1px #6e4a2d;
  }
  .jb-greatswordWarrior .gear::before{ /* v0.34: 자루를 쥔 손 — 손잡이가 손 안쪽으로 */
    content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
    width:11px;height:10px;background:#e6c699;border-radius:50%;z-index:1;
  }
  .jb-greatswordWarrior .gear2{ /* 이마 붉은 머리띠 */
    top:15px;left:50%;transform:translateX(-50%);
    width:38px;height:6px;background:#9e3c30;border-radius:3px;z-index:6;
  }

  /* ── t1 마법사 · 서포터 · ✦ 마나석(보라/별빛) — 로브 ✦ 문장 + 마나 보주 지팡이 ── */
  .jb-mage{--leg:#3c2470;--arm:#5a36a8;}
  .jb-mage .torso{
    background:linear-gradient(#7e54d4,#5a36a8);width:48px;
    clip-path:polygon(12% 0,88% 0,100% 100%,0 100%);border-radius:0;
  }
  .jb-mage .torso::before{ /* 로브 가슴의 별빛 문장 ✦ */
    content:'✦';position:absolute;top:4px;left:50%;transform:translateX(-50%);
    font-size:14px;font-weight:900;color:#efe6ff;
    text-shadow:0 0 5px rgba(190,150,255,.9);
  }
  .jb-mage .torso::after{ /* 로브 단 금장식 */
    content:'';position:absolute;bottom:3px;left:10%;width:80%;height:4px;
    background:#caa54a;opacity:.85;
  }
  .jb-mage .gear2{ /* 뾰족 모자 + 챙 (정면) */
    top:-8px;left:50%;transform:translateX(-50%) rotate(-4deg);
    width:0;height:0;z-index:7;
    border-left:16px solid transparent;border-right:16px solid transparent;
    border-bottom:23px solid #51309a;
  }
  .jb-mage .gear2::after{ /* 모자 챙 */
    content:'';position:absolute;top:21px;left:50%;transform:translateX(-50%);
    width:48px;height:7px;background:#51309a;border-radius:4px;
  }
  .jb-mage .gear{ /* 마나 보주 지팡이 (오른손 쪽) — v0.34: 몸에 2px 더 밀착 */
    right:3px;top:8px;width:6px;height:58px;
    background:#6e4a2d;border-radius:3px;
  }
  .jb-mage .gear::before{ /* v0.34: 지팡이를 쥔 손 — 오른손 높이 */
    content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
    width:10px;height:9px;background:#e6c699;border-radius:50%;
  }
  .jb-mage .armR{right:2px;} /* v0.35: 오른팔을 지팡이 축에 — 팔→손→지팡이 연속 */
  .jb-mage .gear::after{ /* 별빛 마나 보주 */
    content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
    width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #f2e8ff, #a06ae8);
    box-shadow:0 0 9px rgba(180,135,255,.9);
    animation:orbGlow 1.8s ease-in-out infinite;
  }
  @keyframes orbGlow{0%,100%{box-shadow:0 0 6px rgba(180,135,255,.7)}50%{box-shadow:0 0 13px rgba(195,155,255,1)}}

  /* ── t2 사제 · 힐러 · ✚ 치유석(금/크림) — 크림 로브 + 금 ✚ + 후광 (무기 없음) ── */
  .jb-priest{--leg:#b8ae96;--arm:#e6dcc4;}
  .jb-priest .torso{
    background:linear-gradient(#f6f0e0,#ddd2ba);width:46px;
    clip-path:polygon(8% 0,92% 0,100% 100%,0 100%);border-radius:0;
  }
  .jb-priest .torso::before{ /* 가슴의 금색 치유 문장 ✚ */
    content:'✚';position:absolute;top:5px;left:50%;transform:translateX(-50%);
    font-size:15px;font-weight:900;color:#c89a3a;
  }
  .jb-priest .gear{ /* 후광 */
    top:1px;left:50%;transform:translateX(-50%);
    width:36px;height:11px;border:3px solid #e8c860;border-radius:50%;
    box-shadow:0 0 10px rgba(232,200,96,.8);
    animation:halo 2.4s ease-in-out infinite;z-index:7;
  }
  @keyframes halo{0%,100%{opacity:.8}50%{opacity:1}}
  .jb-priest .gear2{ /* 머리 베일: 크림 두건 + 금 테 */
    top:10px;left:50%;transform:translateX(-50%);
    width:42px;height:14px;background:#f0e8d2;
    border-bottom:2px solid #c8b890;border-radius:12px 12px 4px 4px;z-index:6;
  }

  /* ── t3 방패 병사 · 탱커 · 🛡️ 방패석(남청/강철) — 대형 방패 정면 + 넓은 체격 ── */
  /* v0.16: 구 금색 갑주 → 방패석과 동일한 남청/강철 계열로 정리 (블록↔아바타 1:1) */
  .jb-guardSoldier{--leg:#2c3e66;--arm:#46659e;}
  .jb-guardSoldier .torso{background:linear-gradient(#5d83c4,#3a5a94);width:50px;height:36px;}
  .jb-guardSoldier .torso::after{ /* 흉갑 강철 리벳 라인 */
    content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);
    width:34px;height:7px;background:#7fa2d8;border-radius:4px;
  }
  .jb-guardSoldier .gear2{ /* 강철 투구 + 면갑 */
    top:9px;left:50%;transform:translateX(-50%);
    width:42px;height:15px;background:linear-gradient(#cdd6e4,#9aa7bc);
    border-radius:12px 12px 4px 4px;z-index:6;
  }

  .ally.gain.jb-oathGuardian .gear, .ally.gain.jb-tauntKnight .gear{animation:shieldGlint .3s ease-out;} /* 방패석 4직업: 막이 번쩍 */
  @keyframes shieldGlint{45%{filter:brightness(1.6);box-shadow:0 0 12px rgba(120,165,230,.95)}100%{filter:brightness(1)}}
  .ally.gain.jb-archer .gear::after{animation:stringFlash .3s ease-out;} /* 궁수: 청록 빛이 시위를 스침 */
  @keyframes stringFlash{45%{opacity:1;box-shadow:0 0 8px rgba(120,230,195,.95)}100%{opacity:.65}}
  /* HP 0: 쓰러진 상태 (사망/봉인 시스템은 미도입 — 시각 표현만) */
  /* v0.19: 쓰러짐(전투 불능) 표현 강화 — 귀여움 유지, 상태는 명확하게 */
  .ally.down .av{
    animation:none; /* idle bob 정지 — 생기 멈춤 */
    transform:rotate(80deg) translate(9px,12px) scale(.96);
    filter:grayscale(1) brightness(.5);
    opacity:.62;
    transition:transform .45s ease-in, filter .4s, opacity .4s; /* 쓰러지는 과정이 보임 */
  }
  .ally.down .face::before,.ally.down .face::after{height:2px;border-radius:1px;} /* 감긴 눈 */
  .ally.down .gear,.ally.down .gear2{opacity:.45;} /* 장비 생기 감소 */
  .ally.down .shadow{opacity:.5;}
  .ally .poisonTag{ /* v0.27 도입 → v0.28: 필 형태 — 칩 좌상단, "어떤 영웅이 중독인지" 즉독 */
    position:absolute;top:-11px;left:-3px;z-index:6;
    font-size:10px;font-weight:900;color:#cdf0a8;
    background:#1c2a16;border:1px solid #5d8a4a;border-radius:7px;
    padding:0 5px;line-height:14px;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
    box-shadow:0 0 6px rgba(110,200,80,.35);
    pointer-events:none;
  }
  .ally .buffTag b{font-weight:900;color:#ffd97a;margin-left:1px;} /* v0.29: 남은 횟수 = 골드 통일 */
  .ally .buffTag{ /* v0.25 도입 → v0.28: 필 형태 + 남은 사용 횟수(✦N) — 칩 우상단 */
    position:absolute;top:-11px;right:-3px;z-index:6;
    font-size:10px;font-weight:900;color:#e2ccff;
    background:#251a3a;border:1px solid #7a55b8;border-radius:7px;
    padding:0 5px;line-height:14px;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
    box-shadow:0 0 6px rgba(184,138,255,.4);
    pointer-events:none;
  }
  .ally.down::after{ /* 어지럼 표식 — 전투 불능이 한눈에 (애니메이션 없음: 무한 총량 동결) */
    content:'💫';position:absolute;top:-6px;left:50%;transform:translateX(-50%);
    font-size:13px;opacity:.95;pointer-events:none;
  }
  .ally.down .mini{opacity:.45;}
  .lineTag{ /* v0.30: 편성 카드의 전열/후열 미니 태그 */
    font-style:normal;font-size:9.5px;font-weight:800;color:#9a93b5;
    border:1px solid var(--line);border-radius:6px;padding:0 5px;
    margin-left:3px;vertical-align:1.5px;
  }
  .lineTag.front{color:#e8b34b;border-color:#6e5a23;}
  .slotAsk{font-size:10px;color:#8a83a8;margin:1px 0 2px;} /* v0.32: 슬롯 양자택일 질문 한 줄 */
  /* 방패 상태 배지: 진영 우상단 부유 (공간 점유 없음) */
  #shieldTag{
    position:absolute;top:-9px;right:10px;z-index:8;
    font-size:10px;color:#ffd97a;background:#3d3214;border:1px solid #6e5a23;
    border-radius:7px;padding:1px 7px;display:none;
  }
  /* ---------- 최근 사건 토스트 (v0.14): 몬스터 영역 좌측 상단 — 보드를 가리지 않음 ---------- */
  #ticker{
    position:absolute;
    top:42px;  /* v0.29: HUD(스테이지 라벨) 바로 아래 — 몬스터는 하단 정렬이라 빈 여백 */
    left:12px;
    max-width:62%; /* 우측 몬스터/HP바/게이지를 과도하게 가리지 않음 */
    display:flex;flex-direction:column;align-items:flex-start;gap:3px;
    pointer-events:none;z-index:22;
    font-size:11px;line-height:1.4;color:var(--dim);
    text-align:left;
  }
  #ticker .tk{
    background:rgba(16,12,28,.84);
    border-radius:8px;padding:2px 10px;
    animation:tkIn .2s, tkOut .45s 1.7s forwards;
  }
  @keyframes tkOut{to{opacity:0;transform:translateY(-3px)}}
  @keyframes tkIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .good{color:#8fe0a4;}
  .bad{color:#f09a92;}
  .gold{color:var(--gold);}
  .sys{color:#7e76a0;}
  .shield{color:#ffd97a;font-weight:700;}
  .boss{color:#ff7a6b;font-weight:700;}
  /* ---------- 중요 이벤트 배너 (마왕 예고, 방패 감소) ---------- */
  #banner{
    position:absolute;top:8%;left:50%;
    transform:translateX(-50%) scale(.9);
    background:rgba(20,16,34,.92);
    border:1px solid var(--gold);
    border-radius:10px;
    padding:8px 16px;
    font-size:13.5px;font-weight:700;
    white-space:nowrap;
    opacity:0;pointer-events:none;
    transition:opacity .45s, transform .2s; /* v0.40C: opacity 페이드 .2s→.45s — 사라질 때 뚝 꺼지지 않고 서서히 (transform은 등장 스냅 유지) */
    z-index:20;
  }
  #banner.show{opacity:1;transform:translateX(-50%) scale(1);}
  /* v0.40A (D항목): 보스 위협 = "플레이어인 내가" 위협받는 경고 — 보드 상단 강한 경고 띠지.
     영웅 필살기(전장 왼쪽 속성색 띠지)와 문법 분리: 위협은 중앙 상단 + 붉은 경고 + 짧은 떨림 */
  #banner.boss{
    border:2.5px solid #ff5a52;
    background:linear-gradient(rgba(82,20,18,.97), rgba(46,11,10,.97));
    color:#ffd8d0;font-size:14.5px;letter-spacing:1px;
    box-shadow:0 0 22px rgba(255,80,74,.65), inset 0 0 12px rgba(255,80,74,.22); /* v0.40C: 붉은 경고 발광 강화 + 내부 광 — "나를 위협한다" */
  }
  #banner.boss.show{animation:threatShake .5s ease-out;} /* v0.40C: 단발 떨림 강화 (.4s→.5s, 진폭↑) — 무한 0 */
  @keyframes threatShake{ /* v0.40C: 경고의 떨림 — 진폭 강화 단발 (등장 시 1회) */
    0%{transform:translateX(-50%) scale(.88)}
    20%{transform:translateX(calc(-50% - 6px)) scale(1.06)}
    40%{transform:translateX(calc(-50% + 5px)) scale(1.01)}
    60%{transform:translateX(calc(-50% - 3px)) scale(1)}
    80%{transform:translateX(calc(-50% + 2px))}
    100%{transform:translateX(-50%) scale(1)}
  }
  /* ---------- 행동선 레이어: 영웅→적 연결, 조작 방해 금지 ---------- */
  #fxLayer{
    position:absolute;inset:0;
    width:100%;height:100%;
    pointer-events:none;  /* 필수: 퍼즐 터치를 막지 않는다 */
    z-index:30;
    overflow:visible;
  }
  /* 행동 대기 배지 (R&D): 보드 좌하단 소형, 공간 점유 없음 */
  #queueBadge{
    position:absolute;left:9px;bottom:9px;
    background:rgba(18,14,30,.8);color:var(--gold);
    font-size:10px;padding:1px 8px;border-radius:7px;
    pointer-events:none;z-index:21;display:none;
  }
  /* 보드 위 매치 결과 플로팅 */
  .boardFloat{
    position:absolute;left:50%;
    transform:translateX(-50%);
    font-size:12.5px;font-weight:800; /* v0.14: 축소 — 조작 시야 보호 */
    color:var(--ink);
    text-shadow:0 1px 4px rgba(0,0,0,.8);
    pointer-events:none;z-index:25;
    animation:floatUp .9s ease-out forwards;
    white-space:nowrap;
  }
  /* v0.15: 연쇄 플로팅 — 더 경쾌한 바운스 팝. v0.18: 3연쇄+ 메가 변형 */
  .boardFloat.chainPop{
    font-size:14.5px;
    animation:chainPop .9s ease-out forwards;
  }
  .boardFloat.chainPop.mega{
    font-size:17px;
    animation:chainMega .95s ease-out forwards;
  }
  @keyframes chainMega{
    0%{opacity:0;transform:translateX(-50%) scale(.4) rotate(-4deg)}
    16%{opacity:1;transform:translateX(-50%) scale(1.45) rotate(2deg)}
    30%{transform:translateX(-50%) scale(1.05) rotate(0deg)}
    44%{transform:translateX(-50%) scale(1.18)} /* 더! 더! — 2차 박동 */
    58%{transform:translateX(-50%) scale(1.05)}
    100%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(1.05)}
  }
  @keyframes chainPop{
    0%{opacity:0;transform:translateX(-50%) scale(.5)}
    18%{opacity:1;transform:translateX(-50%) scale(1.28)}
    34%{transform:translateX(-50%) scale(1)}
    100%{opacity:0;transform:translateX(-50%) translateY(-26px) scale(1)}
  }
  /* ---------- 오버레이 ---------- */
  /* ════ v0.20: 게임 flow 화면 (FABLE_TASK_020) — 전투 DOM 위를 덮는 불투명 스크린 ════ */
  .screen{
    position:absolute;inset:0;z-index:70;
    background:linear-gradient(180deg,#161226 0%,#0d0a18 100%);
    display:none;flex-direction:column;align-items:center;
    /* v0.20B: iPhone safe-area — 상단바 아래 잘림/하단 제스처바 겹침 방지 */
    padding:calc(22px + env(safe-area-inset-top, 0px)) 16px calc(16px + env(safe-area-inset-bottom, 0px));
    gap:14px;overflow-y:auto;-webkit-overflow-scrolling:touch;
    border-radius:12px;
  }

// v0.32: support 기본 = 바드 (마법사 empower 승계 — 기본 파티 손맛 보존)
const equippedJobs = {
  tank:'guardSoldier', melee:'greatswordWarrior', ranged:'archer', support:'bard', healer:'priest',
};
// v0.21: 블록 타입 → 장착 직업/스탯 조회 (전투·UI 공용)
function jobOf(typeId){ return JOBS[equippedJobs[BLOCK_SLOT[typeId]]]; }
function heroMaxOf(typeId){ return jobOf(typeId).hp; }
function heroNameOf(typeId){ return jobOf(typeId).name; }
function heroDefOf(typeId){ return jobOf(typeId).defense || 0; }
// 행동값 = Power × 매치계수(액션별 오버라이드 가능) × 연쇄계수
function actionValue(job, tier, chainMult){
  const act = job.actions[tier];
  const m = (act.mult != null) ? act.mult : MATCH_MULT[tier];
  return Math.round(job.power * m * (chainMult || 1));
}
/* ════════════════════════════════════════════════════════════════════
   v0.24: 하이브리드 효과 시간 문법 (FABLE_TASK_024 — Emblem Quest Lab 효과 지속 원칙)
   이 게임은 실시간 퍼즐 RPG — 효과 지속 규칙을 단일 턴제 문법으로 통일하지 않는다.
   효과는 "누구에게 걸렸느냐"가 아니라 "그 효과가 어떤 성격이냐"로 문법을 정한다:
   ① instant (즉시형)      : 발동 순간 확정 — 즉시 피해/회복/정화/방깎 부여/중독 부여
   ② time (시간 흐름형)    : 대상 행동과 무관하게 시간으로 진행 — 중독/화상/재생/장판
                             {timing:'time', tickMs, expiresAt, nextTickAt, damage, ignoreDefense}
   ③ action (행동 소모형)  : 대상이 실제 행동할 때 의미 — 공격력 증가/다음 공격 강화
                             {timing:'action', uses, maxDurationMs} — 영웅은 자동 턴이 없으므로
                             순수 시간 버프는 블록 운에 증발(나쁜 운빨) → 행동 횟수 기반이 원칙
   ④ hit (피격 소모형)     : 대상이 맞을 때 의미 — 방깎/취약/보호막/반격 준비
                             {timing:'hit', hits} — armorDown의 장기 전환 후보 (이번 버전 보류)
   ════════════════════════════════════════════════════════════════════ */
const POISON_DURATION_MS = 10000; // v0.28: 중독 지속 6초→10초 — "스쳐가는 숫자"가 아니라 전장 위를 흐르는 압박
const POISON_TICK_MS     = 2000;  // 중독 발동 주기 → 10초/2초 = 5틱

/* ════ v0.21: 방어력 공식 + 상태이상 골격 (FABLE_TASK_021 D/F항목) ════
   - 물리 피해: 최종 피해 = max(1, 기본 피해 - 유효 Defense)
   - 독: Defense 무시, 대상 행동 시점마다 발동, 3회 (행동 횟수 기반)
   - 방어력 감소(armorDown): 전투 중 지속 (안전한 쪽 선택 — 횟수 관리 복잡도 회피)
   - 정화(cleanse): 아군 디버프 제거 골격 (아직 아군에게 디버프를 거는 적은 없음 — 자리 확보)
   - 헬퍼는 순수 함수로 유지 (렌더/플로팅/승패 판정은 호출자 책임 → 테스트 용이) */
function effDef(e){
  const down = (e.status && e.status.armorDown) ? e.status.armorDown.amount : 0;
  return Math.max(0, (e.defense || 0) - down);
}
function dealDamage(e, raw, opts){
  const pierce = opts && opts.pierce;
  const brokeArmor = !pierce && !!(e.status && e.status.armorDown); // v0.31: 이번 타격이 "틈"을 이용했는가
  const def = pierce ? 0 : effDef(e);
  const eff = Math.max(1, raw - def);
  e.hp -= eff;
  // v0.26: hit 기반 armorDown — 방어 계산을 사용한 피격에서만 uses 1 소모.
  // poison tick(직접 감산)/pierce/회복/정화/버프는 dealDamage를 거치지 않거나 pierce라 비소모
  if(!pierce && e.status && e.status.armorDown){
    e.status.armorDown.uses--;
    if(e.status.armorDown.uses <= 0) delete e.status.armorDown; // 틈이 닫힘 — 조용히 제거 (로그 없음)
  }
  return { eff, reduced: def > 0 && eff < raw, brokeArmor }; // v0.31: brokeArmor — 호출자가 ✂ 표기/FX
}
function applyPoison(e, damage){ // v0.24: 시간 기반 중독 (instant 부여 → time 진행)
  const now = Date.now();
  e.status = e.status || {};
  const prev = e.status.poison;
  if(prev && prev.damage > damage){
    // 재부여 규칙: 같거나 약한 독은 지속시간만 갱신 (damage 누적 금지, nextTickAt 유지)
    prev.expiresAt = now + POISON_DURATION_MS;
    return;
  }
  // 신규 또는 더 강한 독으로 교체 — nextTickAt은 now+tickMs로 재설정 (구현 안정성 우선)
  e.status.poison = {
    timing:'time', damage, ignoreDefense:true,
    tickMs: POISON_TICK_MS,
    expiresAt: now + POISON_DURATION_MS,
    nextTickAt: now + POISON_TICK_MS,
  };
}
const ARMOR_DOWN_USES = 3; // v0.26: 방깎 유지 피격 횟수 — "다음 3회 피격까지"
function applyArmorDown(e, amount){
  // v0.26: hit 기반 전환 (FABLE_TASK_026 — 하이브리드 문법 ④ hit의 실전 사례)
  // 방깎의 본질 = "방어가 깨진 틈" — 대상이 행동할 때도, 시간이 흘러도 아닌, 맞을 때 소모된다
  e.status = e.status || {};
  const cap = Math.min(amount, e.defense || 0); // 기본 Defense 이하로 캡 (기존 규칙 유지)
  if(cap <= 0) return; // 방어 0 — 깎을 장갑이 없음
  const prev = e.status.armorDown;
  if(prev && prev.amount >= cap){
    prev.uses = ARMOR_DOWN_USES; // 같거나 약한 방깎: amount 유지(누적 절대 금지), uses만 갱신
    return;
  }
  e.status.armorDown = { timing:'hit', amount: cap, uses: ARMOR_DOWN_USES }; // 신규/더 강한 방깎으로 교체
}
/* v0.24: 시간 기반 상태이상 진행 — 게임 루프 tick()에서 매 프레임 호출 (단일 setInterval 재사용,
   몬스터별 타이머/setInterval 다중 생성 금지). 틱→만료 순서: 마지막 틱(10초 시점)이 만료보다 먼저 처리됨 */
// v0.28: poison tick 림라이트 — 단발 클래스 부착/해제 (재렌더로 교체된 노드는 자연 소거 — 누적 없음)
function flashPoisonTick(el){
  if(!el) return;
  el.classList.add('ptick');
  setTimeout(()=>{ el.classList.remove('ptick'); }, 460); // 분리된 구 노드에 remove해도 무해
}
function updateStatusEffects(now){
  let someoneKilled = false;
  enemies.forEach((e, i)=>{
    if(e.hp <= 0 || !e.status || !e.status.poison) return; // 사망자에게 틱 금지
    const p = e.status.poison;
    if(p.nextTickAt <= p.expiresAt && now >= p.nextTickAt){
      e.hp -= p.damage; // time 기반 발동 — 대상 행동과 무관, 방어 무시
      p.nextTickAt += p.tickMs;
      renderEnemies(i); // 틱마다 재렌더 → ☠ 남은 횟수 배지 자동 감소
      flashPoisonTick(enemyEl(i)); // v0.28: "지금 독이 들어갔다" 림라이트
      floatText(enemyEl(i), '☠ -'+p.damage, 'poison'); // v0.37: 독 전용 언어 (녹색·흔들림)
      if(e.hp <= 0){
        addLog(e.name+'이(가) 독으로 쓰러졌다!', 'gold');
        floatText(enemyEl(i), '☠ 중독 처치!', 'guard'); // v0.31: 특수 순간 — 전장 위에서도 읽힌다
        delete e.status.poison;
        someoneKilled = true;
      } else {
        checkBossReaction(e); // v0.23: 독 틱으로 50% 돌파 시에도 보스 반응
      }
    } else if(now >= p.expiresAt){
      delete e.status.poison; // 만료 — 유령 틱 없음
      renderEnemies(i);
    }
  });
  // v0.42: 약화술사 weaken 만료 — 시간 경과 시 해제 (영구 무력화 방지). poison과 별개 루프 (독 없는 적도 약화 가능)
  enemies.forEach((e, i)=>{
    if(e.hp <= 0 || !e.status || !e.status.weaken) return;
    if(now >= e.status.weaken.expiresAt){
      delete e.status.weaken; // 약화 만료 — 공격력 원복
      renderEnemies(i);       // ⬇ 약화 배지 소거
    }
  });
  if(someoneKilled){
    renderEnemies();
    if(aliveEnemies().length === 0) onBattleWon(); // async — 승리 판정은 기존 경로 그대로
  }
  // v0.27: 아군 poison — 영웅이 행동하지 않아도, 블록이 안 나와도 시간으로 진행 (방어 무시)
  PARTY.forEach(t=>{
    const st = heroStatus[t];
    if(!st || !st.poison) return;
    if(isFallen(t)){ delete heroStatus[t]; renderParty(); return; } // 쓰러진 영웅 — 독 제거, 틱 금지
    const p = st.poison;
    if(p.nextTickAt <= p.expiresAt && now >= p.nextTickAt){
      heroHp[t] -= p.damage; // time 발동 — 영웅 Defense 무시
      if(heroHp[t] < 0) heroHp[t] = 0;
      p.nextTickAt += p.tickMs;
      renderParty();
      flashPoisonTick(heroChipEl(t)); // v0.28: 아군에게도 동일한 발동 신호
      floatText(heroChipEl(t), '☠ -'+p.damage, 'poison'); // v0.37: 독 전용 언어
      if(heroHp[t] <= 0){ // 독으로 영웅 쓰러짐 가능
        addLog('💔 '+heroNameOf(t)+'이(가) 중독으로 쓰러졌다!', 'boss');
        delete heroStatus[t]; // 쓰러진 영웅의 독 제거
        if(t===1 && mageCharge){ mageCharge = null; addLog('마법사의 집중이 흩어졌다...', 'sys'); }
        if(heroBuffs[t]) delete heroBuffs[t]; // v0.25 버프: 쓰러지면 무의미 — 제거
        renderParty();
        if(aliveHeroes().length===0){ clearAimLines(); onDefeat(); }
      }
    } else if(now >= p.expiresAt){
      delete st.poison; // 만료 — 유령 틱 없음 (적측과 동일)
      if(!Object.keys(st).length) delete heroStatus[t];
      renderParty();
    }
  });
  // v0.25: action 버프의 보조 시간 만료 (20초 무한 저장 방지) — 배지도 함께 소거
  for(const t in heroBuffs){
    if(now > heroBuffs[t].expiresAt){ delete heroBuffs[t]; renderParty(); }
  }
  // v0.43: 보호막 시간 만료 (영구 무적 방지) — 막 배지도 함께 소거
  for(const t in heroShield){
    if(now >= heroShield[t].expiresAt){ delete heroShield[t]; renderParty(); }
  }
}
// v0.27: 적 → 아군 중독 — 플레이어 poison과 같은 time 문법 공유 (수치만 다름)
function applyHeroPoison(typeId, damage, source){
  const now = Date.now();
  heroStatus[typeId] = heroStatus[typeId] || {};
  const prev = heroStatus[typeId].poison;
  if(prev && prev.damage > damage){
    prev.expiresAt = now + POISON_DURATION_MS; // 약한 독: 지속만 갱신 (누적 금지 — 적측과 동일 규칙)
    return;
  }
  heroStatus[typeId].poison = {
    timing:'time', damage, ignoreDefense:true,
    tickMs: POISON_TICK_MS,
    expiresAt: now + POISON_DURATION_MS,
    nextTickAt: now + POISON_TICK_MS,
    source,
  };
}

/* ════ v0.25: action 기반 버프 실전 샘플 — Mage Empower (FABLE_TASK_025) ════
   원칙(③ action): 버프는 대상이 행동하기 전까지 보존 — 블록 운으로 증발하지 않는다.
   maxDurationMs(20초)는 무한 저장 방지용 보조 안전장치일 뿐, 주 문법은 "다음 1회 행동" */
const EMPOWER_MAX_MS = 20000;
let heroBuffs = {}; // typeId → {type:'empower', timing:'action', uses, expiresAt, damageMultiplier, source}
let heroShield = {}; // v0.43: 보호술사 보호막 — typeId → {amount, expiresAt}. enemyAttack에서 HP 전에 흡수, 시간 만료/소진 시 제거 (영구 무적 불가)
function applyEmpower(typeId, mult, source){
  heroBuffs[typeId] = { // 같은 대상 재부여 = 갱신 (중첩/누적 없음)
    type:'empower', timing:'action', uses:1,
    expiresAt: Date.now() + EMPOWER_MAX_MS,
    damageMultiplier: mult, source,
  };
}
// 피해 행동값 계산 시 호출 — 배율 반환(1=버프 없음). 행동 1회에 소비, 시간 만료는 보조 검사
function consumeEmpower(typeId){
  const b = heroBuffs[typeId];
  if(!b) return 1;
  if(Date.now() > b.expiresAt){ delete heroBuffs[typeId]; return 1; }
  b.uses--;
  const m = b.damageMultiplier;
  if(b.uses <= 0) delete heroBuffs[typeId];
  return m;
}
// 피해 행동 보유 직업만 버프 대상 (사제/정화사/방패/덫꾼 제외 — 회복/독/방깎은 비적용 범위)
function canDealDamage(typeId){
  return Object.values(jobOf(typeId).actions).some(x=>['strikeFront','snipeWeak','novaAll','snipeStrong','chainLightning'].includes(x.type));
}
// v0.23: 보스 반응 — HP 50% 이하가 된 순간 전투당 1회 "장갑 강화" (FABLE_TASK_023)
//   기본 Defense +1 (유키 기본안). armorDown은 유효 방어 계산(effDef)에서 그대로 차감되므로 무충돌:
//   방깎이 먼저 걸려 있어도 강화 후 유효 방어 = (def+1) - down, max(0) 하한/최소 피해 1 규칙 불변
function checkBossReaction(e){
  if(!e.boss || e.reacted || e.hp <= 0) return false;
  if(e.hp > e.maxHp * 0.5) return false;
  e.reacted = true;          // 전투당 1회 — setupBattle의 새 객체 생성으로 재도전 시 자동 리셋
  const before = e.defense || 0;
  e.defense = before + 1;
  addLog('🛡 '+e.name+'이(가) 장갑을 조인다! (방어 '+before+' → '+e.defense+')', 'boss');
  floatText(enemyEl(enemies.indexOf(e)), '🛡 장갑 강화!', 'shout'); // v0.40A (C항목): 몬스터 개별 스킬 = 몬스터 머리 위
  const ei = enemies.indexOf(e);
  renderEnemies(ei);
  const el = enemyEl(ei);
  if(el){
    floatText(el, '🛡 장갑 강화!', 'guard');
    el.classList.add('reactShake'); // 1회 흔들림 — 수명 후 제거 (재렌더 대비 재조회)
    setTimeout(()=>{ const cur = enemyEl(enemies.indexOf(e)); if(cur) cur.classList.remove('reactShake'); }, 480);
  }
  return true;
}

// 아군 상태이상 자리 (F항목 cleanse 골격) — 현재 아군에게 디버프를 거는 적은 없음
let heroStatus = {}; // {typeId: {poison:{...}, ...}}
let fallenNoticed = new Set(); // v0.31: "쓰러짐 — 행동 불가" 안내 — 전투당 영웅별 1회
function cleanseHero(typeId, count){ // 해제한 효과 수 반환
  const st = heroStatus[typeId];
  if(!st) return 0;
  let removed = 0;
  for(const k of Object.keys(st)){
    if(count != null && removed >= count) break;
    delete st[k]; removed++;
  }
  if(Object.keys(st).length === 0) delete heroStatus[typeId];
  return removed;
}

/* v0.21: 도감/편성 설명 = JOBS.actions + 공식에서 생성 (전투와 단일 소스) */
function actionDesc(job, tier){
  const act = job.actions[tier];
  const v = actionValue(job, tier);
  switch(act.type){
    case 'strikeFront': return act.label+' — 선두 적 '+v+(act.armorBreak ? ' + 방어 -'+act.armorBreak+', 다음 '+ARMOR_DOWN_USES+'회 피격까지' : '');
    case 'snipeWeak':   return act.label+' — 약한 적 '+v;
    case 'novaAll':     return act.label+' — 적 전체 '+v;
    case 'snipeStrong': return act.label+' — 후열 우선 약한 적 '+v+' (단일 큰 한 방)'; // v0.41 저격수
    case 'chainLightning': return act.label+' — 적 '+v+' → 다음 적으로 전이 (최대 '+act.cap+'체, 전이 약화)'; // v0.41 번개술사
    case 'charge':      return act.label+' — '+v+' 비축 → 다음 마나석 매치에 원형 파동';
    case 'healSingle':  return act.label+' — 가장 위험한 아군 '+v+' 회복';
    case 'cleanseHeal': return act.label+' — 가장 위험한 아군 '+v+' 회복 + 해로운 효과 1개 해제';
    case 'shieldAlly':  return act.label+' — '+(act.count>1?'아군 '+act.count+'명':'가장 약한 아군')+'에 보호막 '+act.shield+' (10초, HP 전에 흡수)'; // v0.43 보호술사
    case 'dispel':      return act.label+' — '+(act.count>1?'적 '+act.count+'명':'강화된 적')+'의 이로운 효과 해제'+(act.hit?' + 약한 피해':' (없으면 약한 타격)'); // v0.43 해제사
    case 'cleanseAll':  return act.label+' — 아군 전체 정화 + 각 '+v+' 회복';
    case 'guard':       return act.label+' — 6초간 파티 피해 '+Math.round(act.red*100)+'% 감소'+(act.counter ? ' + 반격 '+act.counter : '');
    case 'frontGuard':  return act.label+' — '+((act.dur||6000)/1000)+'초간 전열 피해 '+Math.round(act.red*100)+'% 감소 (앞줄 한정)'; // v0.32
    case 'rowCleave':   return act.label+' — 선두 적이 속한 줄 전체에 피해 (위력 ×'+act.mult+')'; // v0.40
    case 'breakthrough':return act.label+' — 선두 적 피해 · 직접 처치 시 추가 돌진 ×'+act.cap; // v0.40
    case 'oath':        return act.label+' — '+(act.dur/1000)+'초간 가장 위험한 아군의 피해 '+Math.round(act.share*100)+'%를 나눠 받음'; // v0.39
    case 'taunt':       return act.label+' — '+(act.dur/1000)+'초간 적의 공격을 자신에게 + 보호막 '+act.shield; // v0.39
    case 'poison':      return act.label+' — 적 '+(act.target==='all'?'전체':'1명')+' 중독: 10초간 2초마다 '+act.tickDmg+' (방어 무시)';
    case 'disrupt':     return act.label+' — 곧 행동할 적 '+(act.count>1?act.count+'명':'1명')+'의 행동 게이지 -'+act.drain+' (지연, 보스는 절반)'; // v0.42 교란꾼
    case 'weaken':      return act.label+' — 위협적인 적 '+(act.count>1?act.count+'명':'1명')+'의 공격력 ×'+act.mult+' (8초, 보스는 지속 절반)'; // v0.42 약화술사
    case 'empower':     return act.label+' — 공격 아군 '+act.targets+'명의 다음 피해 행동 ×'+act.dmgMult+' (행동까지 보존, 최대 20초)';
  }
  return act.label;
}
