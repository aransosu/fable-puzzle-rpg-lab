<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emblem Quest Lab</title>
<style>
  :root{
    --bg:#14121f;
    --panel:#201c31;
    --panel2:#2a2440;
    --line:#3a3354;
    --ink:#e8e4f2;
    --dim:#9a93b5;
    --gold:#e8b34b;
    --hp:#5fc77a;
    --hp-low:#d8554a;
    --enemy-hp:#d8554a;
    --c-sword:#8fa3c8;
    --c-fire:#e0633e;
    --c-staff:#58b878;
    --c-shield:#d9a93f;
    --c-bow:#9b6fd0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    display:flex;justify-content:center;
    touch-action:manipulation;
    user-select:none;-webkit-user-select:none;
  }
  #app{
    width:100%;max-width:430px;
    min-height:100dvh;
    display:flex;flex-direction:column;
    padding:8px 10px 10px;
    gap:8px;
    position:relative;
  }
  /* ---------- 상단 ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
  }
  header .title{
    font-size:13px;letter-spacing:2px;color:var(--gold);font-weight:700;
  }
  header .stage{font-size:13px;color:var(--dim);}
  header button{
    background:var(--panel2);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;
    font-size:13px;padding:4px 10px;cursor:pointer;
  }
  /* ---------- 적 진영: 아바타 전장 (전열/후열) ---------- */
  #enemyArea{
    display:flex;flex-direction:column;justify-content:flex-end;
    min-height:138px;
    padding:8px 8px 10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
  }
  /* 후열: 작게, 위쪽, 살짝 흐리게 — 거리감 */
  .rowBack{
    display:flex;justify-content:center;align-items:flex-end;gap:18px;
    transform:scale(.78);opacity:.92;
    margin-bottom:-10px;
  }
  /* 전열: 크게, 아래쪽 */
  .rowFront{
    display:flex;justify-content:center;align-items:flex-end;gap:16px;
  }
  .mob{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:opacity .3s;
  }
  .mob.dead{opacity:.15;filter:grayscale(1);}
  .mob.hit{animation:shake .25s;}
  @keyframes shake{
    0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}
  }
  .mob.charge .mAv{animation:chargeGlow .9s infinite;}
  @keyframes chargeGlow{
    0%,100%{filter:drop-shadow(0 0 3px rgba(216,85,74,.4))}
    50%{filter:drop-shadow(0 0 11px rgba(216,85,74,.95))}
  }
  .mob .intent{
    position:absolute;top:-16px;left:50%;transform:translateX(-50%);
    background:#5b1f1f;color:#ffd28a;border:1px solid #a35b2c;
    font-size:10px;padding:1px 7px;border-radius:8px;white-space:nowrap;
    animation:pulse 1s infinite;z-index:6;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .mob .mini{width:38px;height:4px;background:#171425;border-radius:3px;overflow:hidden;}
  .mob .mini i{display:block;height:100%;background:var(--enemy-hp);border-radius:3px;transition:width .3s;}
  .mAv{position:relative;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

  /* 슬라임: 말랑한 덩어리 */
  .kind-slime .mAv{width:40px;height:30px;}
  .slBody{
    width:40px;height:30px;position:relative;
    background:radial-gradient(circle at 32% 26%, #a8ecb8, #4aa862 72%);
    border-radius:46% 46% 42% 42% / 64% 64% 38% 38%;
    animation:squish 1.9s ease-in-out infinite;
  }
  .slBody::before{
    content:'';position:absolute;top:10px;left:11px;
    width:5px;height:6px;background:#173021;border-radius:50%;
    box-shadow:12px 0 #173021;
  }
  @keyframes squish{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.86) scaleX(1.07)}}

  /* 고블린 일반 */
  .kind-goblin .mAv{width:42px;height:50px;animation:bob 2.2s ease-in-out infinite;}
  .gHead{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:20px;height:17px;background:#8fae5a;border-radius:6px;z-index:2;
  }
  .gHead::before,.gHead::after{
    content:'';position:absolute;top:3px;width:7px;height:7px;
    background:#8fae5a;border-radius:1px 5px 1px 5px;
  }
  .gHead::before{left:-6px;transform:rotate(-18deg);}
  .gHead::after{right:-6px;transform:rotate(18deg) scaleX(-1);}
  .gTorso{
    position:absolute;top:15px;left:50%;transform:translateX(-50%);
    width:26px;height:25px;background:#6d5234;border-radius:6px 6px 8px 8px;
  }
  .gClub{
    position:absolute;right:0;top:8px;width:6px;height:22px;
    background:#5a4226;border-radius:3px 3px 2px 2px;transform:rotate(14deg);
  }

  /* 고블린 정예: 더 크고 무장 */
  .kind-elite .mAv{width:54px;height:64px;animation:bob 2.6s ease-in-out infinite;}
  .kind-elite .gHead{top:5px;}
  .eHelm{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:24px;height:9px;background:#aab4c8;border-radius:6px 6px 0 0;z-index:3;
  }
  .eHelm::after{
    content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
    width:6px;height:10px;background:#c84a3a;border-radius:3px;
  }
  .eTorso{
    position:absolute;top:20px;left:50%;transform:translateX(-50%);
    width:34px;height:31px;background:#52607a;
    border:2px solid #2e3850;border-radius:7px;
  }
  .eBlade{
    position:absolute;right:-3px;top:6px;width:7px;height:36px;
    background:linear-gradient(#eef2fa,#9fb0cc);border-radius:3px;transform:rotate(16deg);
  }

  /* 박쥐: 날갯짓 */
  .kind-bat .mAv{width:48px;height:28px;animation:hover 1.6s ease-in-out infinite;}
  .bBody{
    position:absolute;left:50%;top:6px;transform:translateX(-50%);
    width:14px;height:17px;background:#4a3a5e;border-radius:7px;z-index:2;
  }
  .bBody::before{
    content:'';position:absolute;top:4px;left:2.5px;
    width:3px;height:3px;background:#ff8a7d;border-radius:50%;
    box-shadow:5.5px 0 #ff8a7d;
  }
  .wing{position:absolute;top:5px;width:19px;height:15px;background:#3a2c4a;}
  .wl{left:0;clip-path:polygon(100% 15%,0 0,22% 100%,100% 85%);transform-origin:right center;animation:flapL .5s ease-in-out infinite alternate;}
  .wr{right:0;clip-path:polygon(0 15%,100% 0,78% 100%,0 85%);transform-origin:left center;animation:flapR .5s ease-in-out infinite alternate;}
  @keyframes flapL{from{transform:rotate(10deg)}to{transform:rotate(-20deg)}}
  @keyframes flapR{from{transform:rotate(-10deg)}to{transform:rotate(20deg)}}
  @keyframes hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  /* 거대 보스: 상단 공간을 점유하는 단독 아바타 */
  .kind-boss .mAv{width:160px;height:114px;animation:breath 3s ease-in-out infinite;}
  .bossBody{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:136px;height:98px;
    background:radial-gradient(circle at 50% 26%, #5e2c50, #2a1230 76%);
    border:2px solid #6e3a5e;
    border-radius:42% 42% 30% 30% / 55% 55% 24% 24%;
  }
  .hornL,.hornR{
    position:absolute;top:-6px;width:0;height:0;z-index:2;
    border-left:11px solid transparent;border-right:11px solid transparent;
    border-bottom:28px solid #d8b06a;
  }
  .hornL{left:22px;transform:rotate(-24deg);}
  .hornR{right:22px;transform:rotate(24deg);}
  .eye{
    position:absolute;top:32px;width:14px;height:9px;
    background:#ffd24a;border-radius:50%;
    box-shadow:0 0 9px #ffae3a;animation:blink 4.2s infinite;
  }
  .el{left:40px;} .er{right:40px;}
  .maw{
    position:absolute;top:56px;left:50%;transform:translateX(-50%);
    width:48px;height:13px;background:#160a18;border-radius:0 0 17px 17px;
  }
  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  @keyframes blink{0%,46%,50%,100%{transform:scaleY(1)}48%{transform:scaleY(.12)}}
  .kind-boss .mini{width:124px;height:6px;}

  /* 플로팅 텍스트 (기존 유지) */
  .float{
    position:absolute;left:50%;top:18%;
    transform:translateX(-50%);
    font-size:15px;font-weight:800;
    pointer-events:none;z-index:5;
    animation:floatUp .85s ease-out forwards;
    text-shadow:0 1px 3px rgba(0,0,0,.7);
    white-space:nowrap;
  }
  .float.dmg{color:#ff8a7d;}
  .float.heal{color:#7df0a0;}
  .float.guard{color:#ffd97a;}
  @keyframes floatUp{
    0%{opacity:0;transform:translate(-50%,6px) scale(.8)}
    20%{opacity:1;transform:translate(-50%,0) scale(1.1)}
    100%{opacity:0;transform:translate(-50%,-22px) scale(1)}
  }
  /* ---------- 보드 ---------- */
  #boardWrap{position:relative;}
  #board{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    touch-action:none; /* 스와이프 입력과 스크롤 충돌 방지 */
    gap:5px;
    aspect-ratio:1/1; /* 7×7 정사각 전장 */
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:7px;
  }
  .cell{
    border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(15px,5.4vw,24px);
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s, opacity .2s, border-color .1s;
    background:#171425;
  }
  .cell.t0{background:color-mix(in srgb,var(--c-sword) 22%,#171425);}
  .cell.t1{background:color-mix(in srgb,var(--c-fire) 22%,#171425);}
  .cell.t2{background:color-mix(in srgb,var(--c-staff) 22%,#171425);}
  .cell.t3{background:color-mix(in srgb,var(--c-shield) 22%,#171425);}
  .cell.t4{background:color-mix(in srgb,var(--c-bow) 22%,#171425);}
  .cell.sel{border-color:var(--gold);transform:scale(1.08);}
  .cell.removing{transform:scale(.2);opacity:0;}
  .cell.spawn{animation:drop .25s;}
  @keyframes drop{from{transform:translateY(-14px);opacity:.3}to{transform:translateY(0);opacity:1}}
  /* ---------- 파티 ---------- */
  #partyArea{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:7px 9px;
    position:relative;
    transition:border-color .25s, box-shadow .25s;
  }
  /* 방패 효과 활성: 파티 전체에 방어막 표시 */
  #partyArea.shielded{
    border-color:var(--gold);
    box-shadow:0 0 10px rgba(232,179,75,.4), inset 0 0 14px rgba(232,179,75,.08);
  }
  #partyBar i.healflash{animation:healGlow .6s;}
  @keyframes healGlow{
    0%{filter:brightness(1)}40%{filter:brightness(1.9)}100%{filter:brightness(1)}
  }
  /* 아군 5인: 카드가 아닌 "동료 무리" — 레고풍 아바타 */
  #heroes{
    display:flex;justify-content:center;align-items:flex-end;
    min-height:78px;
  }
  .ally{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    margin:0 -4px; /* 살짝 겹쳐진 무리 느낌 */
    transition:transform .15s;
  }
  .ally:nth-child(1){z-index:1;}
  .ally:nth-child(2){z-index:2;}
  .ally:nth-child(3){z-index:3;} /* 중앙이 가장 앞 */
  .ally:nth-child(4){z-index:2;}
  .ally:nth-child(5){z-index:1;}
  .ally:nth-child(even) .av{margin-top:4px;} /* 미세한 높이차로 자연스러운 군집 */
  .ally.act{z-index:9;}
  .ally.act .av{
    filter:drop-shadow(0 0 8px var(--gold)) brightness(1.3);
    transform:translateY(-6px);
  }
  .av{
    position:relative;width:44px;height:56px;
    animation:bob 2.4s ease-in-out infinite;
    transition:transform .15s, filter .2s;
  }
  .ally:nth-child(1) .av{animation-delay:0s;}
  .ally:nth-child(2) .av{animation-delay:.45s;}
  .ally:nth-child(3) .av{animation-delay:.9s;}
  .ally:nth-child(4) .av{animation-delay:.25s;}
  .ally:nth-child(5) .av{animation-delay:.65s;}
  .head{
    position:absolute;top:2px;left:50%;transform:translateX(-50%);
    width:19px;height:17px;background:#ecd2ae;border-radius:6px;z-index:2;
  }
  .torso{
    position:absolute;top:17px;left:50%;transform:translateX(-50%);
    width:27px;height:28px;border-radius:7px 7px 9px 9px;z-index:1;
  }
  .prop{position:absolute;z-index:3;}
  .ally .mini{width:34px;height:4px;background:#171425;border-radius:3px;overflow:hidden;}
  .ally .mini i{display:block;height:100%;background:var(--hp);border-radius:3px;transition:width .3s;}

  /* 전사: 붉은 갑주 + 치켜든 검 */
  .t0 .torso{background:linear-gradient(#c25a50,#9a3e38);}
  .t0 .prop{
    right:-2px;top:3px;width:5px;height:27px;
    background:linear-gradient(#eef2fa,#9fb0cc);border-radius:2px;transform:rotate(16deg);
  }
  .t0 .prop::after{
    content:'';position:absolute;bottom:6px;left:-4px;
    width:13px;height:3px;background:#caa54a;border-radius:2px;
  }
  /* 마법사: 보라 로브 + 뾰족 모자 */
  .t1 .torso{
    background:linear-gradient(#7e54d4,#5a36a8);width:31px;
    clip-path:polygon(16% 0,84% 0,100% 100%,0 100%);border-radius:0;
  }
  .t1 .head::after{
    content:'';position:absolute;top:-2px;left:-5px;
    width:29px;height:4px;background:#51309a;border-radius:2px;
  }
  .t1 .prop{
    top:-9px;left:50%;transform:translateX(-50%);
    width:0;height:0;
    border-left:11px solid transparent;border-right:11px solid transparent;
    border-bottom:14px solid #51309a;
  }
  /* 사제: 흰 로브 + 빛나는 고리 + 십자 문장 */
  .t2 .torso{background:linear-gradient(#f2ecdc,#d8cfba);}
  .t2 .torso::before{
    content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);
    width:4px;height:14px;background:#c89a3a;border-radius:1px;
  }
  .t2 .torso::after{
    content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);
    width:11px;height:4px;background:#c89a3a;border-radius:1px;
  }
  .t2 .prop{
    top:-6px;left:50%;transform:translateX(-50%);
    width:20px;height:7px;border:2.5px solid #e8c860;border-radius:50%;
    box-shadow:0 0 6px rgba(232,200,96,.7);
    animation:halo 2.4s ease-in-out infinite;
  }
  @keyframes halo{0%,100%{opacity:.8}50%{opacity:1}}
  /* 수호자: 황금 갑주 + 큰 방패 */
  .t3 .torso{background:linear-gradient(#e0b44e,#b08428);}
  .t3 .prop{
    left:-8px;top:18px;width:19px;height:24px;
    background:linear-gradient(#f0d27a,#c89a3a);
    border:2px solid #8a6a1d;border-radius:7px 7px 12px 12px;
  }
  .t3 .prop::after{
    content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);
    width:5px;height:5px;background:#8a6a1d;border-radius:50%;
  }
  /* 궁수: 초록 후드 + 활 */
  .t4 .torso{background:linear-gradient(#5a9a64,#3f7448);}
  .t4 .head{background:#3f6f4a;border-radius:8px 8px 6px 6px;}
  .t4 .prop{
    right:-7px;top:11px;width:14px;height:29px;
    border:3px solid #8a5a2d;border-left:none;
    border-radius:0 16px 16px 0;
  }
  #partyHpRow{
    display:flex;align-items:center;gap:8px;margin-top:7px;
  }
  #partyHpRow .label{font-size:11px;color:var(--dim);white-space:nowrap;}
  #partyBar{
    flex:1;height:11px;background:#171425;border-radius:6px;overflow:hidden;
  }
  #partyBar i{
    display:block;height:100%;background:var(--hp);border-radius:6px;
    transition:width .3s, background .3s;
  }
  #partyHpNum{font-size:12px;color:var(--ink);min-width:54px;text-align:right;}
  #shieldTag{
    font-size:10px;color:#ffd97a;background:#3d3214;border:1px solid #6e5a23;
    border-radius:7px;padding:1px 7px;display:none;
  }
  /* ---------- 최근 사건 티커 (고정 로그 패널 대체, 최대 2줄) ---------- */
  #ticker{
    min-height:38px;
    padding:4px 10px;
    font-size:11.5px;
    line-height:1.5;
    color:var(--dim);
    text-align:center;
  }
  #ticker .tk{animation:tkIn .25s;}
  @keyframes tkIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .good{color:#8fe0a4;}
  .bad{color:#f09a92;}
  .gold{color:var(--gold);}
  .sys{color:#7e76a0;}
  .shield{color:#ffd97a;font-weight:700;}
  .boss{color:#ff7a6b;font-weight:700;}
  /* ---------- 중요 이벤트 배너 (마왕 예고, 방패 감소) ---------- */
  #banner{
    position:absolute;top:8%;left:50%;
    transform:translateX(-50%) scale(.9);
    background:rgba(20,16,34,.92);
    border:1px solid var(--gold);
    border-radius:10px;
    padding:8px 16px;
    font-size:13.5px;font-weight:700;
    white-space:nowrap;
    opacity:0;pointer-events:none;
    transition:opacity .2s, transform .2s;
    z-index:20;
  }
  #banner.show{opacity:1;transform:translateX(-50%) scale(1);}
  #banner.boss{border-color:#c84a3a;}
  /* ---------- 행동선 레이어: 영웅→적 연결, 조작 방해 금지 ---------- */
  #fxLayer{
    position:absolute;inset:0;
    width:100%;height:100%;
    pointer-events:none;  /* 필수: 퍼즐 터치를 막지 않는다 */
    z-index:30;
    overflow:visible;
  }
  /* 보드 위 매치 결과 플로팅 */
  .boardFloat{
    position:absolute;left:50%;
    transform:translateX(-50%);
    font-size:14px;font-weight:800;
    color:var(--ink);
    text-shadow:0 1px 4px rgba(0,0,0,.8);
    pointer-events:none;z-index:25;
    animation:floatUp .9s ease-out forwards;
    white-space:nowrap;
  }
  /* ---------- 오버레이 ---------- */
  #overlay{
    position:absolute;inset:0;
    background:rgba(12,10,22,.86);
    display:none;
    align-items:center;justify-content:center;
    flex-direction:column;gap:14px;
    border-radius:12px;
    z-index:10;text-align:center;padding:20px;
  }
  #overlay.show{display:flex;}
  #overlay h2{font-size:24px;color:var(--gold);letter-spacing:3px;}
  #overlay p{font-size:13px;color:var(--dim);line-height:1.6;white-space:pre-line;}
  #overlay button{
    background:var(--gold);color:#241c08;border:none;
    border-radius:10px;font-size:15px;font-weight:700;
    padding:10px 28px;cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">EMBLEM QUEST LAB</span>
    <span class="stage" id="stageLabel">전투 1 / 3</span>
    <button id="restartBtn">↻ 재시작</button>
  </header>

  <div id="enemyArea"></div>

  <div id="boardWrap">
    <div id="board"></div>
    <div id="banner"></div>
    <div id="overlay">
      <h2 id="ovTitle"></h2>
      <p id="ovText"></p>
      <button id="ovBtn"></button>
    </div>
  </div>

  <div id="partyArea">
    <div id="heroes"></div>
    <div id="partyHpRow">
      <span class="label">파티 HP</span>
      <div id="partyBar"><i></i></div>
      <span id="partyHpNum"></span>
      <span id="shieldTag"></span>
    </div>
  </div>

  <div id="ticker"></div>

</div>

<script>

/* ====================== 데이터 정의 ====================== */

  2: {1:{heal:8, label:'치유'},     2:{heal:14,label:'대치유'},     3:{heal:24,label:'필살·성광'}},
  3: {1:{red:0.5, label:'방어 태세'},2:{red:0.75,label:'철벽'},     3:{red:0.75, counter:6, label:'필살·성역'}}, // 5매치: 크게 감소 + 반격
  4: {1:{dmg:8, label:'사격'},      2:{dmg:13, label:'연속 사격'},  3:{dmg:21, label:'필살·관통시'}},   // 최저 HP 적 저격

const BATTLES = [

    {name:'슬라임', kind:'slime', maxHp:30, atk:6, row:'back'},
    {name:'슬라임', kind:'slime', maxHp:30, atk:6, row:'back'},
  ]},
  // 샘플 B — 정예+일반: 전열 중앙 정예 + 양옆 일반, 후열 박쥐 2
  {label:'전투 2', note:'샘플 B · 정예+일반', enemies:[
    {name:'고블린 전사', kind:'goblin', maxHp:45, atk:9, row:'front'},
    {name:'고블린 정예', kind:'elite',  maxHp:60, atk:10, row:'front'},
    {name:'고블린 전사', kind:'goblin', maxHp:45, atk:9, row:'front'},
    {name:'박쥐', kind:'bat', maxHp:25, atk:5, row:'back'},
    {name:'박쥐', kind:'bat', maxHp:25, atk:5, row:'back'},
  ]},
  // 샘플 C — 단독 거대 보스: 상단 공간 점유
  {label:'전투 3', note:'샘플 C · 거대 보스', enemies:[
    {name:'미니 마왕', kind:'boss', maxHp:130, atk:8, boss:true, row:'front'},

// 파티 편성: TYPES 인덱스 배열. 항목을 빼면 4인 파티 표시도 같은 코드로 대응
// (이번 버전은 5인 고정 — 4인 모드 실제 구현은 금지 범위)
const PARTY = [0, 1, 2, 3, 4];

const PARTY_MAX_HP = 100;
const CHAIN_BONUS = 0.3; // 연쇄 1단계당 +30%
const BOSS_BIG = 32;     // 미니 마왕 강공 피해 (v0.3: 26→32 상향)
const VICTORY_HEAL = 15; // 전투 승리 시 회복량 (v0.4: HP 흐름 정책, 최대 100 초과 불가)

/* ====================== 상태 ====================== */
let board = [];          // length 36, 값 0~4
let sel = null;          // 선택된 셀 index
let state = 'idle';      // idle | busy | over
let battleIdx = 0;
let enemies = [];
let partyHp = PARTY_MAX_HP;
let shieldRed = 0;       // 이번 라운드 적 공격 감소율
let shieldCounter = 0;   // 이번 라운드 반격 피해 (수호자 5매치)
let actionQueue = [];
let bossTurn = 0;

/* ====================== 유틸 ====================== */
const $ = s => document.querySelector(s);
const delay = ms => new Promise(r => setTimeout(r, ms));
const rc = i => [Math.floor(i/COLS), i%COLS];
const idx = (r,c) => r*COLS+c;
const rand = n => Math.floor(Math.random()*n);

// 최근 사건 티커: 고정 로그 패널 대신 최근 1~2개만 유지
function addLog(msg, cls){
  const t = $('#ticker');
  const el = document.createElement('div');
  el.className = 'tk ' + (cls||'');
  el.textContent = msg;
  t.appendChild(el);
  while(t.children.length > 2) t.removeChild(t.firstChild);
}

// 중요 이벤트 배너: 마왕 예고, 방패 감소 등 (자동 소멸)
let bannerTimer = null;
function banner(msg, cls){
  const b = $('#banner');
  b.textContent = msg;
  b.className = 'show ' + (cls||'');
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(()=>{ b.className=''; }, 1300);
}

// 보드 위 매치 결과 플로팅 (slot으로 세로 위치 분산, 겹침 방지)
function floatBoard(text, cls, slot){
  const wrap = $('#boardWrap');
  const f = document.createElement('div');
  f.className = 'boardFloat ' + (cls||'');
  f.style.top = (14 + (slot%4)*13) + '%';
  f.textContent = text;
  wrap.appendChild(f);
  setTimeout(()=>f.remove(), 950);
}

/* ── 행동선: 하단 영웅 → 퍼즐판 침범 → 상단 적 ── */
// 영웅 칩 참조: 블록 타입 ID → PARTY 내 위치로 변환 (편성 유연화 대응)
function heroChipEl(typeId){
  const pos = PARTY.indexOf(typeId);
  return pos >= 0 ? ($('#heroes').children[pos] || null) : null;
}

// 요소 중심 좌표 (#app 기준 px)
function centerOf(el){
  const a = $('#app').getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return [r.left + r.width/2 - a.left, r.top + r.height/2 - a.top];
}

// SVG 행동선: 짧게 그려졌다 사라진다. 레이어는 pointer-events:none
function drawLine(fromEl, toEl, color, dashed){
  const fx = $('#fxLayer');
  if(!fromEl || !toEl) return;
  // 연쇄 폭주 시 행동선 과밀 방지: 최대 10개 유지
  while(fx.children.length >= 10) fx.removeChild(fx.firstChild);
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const [x1,y1] = centerOf(fromEl);
  const [x2,y2] = centerOf(toEl);
  const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
  ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
  ln.setAttribute('stroke',color);
  ln.setAttribute('stroke-width','3');
  ln.setAttribute('stroke-linecap','round');
  ln.setAttribute('opacity','0.85');
  const len = Math.hypot(x2-x1, y2-y1);
  if(dashed){
    ln.setAttribute('stroke-dasharray','7 6'); // 궁수: 점선 관통
  }else{
    ln.setAttribute('stroke-dasharray', len);
    ln.setAttribute('stroke-dashoffset', len);
    ln.animate([{strokeDashoffset:len},{strokeDashoffset:0}], {duration:200, fill:'forwards'});
  }
  fx.appendChild(ln);
  ln.animate([{opacity:.85},{opacity:0}], {duration:250, delay:280, fill:'forwards'});
  setTimeout(()=>ln.remove(), 560); // 짧게 사라짐 — 다음 조작 방해 금지
}

// 수호자: 파티를 감싸는 보호 링 펄스
function drawGuardRing(){
  const fx = $('#fxLayer');
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const a = app.getBoundingClientRect();
  const p = $('#partyArea').getBoundingClientRect();
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', p.left-a.left-3); rect.setAttribute('y', p.top-a.top-3);
  rect.setAttribute('width', p.width+6); rect.setAttribute('height', p.height+6);
  rect.setAttribute('rx','12');
  rect.setAttribute('fill','none');
  rect.setAttribute('stroke','#ffd97a');
  rect.setAttribute('stroke-width','2.5');
  fx.appendChild(rect);
  rect.animate([{opacity:1, strokeWidth:'2.5'},{opacity:0, strokeWidth:'5'}], {duration:550, fill:'forwards'});
  setTimeout(()=>rect.remove(), 580);
}

// 플로팅 텍스트 연출: 대상 요소 위에 피해/회복/방어 수치를 띄운다
function floatText(el, text, cls){
  if(!el) return;
  const f = document.createElement('div');
  f.className = 'float ' + cls;
  f.textContent = text;
  el.appendChild(f);
  setTimeout(()=>f.remove(), 900); // 애니메이션 종료 후 클래스/노드 제거
}
// i번째 적 카드 DOM 요소
function enemyEl(i){ return $('#enemyArea').querySelector('[data-ei="'+i+'"]'); }

/* ====================== 보드 생성/판정 ====================== */
function genBoard(){
  const b = new Array(ROWS*COLS);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let t;
      do{
        t = rand(TYPES.length);
      }while(
        (c>=2 && b[idx(r,c-1)]===t && b[idx(r,c-2)]===t) ||
        (r>=2 && b[idx(r-1,c)]===t && b[idx(r-2,c)]===t)
      );
      b[idx(r,c)] = t;
    }
  }
  return b;
}

// 매치된 셀 집합 반환
function findMatchedCells(b){
  const matched = new Set();
  // 가로
  for(let r=0;r<ROWS;r++){
    let run=1;
    for(let c=1;c<=COLS;c++){
      if(c<COLS && b[idx(r,c)]!==null && b[idx(r,c)]===b[idx(r,c-1)]) run++;
      else{
        if(run>=3 && b[idx(r,c-1)]!==null)
          for(let k=c-run;k<c;k++) matched.add(idx(r,k));
        run=1;
      }
    }
  }
  // 세로
  for(let c=0;c<COLS;c++){
    let run=1;
    for(let r=1;r<=ROWS;r++){
      if(r<ROWS && b[idx(r,c)]!==null && b[idx(r,c)]===b[idx(r-1,c)]) run++;
      else{
        if(run>=3 && b[idx(r-1,c)]!==null)
          for(let k=r-run;k<r;k++) matched.add(idx(k,c));
        run=1;
      }
    }
  }
  return matched;
}

// 매치 셀을 같은 타입 연결 그룹으로 묶기 (L/T 모양은 하나의 그룹 = 더 큰 행동)
function findMatchGroups(b){
  const matched = findMatchedCells(b);
  const visited = new Set();
  const groups = [];
  for(const start of matched){
    if(visited.has(start)) continue;
    const type = b[start];
    const cells = [];
    const stack = [start];
    visited.add(start);
    while(stack.length){
      const i = stack.pop();
      cells.push(i);
      const [r,c] = rc(i);
      [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
        const ni = idx(nr,nc);
        if(matched.has(ni) && !visited.has(ni) && b[ni]===type){
          visited.add(ni);
          stack.push(ni);
        }
      });
    }
    groups.push({type, cells});
  }
  return groups;
}

function hasValidMove(b){
  const test = b.slice();
  const trySwap = (a,bI)=>{
    [test[a],test[bI]] = [test[bI],test[a]];
    const ok = findMatchedCells(test).size>0;
    [test[a],test[bI]] = [test[bI],test[a]];
    return ok;
  };
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(c<COLS-1 && trySwap(idx(r,c), idx(r,c+1))) return true;
      if(r<ROWS-1 && trySwap(idx(r,c), idx(r+1,c))) return true;
    }
  }
  return false;
}

function ensurePlayable(){
  if(!hasValidMove(board)){
    board = genBoard();
    addLog('교환 가능한 블록이 없어 보드를 재배열했다.', 'sys');
    renderBoard();
  }
}

/* ====================== 렌더링 ====================== */
function renderBoard(spawnSet){
  const el = $('#board');
  el.innerHTML = '';
  for(let i=0;i<ROWS*COLS;i++){
    const d = document.createElement('div');
    const t = board[i];
    d.className = 'cell' + (t===null ? '' : ' t'+t);
    if(t!==null) d.textContent = TYPES[t].sym;
    if(sel===i) d.classList.add('sel');
    if(spawnSet && spawnSet.has(i)) d.classList.add('spawn');
    d.dataset.i = i;
    el.appendChild(d);
  }
}

// 몬스터 아바타 마크업 (외부 이미지 없이 CSS 조형)
function monsterAvatar(kind){
  if(kind==='slime')  return '<div class="mAv"><div class="slBody"></div></div>';
  if(kind==='goblin') return '<div class="mAv"><div class="gHead"></div><div class="gTorso"></div><div class="gClub"></div></div>';
  if(kind==='elite')  return '<div class="mAv"><div class="eHelm"></div><div class="gHead"></div><div class="eTorso"></div><div class="eBlade"></div></div>';
  if(kind==='bat')    return '<div class="mAv"><span class="wing wl"></span><div class="bBody"></div><span class="wing wr"></span></div>';
  if(kind==='boss')   return '<div class="mAv"><div class="hornL"></div><div class="hornR"></div><div class="bossBody"><div class="eye el"></div><div class="eye er"></div><div class="maw"></div></div></div>';
  return '';
}

function renderEnemies(hitIdx, hitAll){
  const area = $('#enemyArea');
  area.innerHTML = '';
  const mk = (e,i)=>{
    const d = document.createElement('div');
    d.className = 'mob kind-'+e.kind
      + (e.hp<=0?' dead':'')
      + ((hitIdx===i || (hitAll && e.hp>0))?' hit':'')
      + (e.charging?' charge':'');
    d.dataset.ei = i; // 진영(전열/후열) 분리 후에도 인덱스로 추적
    const pct = Math.max(0, e.hp/e.maxHp*100);
    d.innerHTML =
      (e.charging ? '<div class="intent">⚡ 강공 준비</div>' : '') +
      monsterAvatar(e.kind) +
      '<div class="mini"><i style="width:'+pct+'%"></i></div>';
    return d;
  };
  // 후열(위, 작게) → 전열(아래, 크게): 진영 거리감
  const back = document.createElement('div'); back.className = 'rowBack';
  const front = document.createElement('div'); front.className = 'rowFront';
  enemies.forEach((e,i)=>{ (e.row==='back' ? back : front).appendChild(mk(e,i)); });
  if(back.children.length) area.appendChild(back);
  area.appendChild(front);
}

function renderParty(actType){
  const h = $('#heroes');
  h.innerHTML = '';
  // PARTY 배열 기반 아바타 렌더링: 직업명/역할 텍스트 없이 실루엣·소품·색으로 구분
  // 아바타별 미니 HP바: 현재는 파티 공유 HP를 비추는 자리표시 — 향후 개별 HP 수납 공간 확인용
  const pct0 = Math.max(0, partyHp/PARTY_MAX_HP*100);
  PARTY.forEach(typeId=>{
    const d = document.createElement('div');
    d.className = 'ally t'+typeId + (actType===typeId?' act':'');
    d.dataset.type = typeId;
    d.innerHTML =
      '<div class="av"><div class="prop"></div><div class="head"></div><div class="torso"></div></div>' +
      '<div class="mini"><i style="width:'+pct0+'%"></i></div>';
    h.appendChild(d);
  });
  const pct = Math.max(0, partyHp/PARTY_MAX_HP*100);
  const bar = $('#partyBar i');
  bar.style.width = pct+'%';
  bar.style.background = pct<=30 ? 'var(--hp-low)' : 'var(--hp)';
  $('#partyHpNum').textContent = Math.max(0,partyHp)+' / '+PARTY_MAX_HP;
  const tag = $('#shieldTag');
  // 방패 효과 가시화: 활성 시 파티 영역 외곽선 + 상태 문구, 소모 시 자동 제거
  $('#partyArea').classList.toggle('shielded', shieldRed>0);
  if(shieldRed>0){
    tag.style.display='inline-block';
    tag.textContent = '방어 중 · 피해 '+Math.round(shieldRed*100)+'% 감소';
  }else tag.style.display='none';
}

function renderStage(){
  $('#stageLabel').textContent = BATTLES[battleIdx].label + '/3 · ' + BATTLES[battleIdx].note;
}

function renderAll(){
  renderStage(); renderEnemies(); renderBoard(); renderParty();
}

/* ====================== 전투 로직 ====================== */
function aliveEnemies(){ return enemies.filter(e=>e.hp>0); }

function queueAction(type, size, chain){
  const tier = size>=5 ? 3 : size===4 ? 2 : 1;
  const mult = 1 + CHAIN_BONUS*(chain-1);
  actionQueue.push({type, tier, mult, chain});
}

async function executeActions(){
  for(const a of actionQueue){
    if(aliveEnemies().length===0 && ACTS[a.type][a.tier].dmg) continue;
    renderParty(a.type); // 행동하는 영웅 칩 강조 (act 클래스)
    const spec = ACTS[a.type][a.tier];

    if(a.type===0){ // 전사: 선두 단일 공격 — 대상이 흔들리고 피해 수치가 뜬다
      const tgt = aliveEnemies()[0];
      if(tgt){
        const dmg = Math.round(spec.dmg * a.mult);
        tgt.hp -= dmg;
        addLog('전사가 '+tgt.name+'에게 '+dmg+' 피해. ('+spec.label+')', 'good');
        renderEnemies(enemies.indexOf(tgt));
        drawLine(heroChipEl(0), enemyEl(enemies.indexOf(tgt)), '#aebcdc'); // 전사: 퍼즐판 관통 행동선
        floatText(enemyEl(enemies.indexOf(tgt)), '-'+dmg, 'dmg');
        if(tgt.hp<=0) addLog(tgt.name+' 처치!', 'gold');
      }
    }
    else if(a.type===1){ // 마법사: 전체 공격 — 모든 적이 짧게 피해 반응
      const dmg = Math.round(spec.dmg * a.mult);
      const targets = aliveEnemies();
      targets.forEach(e=>{ e.hp -= dmg; });
      addLog('마법사가 모든 적에게 '+dmg+' 피해. ('+spec.label+')', 'good');
      renderEnemies(null, true); // hitAll: 전 적 흔들림
      targets.forEach(e=>{
        drawLine(heroChipEl(1), enemyEl(enemies.indexOf(e)), '#e0633e'); // 마법사: 전 적으로 에너지선
        floatText(enemyEl(enemies.indexOf(e)), '-'+dmg, 'dmg');
        if(e.hp<=0) addLog(e.name+' 처치!', 'gold');
      });
    }
    else if(a.type===2){ // 사제: 회복 — HP바 플래시 + 회복 수치 플로팅
      const heal = Math.round(spec.heal * a.mult);
      const before = partyHp;
      partyHp = Math.min(PARTY_MAX_HP, partyHp + heal);
      addLog('사제가 파티 HP '+(partyHp-before)+' 회복. ('+spec.label+')', 'good');
      renderParty(a.type);
      const bar = $('#partyBar i');
      bar.classList.add('healflash');
      drawLine(heroChipEl(2), $('#partyBar'), '#58b878'); // 사제: 회복 파동
      setTimeout(()=>bar.classList.remove('healflash'), 650); // 연출 클래스 제거
      floatText($('#partyArea'), '+'+(partyHp-before), 'heal');
    }
    else if(a.type===3){ // 수호자: 피해 감소 — 파티 영역 방어막 표시 (+5매치 반격)
      shieldRed = Math.max(shieldRed, spec.red);
      let msg = '수호자가 방어 태세! 피해 '+Math.round(spec.red*100)+'% 감소. ('+spec.label+')';
      if(spec.counter){
        shieldCounter = Math.max(shieldCounter, Math.round(spec.counter * a.mult));
        msg += ' 반격 '+shieldCounter+' 준비.';
      }
      addLog(msg, 'shield');
      renderParty(a.type); // shielded 외곽선 즉시 반영
      drawGuardRing(); // 수호자: 파티를 감싸는 보호 링
      floatText($('#partyArea'), '🛡 방어', 'guard');
    }
    else if(a.type===4){ // 궁수: 최저 HP 적 저격 — 표식 + 타격 반응
      const pool = aliveEnemies();
      const tgt = pool.length ? pool.reduce((m,e)=> e.hp<m.hp ? e : m, pool[0]) : null;
      if(tgt){
        const dmg = Math.round(spec.dmg * a.mult);
        tgt.hp -= dmg;
        addLog('궁수가 '+tgt.name+'에게 '+dmg+' 피해. ('+spec.label+')', 'good');
        renderEnemies(enemies.indexOf(tgt));
        drawLine(heroChipEl(4), enemyEl(enemies.indexOf(tgt)), '#b48ae0', true); // 궁수: 점선 관통선
        floatText(enemyEl(enemies.indexOf(tgt)), '🎯 -'+dmg, 'dmg');
        if(tgt.hp<=0) addLog(tgt.name+' 처치!', 'gold');
      }
    }
    await delay(420);
  }
  actionQueue = [];
  renderParty(); // act 강조 클래스 해제 (행동 종료)
}

async function enemyTurn(){
  for(const e of enemies){
    if(e.hp<=0) continue;
    let dmg = e.atk;
    let label = '공격';
    let isBig = false;
    if(e.boss){
      if(e.charging){
        dmg = BOSS_BIG; label = '마왕의 일격'; isBig = true; e.charging = false;
      }else{
        bossTurn++;
        if(bossTurn % 3 === 0){
          e.charging = true;
          banner('😈 미니 마왕이 어둠을 모은다!', 'boss');
          addLog('미니 마왕이 어둠을 모은다. 다음 턴 강력한 공격!', 'boss');
          renderEnemies(); // charge 클래스 + "강공 준비" 표시 반영
          await delay(420);
          continue; // 충전 턴은 공격하지 않음
        }
      }
    }
    const eff = Math.round(dmg * (1 - shieldRed));
    partyHp -= eff;
    if(shieldRed>0 && eff<dmg){
      // 방패 감소: 원래/감소 후 피해를 배너 + 티커로 표시
      banner('🛡 수호자의 방패! '+dmg+' → '+eff, 'shield');
      addLog('수호자의 방패! '+e.name+'의 '+dmg+' 피해가 '+eff+' 피해로 감소.', 'shield');
    }else if(isBig){
      addLog(e.name+'의 일격! 파티에 '+eff+' 피해!', 'boss');
    }else{
      addLog(e.name+'의 '+label+'! 파티에 '+eff+' 피해', 'bad');
    }
    floatText($('#partyArea'), '-'+eff, 'dmg');
    // 수호자 5매치 반격: 공격해 온 적에게 소량 피해
    if(shieldCounter>0){
      e.hp -= shieldCounter;
      addLog('수호자의 반격! '+e.name+'에게 '+shieldCounter+' 피해', 'good');
      renderEnemies(enemies.indexOf(e));
      if(e.hp<=0) addLog(e.name+' 처치!', 'gold');
    }
    renderParty();
    await delay(420);
    if(partyHp<=0) break;
  }
  shieldRed = 0;
  shieldCounter = 0;
  renderParty();
  renderEnemies();
}

/* ====================== 진행 흐름 ====================== */
async function resolveBoard(){
  let chain = 0;
  while(true){
    const groups = findMatchGroups(board);
    if(groups.length===0) break;
    chain++;
    // 매치/연쇄 정보: 보드 위 플로팅 + 티커 (로그 패널 없음)
    let slot = 0;
    if(chain>1){
      const txt = chain+'연쇄! 위력 +'+Math.round(CHAIN_BONUS*100*(chain-1))+'%';
      floatBoard(txt, 'gold', slot++);
      addLog(txt, 'gold');
    }
    for(const g of groups){
      queueAction(g.type, g.cells.length, chain);
      const t = TYPES[g.type];
      const txt = t.sym+' '+t.block+' 문장 '+g.cells.length+'개!';
      floatBoard(txt, 'sys', slot++);
      addLog(txt, 'sys');
    }

    // 삭제 연출
    const removeSet = new Set();
    groups.forEach(g=>g.cells.forEach(c=>removeSet.add(c)));
    document.querySelectorAll('.cell').forEach(c=>{
      if(removeSet.has(+c.dataset.i)) c.classList.add('removing');
    });
    await delay(300);

    // 삭제 → 낙하 → 생성
    removeSet.forEach(i=>{ board[i]=null; });
    const spawnSet = new Set();
    for(let c=0;c<COLS;c++){
      let write = ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(board[idx(r,c)]!==null){
          board[idx(write,c)] = board[idx(r,c)];
          if(write!==r) board[idx(r,c)] = null;
          write--;
        }
      }
      for(let r=write;r>=0;r--){
        board[idx(r,c)] = rand(TYPES.length);
        spawnSet.add(idx(r,c));
      }
    }
    renderBoard(spawnSet);
    await delay(260);
  }

  await executeActions();

  if(aliveEnemies().length===0){
    await onBattleWon();
    return;
  }

  await enemyTurn();

  if(partyHp<=0){
    onDefeat();
    return;
  }
  // 수호자 반격으로 마지막 적이 쓰러졌을 수 있음
  if(aliveEnemies().length===0){
    await onBattleWon();
    return;
  }

  ensurePlayable();
  state = 'idle';
}

async function onBattleWon(){
  addLog('── '+BATTLES[battleIdx].label+' 승리! ──', 'gold');
  await delay(500);
  if(battleIdx >= BATTLES.length-1){
    // 3번째 전투 클리어 = 전체 클리어
    showOverlay('전체 클리어!', '마왕을 물리쳤다. 다섯 영웅의 모험은 계속된다...', '처음부터 다시', resetGame);
    state = 'over';
    return;
  }
  // 승리 회복 정책: 다음 전투 진입 전 +15, 최대 HP 100 초과 불가
  const before = partyHp;
  partyHp = Math.min(PARTY_MAX_HP, partyHp + VICTORY_HEAL);
  const gained = partyHp - before;
  addLog('전투 승리! 파티가 숨을 고르며 HP '+gained+' 회복. ('+before+' → '+partyHp+')', 'good');
  renderParty();
  floatText($('#partyArea'), '+'+gained, 'heal');
  state = 'over';
  // 다음 전투 버튼을 누르기 전, 회복 결과를 오버레이에서 인지 가능
  showOverlay('승리!',
    BATTLES[battleIdx].label+'을(를) 돌파했다.\n파티가 숨을 고르며 HP '+gained+' 회복.\nHP '+before+' → '+partyHp,
    '다음 전투 ▶', ()=>{
    battleIdx++;
    setupBattle();
    state = 'idle';
  });
}

function onDefeat(){
  addLog('파티가 쓰러졌다...', 'bad');
  showOverlay('패배', '파티의 HP가 0이 되었다.\n블록을 다시 모아 도전하자.', '다시 시작', resetGame);
  state = 'over';
}

function setupBattle(){
  enemies = BATTLES[battleIdx].enemies.map(e=>({...e, hp:e.maxHp, charging:false}));
  bossTurn = 0;
  shieldRed = 0;
  shieldCounter = 0;
  board = genBoard();
  if(!hasValidMove(board)) board = genBoard();
  sel = null;
  addLog('═══ '+BATTLES[battleIdx].label+' 시작 ═══', 'gold');
  enemies.forEach(e=>addLog(e.name+' 등장! (HP '+e.maxHp+')', 'sys'));
  renderAll();
}

function showOverlay(title, text, btnLabel, onClick){
  $('#ovTitle').textContent = title;
  $('#ovText').textContent = text;
  $('#ovBtn').textContent = btnLabel;
  $('#ovBtn').onclick = ()=>{ hideOverlay(); onClick(); };
  $('#overlay').classList.add('show');
}
function hideOverlay(){ $('#overlay').classList.remove('show'); }

function resetGame(){
  battleIdx = 0;
  partyHp = PARTY_MAX_HP;
  actionQueue = [];
  $('#ticker').innerHTML = '';
  $('#banner').className = '';
  addLog('Emblem Quest Lab — 블록을 맞춰 영웅을 움직여라!', 'gold');
  addLog('블록을 탭해 선택하고, 인접한 블록을 탭해 교환한다.', 'sys');
  setupBattle();
  state = 'idle';
}

/* ====================== 입력 ====================== */
function adjacent(a,b){
  const [r1,c1]=rc(a), [r2,c2]=rc(b);
  return Math.abs(r1-r2)+Math.abs(c1-c2)===1;
}

async function trySwap(a,b){
  state = 'busy';
  [board[a],board[b]] = [board[b],board[a]];
  sel = null;
  renderBoard();
  await delay(170);
  if(findMatchedCells(board).size===0){
    [board[a],board[b]] = [board[b],board[a]];
    renderBoard();
    await delay(150);
    state = 'idle';
    return;
  }
  await resolveBoard();
}

// 탭-탭 교환 (fallback): 블록 선택 → 인접 블록 선택
function tapCell(i){
  if(state!=='idle') return;
  if(sel===null){
    sel = i; renderBoard();
  }else if(sel===i){
    sel = null; renderBoard();
  }else if(adjacent(sel,i)){
    trySwap(sel,i);
  }else{
    sel = i; renderBoard();
  }
}

/* ── 스와이프 교환: 누르고 → 밀면 → 가장 큰 방향으로 인접 교환 ── */
const SWIPE_DIST = 18; // 판정 거리(px)

// 스와이프 방향 판정: 큰 축 우선. 보드 밖이면 null (무시)
function swipeTarget(i, dx, dy){
  const dir = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? [0,1] : [0,-1])
    : (dy > 0 ? [1,0] : [-1,0]);
  const [r,c] = rc(i);
  const nr = r + dir[0], nc = c + dir[1];
  if(nr<0 || nr>=ROWS || nc<0 || nc>=COLS) return null; // 보드 밖 스와이프 무시
  return idx(nr,nc);
}

let drag = null;
const boardEl = $('#board');

boardEl.addEventListener('pointerdown', e=>{
  const cell = e.target.closest('.cell');
  if(!cell || state!=='idle') return;
  drag = { i:+cell.dataset.i, x:e.clientX, y:e.clientY, swiped:false };
});

boardEl.addEventListener('pointermove', e=>{
  if(!drag || drag.swiped || state!=='idle') return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if(Math.hypot(dx,dy) < SWIPE_DIST) return;
  drag.swiped = true; // 한 번의 스와이프 = 한 번의 교환
  const target = swipeTarget(drag.i, dx, dy);
  if(target===null){ drag = null; return; }
  sel = null;
  trySwap(drag.i, target); // 매치 없으면 trySwap이 자동 복귀
  drag = null;
});

boardEl.addEventListener('pointerup', e=>{
  if(!drag) return;
  const moved = Math.hypot(e.clientX - drag.x, e.clientY - drag.y);
  const i = drag.i;
  drag = null;
  if(moved < 10) tapCell(i); // 거의 안 움직였으면 탭으로 처리
});

boardEl.addEventListener('pointercancel', ()=>{ drag = null; });

$('#restartBtn').addEventListener('click', ()=>{
  if(state==='busy') return;
  hideOverlay();
  resetGame();
});

/* ====================== 시작 ====================== */
resetGame();
</script>
