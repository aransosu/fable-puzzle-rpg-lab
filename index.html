<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Emblem Quest Lab v0.15 — FABLE_TASK_015: Puzzle Stone Impact & Burst FX R&D -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emblem Quest Lab</title>
<style>
  :root{
    --bg:#14121f;
    --panel:#201c31;
    --panel2:#2a2440;
    --line:#3a3354;
    --ink:#e8e4f2;
    --dim:#9a93b5;
    --gold:#e8b34b;
    --hp:#5fc77a;
    --hp-low:#d8554a;
    --enemy-hp:#d8554a;
    --c-sword:#8fa3c8;
    --c-fire:#e0633e;
    --c-staff:#58b878;
    --c-shield:#d9a93f;
    --c-bow:#9b6fd0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    display:flex;justify-content:center;
    touch-action:manipulation;
    user-select:none;-webkit-user-select:none;
  }
  #app{
    width:100%;max-width:430px;
    min-height:100dvh;
    display:flex;flex-direction:column;
    padding:8px 10px 8px;
    gap:7px;
    position:relative;
  }
  /* ---------- 상단 ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:4px 10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
  }
  header .title{
    font-size:13px;letter-spacing:2px;color:var(--gold);font-weight:700;
  }
  header .stage{font-size:13px;color:var(--dim);}
  header button{
    background:var(--panel2);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;
    font-size:13px;padding:4px 10px;cursor:pointer;
  }
  /* ---------- 적 진영: 아바타 전장 (전열/후열) ---------- */
  #enemyArea{
    flex:1; /* 남는 세로 공간을 몬스터 진영이 흡수 — 위로 넓어진 전장 */
    min-height:150px;
    position:relative;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:12px 8px 10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
  }
  /* 3열 진영: 후후열(가장 멀리) → 중간열 → 전열 */
  /* v0.11: 적은 수일 때도 가로로 퍼져 전장을 점유 (space-evenly), 다수일 때는 gap이 최소 간격 */
  .rowBack{
    display:flex;justify-content:space-evenly;align-items:flex-end;gap:6px;
    transform:scale(.68);opacity:.84;
    margin-bottom:-6px; /* v0.13: 겹침 완화 — 게이지 가독성 */
  }
  .rowMid{
    display:flex;justify-content:space-evenly;align-items:flex-end;gap:7px;
    transform:scale(.84);opacity:.93;
    margin-bottom:-8px; /* v0.13: 겹침 완화 */
  }
  .rowFront{
    display:flex;justify-content:space-evenly;align-items:flex-end;gap:8px;
  }
  /* 마법사 원형 파동 예고: 적 진영 중앙의 점선 원 */
  .wavePre{
    position:absolute;left:50%;top:50%;
    width:128px;height:128px;transform:translate(-50%,-50%);
    border:2px dashed rgba(255,154,74,.75);border-radius:50%;
    animation:preePulse 1.3s ease-in-out infinite;
    pointer-events:none;z-index:5;
  }
  @keyframes preePulse{
    0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.75}
    50%{transform:translate(-50%,-50%) scale(1.12);opacity:1}
  }
  .mob{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:opacity .3s;
  }
  /* v0.13: 같은 열 안 사선 층위 — 짝수 번째가 살짝 위로, 바끼리 겹치지 않음 */
  .rowFront .mob:nth-child(even){margin-bottom:10px;}
  .rowMid .mob:nth-child(even){margin-bottom:8px;}
  .rowBack .mob:nth-child(even){margin-bottom:7px;}
  /* HP바/게이지에 어두운 외곽선 — 뒤 몸체 위에서도 읽힘 */
  .mob .mini,.mob .gauge{box-shadow:0 0 0 1.5px rgba(13,10,22,.75);}
  .mob.dead{opacity:.15;filter:grayscale(1);}
  .mob.hit{animation:shake .25s;}
  @keyframes shake{
    0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}
  }
  .mob.charge .mAv{animation:chargeGlow .9s infinite;}
  @keyframes chargeGlow{
    0%,100%{filter:drop-shadow(0 0 3px rgba(216,85,74,.4))}
    50%{filter:drop-shadow(0 0 11px rgba(216,85,74,.95))}
  }
  .mob .intent{
    position:absolute;top:-16px;left:50%;transform:translateX(-50%);
    background:#5b1f1f;color:#ffd28a;border:1px solid #a35b2c;
    font-size:10px;padding:1px 7px;border-radius:8px;white-space:nowrap;
    animation:pulse 1s infinite;z-index:6;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .mob .mini{width:48px;height:5px;background:#171425;border-radius:3px;overflow:hidden;}
  .mob .mini i{display:block;height:100%;background:var(--enemy-hp);border-radius:3px;transition:width .3s;}
  .mAv{position:relative;}
  /* 대량 쇼케이스(18체): HP바 간소화로 지저분함 방지 */
  #enemyArea.showcase .mob .mini{width:28px;height:3px;}
  #enemyArea.showcase .mob .gauge{display:none;}
  /* 행동 게이지: HP바와 구분되는 청회색, 만충 임박 시 주황 + 떨림 */
  .mob .gauge{width:48px;height:3px;background:#171425;border-radius:2px;overflow:hidden;margin-top:1px;}
  .mob .gauge i{display:block;height:100%;width:0%;background:#7e8fc0;border-radius:2px;}
  .kind-boss .gauge{width:152px;}
  .mob.ready .gauge i{background:#e08a3a;}
  .mob.ready{animation:tremble .16s linear infinite;}
  @keyframes tremble{0%,100%{transform:translateX(0)}50%{transform:translateX(1.7px)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

  /* 슬라임: 말랑한 덩어리 */
  .kind-slime .mAv{width:52px;height:38px;}
  .slBody{
    width:52px;height:38px;position:relative;
    background:radial-gradient(circle at 32% 26%, #a8ecb8, #4aa862 72%);
    border-radius:46% 46% 42% 42% / 64% 64% 38% 38%;
    animation:squish 1.9s ease-in-out infinite;
  }
  .slBody::before{
    content:'';position:absolute;top:13px;left:14px;
    width:6px;height:8px;background:#173021;border-radius:50%;
    box-shadow:16px 0 #173021;
  }
  @keyframes squish{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.86) scaleX(1.07)}}

  /* 고블린 일반 */
  .kind-goblin .mAv{width:54px;height:64px;animation:bob 2.2s ease-in-out infinite;}
  .gHead{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:26px;height:22px;background:#8fae5a;border-radius:8px;z-index:2;
  }
  .gHead::before,.gHead::after{
    content:'';position:absolute;top:4px;width:9px;height:9px;
    background:#8fae5a;border-radius:1px 5px 1px 5px;
  }
  .gHead::before{left:-7px;transform:rotate(-18deg);}
  .gHead::after{right:-7px;transform:rotate(18deg) scaleX(-1);}
  .gTorso{
    position:absolute;top:19px;left:50%;transform:translateX(-50%);
    width:34px;height:33px;background:#6d5234;border-radius:8px 8px 10px 10px;
  }
  .gClub{
    position:absolute;right:0;top:10px;width:8px;height:29px;
    background:#5a4226;border-radius:4px 4px 3px 3px;transform:rotate(14deg);
  }

  /* 고블린 정예: 더 크고 무장 */
  .kind-elite .mAv{width:70px;height:84px;animation:bob 2.6s ease-in-out infinite;}
  .kind-elite .gHead{top:7px;}
  .eHelm{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:31px;height:12px;background:#aab4c8;border-radius:8px 8px 0 0;z-index:3;
  }
  .eHelm::after{
    content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
    width:8px;height:13px;background:#c84a3a;border-radius:4px;
  }
  .eTorso{
    position:absolute;top:26px;left:50%;transform:translateX(-50%);
    width:45px;height:41px;background:#52607a;
    border:2.5px solid #2e3850;border-radius:9px;
  }
  .eBlade{
    position:absolute;right:-4px;top:8px;width:9px;height:47px;
    background:linear-gradient(#eef2fa,#9fb0cc);border-radius:4px;transform:rotate(16deg);
  }

  /* 박쥐: 날갯짓 */
  .kind-bat .mAv{width:62px;height:36px;animation:hover 1.6s ease-in-out infinite;}
  .bBody{
    position:absolute;left:50%;top:7px;transform:translateX(-50%);
    width:18px;height:22px;background:#4a3a5e;border-radius:9px;z-index:2;
  }
  .bBody::before{
    content:'';position:absolute;top:5px;left:3.5px;
    width:4px;height:4px;background:#ff8a7d;border-radius:50%;
    box-shadow:7px 0 #ff8a7d;
  }
  .wing{position:absolute;top:6px;width:25px;height:19px;background:#3a2c4a;}
  .wl{left:0;clip-path:polygon(100% 15%,0 0,22% 100%,100% 85%);transform-origin:right center;animation:flapL .5s ease-in-out infinite alternate;}
  .wr{right:0;clip-path:polygon(0 15%,100% 0,78% 100%,0 85%);transform-origin:left center;animation:flapR .5s ease-in-out infinite alternate;}
  @keyframes flapL{from{transform:rotate(10deg)}to{transform:rotate(-20deg)}}
  @keyframes flapR{from{transform:rotate(-10deg)}to{transform:rotate(20deg)}}
  @keyframes hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  /* 거대 보스: 상단 공간을 점유하는 단독 아바타 */
  .kind-boss .mAv{width:196px;height:142px;animation:breath 3s ease-in-out infinite;}
  .bossBody{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:168px;height:122px;
    background:radial-gradient(circle at 50% 26%, #5e2c50, #2a1230 76%);
    border:2px solid #6e3a5e;
    border-radius:42% 42% 30% 30% / 55% 55% 24% 24%;
  }
  .hornL,.hornR{
    position:absolute;top:-6px;width:0;height:0;z-index:2;
    border-left:14px solid transparent;border-right:14px solid transparent;
    border-bottom:34px solid #d8b06a;
  }
  .hornL{left:28px;transform:rotate(-24deg);}
  .hornR{right:28px;transform:rotate(24deg);}
  .eye{
    position:absolute;top:40px;width:17px;height:11px;
    background:#ffd24a;border-radius:50%;
    box-shadow:0 0 9px #ffae3a;animation:blink 4.2s infinite;
  }
  .el{left:50px;} .er{right:50px;}
  .maw{
    position:absolute;top:70px;left:50%;transform:translateX(-50%);
    width:58px;height:16px;background:#160a18;border-radius:0 0 21px 21px;
  }
  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  @keyframes blink{0%,46%,50%,100%{transform:scaleY(1)}48%{transform:scaleY(.12)}}
  .kind-boss .mini{width:152px;height:7px;}

  /* 플로팅 텍스트 (기존 유지) */
  .float{
    position:absolute;left:50%;top:18%;
    transform:translateX(-50%);
    font-size:15px;font-weight:800;
    pointer-events:none;z-index:5;
    animation:floatUp .85s ease-out forwards;
    text-shadow:0 1px 3px rgba(0,0,0,.7);
    white-space:nowrap;
  }
  .float.dmg{color:#ff8a7d;}
  .float.heal{color:#7df0a0;}
  .float.guard{color:#ffd97a;}
  @keyframes floatUp{
    0%{opacity:0;transform:translate(-50%,6px) scale(.8)}
    20%{opacity:1;transform:translate(-50%,0) scale(1.1)}
    100%{opacity:0;transform:translate(-50%,-22px) scale(1)}
  }
  /* ---------- 보드 ---------- */
  #boardWrap{position:relative;}
  #board{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    touch-action:none; /* 스와이프 입력과 스크롤 충돌 방지 */
    gap:5px;
    aspect-ratio:1/1; /* 7×7 정사각 전장 */
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:7px;
  }
  /* v0.15: 블록 = 2.5D 전투 스톤 — 상단 하이라이트 + 측면 베벨 + 하단 두께감.
     그라데이션/inset 그림자만 사용. blur·상시 filter 없음 (모바일 성능). */
  .cell{
    --tc:#5a5470; /* 속성색: t0~t4가 덮어씀 */
    position:relative;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(15px,5.4vw,24px);
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s, opacity .2s, border-color .1s;
    background:#171425; /* 빈 칸 (낙하 과도기) */
  }
  .cell.t0,.cell.t1,.cell.t2,.cell.t3,.cell.t4{
    border-color:color-mix(in srgb,var(--tc) 42%,#06040c);
    background:
      radial-gradient(circle at 32% 24%, rgba(255,255,255,.30), rgba(255,255,255,0) 46%),
      linear-gradient(168deg,
        color-mix(in srgb,var(--tc) 58%,#332b4d) 0%,
        color-mix(in srgb,var(--tc) 34%,#191427) 56%,
        color-mix(in srgb,var(--tc) 18%,#0d0a16) 100%);
    box-shadow:
      inset 0 2px 2px rgba(255,255,255,.20),   /* 상단 유리 하이라이트 */
      inset 1px 0 1px rgba(255,255,255,.06),   /* 좌측 미세 베벨 */
      inset 0 -3px 4px rgba(0,0,0,.50),        /* 하단 두께/음영 */
      0 2px 3px rgba(0,0,0,.38);               /* 보드에서 살짝 뜬 느낌 */
    text-shadow:0 2px 3px rgba(0,0,0,.55);     /* 심볼도 조각처럼 박힌 인상 */
  }
  .cell.t0{--tc:var(--c-sword);}
  .cell.t1{--tc:var(--c-fire);}
  .cell.t2{--tc:var(--c-staff);}
  .cell.t3{--tc:var(--c-shield);}
  .cell.t4{--tc:var(--c-bow);}
  .cell:active{transform:scale(.94);} /* 누르는 손맛 */
  .cell.sel{
    border-color:var(--gold);transform:scale(1.08);
    box-shadow:
      inset 0 2px 2px rgba(255,255,255,.24),
      inset 0 -3px 4px rgba(0,0,0,.50),
      0 0 8px rgba(232,179,75,.55);
  }
  /* v0.15: 매치 직전 반응 — 힘이 응축되며 squash&stretch로 부르르 */
  .cell.primed{
    border-color:#fff;
    filter:brightness(1.45); /* 200ms 한정 사용 — 상시 아님 */
    animation:prime .2s ease-in forwards;
    z-index:2;
  }
  @keyframes prime{
    0%{transform:scale(1)}
    30%{transform:scale(1.07,.92) rotate(-3deg)}
    60%{transform:scale(.93,1.08) rotate(3deg)}
    100%{transform:scale(1.12)}
  }
  /* v0.15: 팡! 터짐 — 한 번 부풀었다가 수축 소멸 (단순 fade 아님) */
  .cell.removing{animation:popOut .17s ease-in forwards;}
  @keyframes popOut{
    0%{transform:scale(1.12);opacity:1}
    45%{transform:scale(1.30);opacity:1}
    100%{transform:scale(.15);opacity:0}
  }
  .cell.spawn{animation:drop .25s;}
  @keyframes drop{from{transform:translateY(-14px);opacity:.3}to{transform:translateY(0);opacity:1}}
  /* ---------- v0.15: 터짐 FX 레이어 (보드 위, 터치 통과, 연출 후 노드 즉시 제거) ---------- */
  #burstLayer{position:absolute;inset:0;pointer-events:none;z-index:24;overflow:hidden;border-radius:12px;}
  .fxFlash{ /* 셀 중심 속성색 섬광 */
    position:absolute;width:18px;height:18px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,var(--fc,#fff) 40%,transparent 70%);
    transform:translate(-50%,-50%) scale(.5);opacity:.9;
    animation:flashOut .22s ease-out forwards;
  }
  @keyframes flashOut{
    40%{transform:translate(-50%,-50%) scale(1.6);opacity:.85}
    100%{transform:translate(-50%,-50%) scale(2.1);opacity:0}
  }
  .fxRing{ /* 매치 그룹 중심 확산 링 — 연쇄 단계로 반경 강화(--fs) */
    position:absolute;width:14px;height:14px;border-radius:50%;
    border:2px solid var(--fc,#fff);
    transform:translate(-50%,-50%) scale(.4);opacity:.95;
    animation:ringOut .34s ease-out forwards;
  }
  @keyframes ringOut{
    to{transform:translate(-50%,-50%) scale(var(--fs,3));opacity:0}
  }
  .fxShard{ /* 스톤 파편 — transform만 사용 (GPU 합성) */
    position:absolute;width:5px;height:5px;border-radius:2px;
    background:var(--fc,#fff);
    transform:translate(-50%,-50%);opacity:.95;
    animation:shardFly .38s ease-out forwards;
  }
  @keyframes shardFly{
    to{transform:translate(calc(-50% + var(--dx,0px)),calc(-50% + var(--dy,0px))) scale(.3) rotate(200deg);opacity:0}
  }
  .fxWisp{ /* 에너지 잔상 — 파티(아래) 방향으로 흘러내리는 속성 빛 = 행동 자원 확보감 */
    position:absolute;width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,var(--fc,#fff) 55%,transparent 78%);
    transform:translate(-50%,-50%);opacity:.9;
    animation:wispDown .5s ease-in forwards;
  }
  @keyframes wispDown{
    to{transform:translate(-50%,calc(-50% + var(--wy,70px))) scale(.45);opacity:0}
  }
  /* ---------- 파티 ---------- */
  #partyArea{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 9px 9px; /* 공유 HP바 제거분 — 아바타 진영이 전부 사용 */
    position:relative;
    transition:border-color .25s, box-shadow .25s;
  }
  /* 방패 효과 활성: 파티 전체에 방어막 표시 */
  #partyArea.shielded{
    border-color:var(--gold);
    box-shadow:0 0 10px rgba(232,179,75,.4), inset 0 0 14px rgba(232,179,75,.08);
  }
  /* 아군 5인: 확대된 레고풍 아바타 무리 (v0.8: ~1.75배 + 디테일 강화) */
  #heroes{
    display:flex;justify-content:center;align-items:flex-end;
    min-height:122px;
  }
  .ally{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    margin:0 -7px;
    transition:transform .15s;
  }
  .ally:nth-child(1){z-index:1;}
  .ally:nth-child(2){z-index:2;}
  .ally:nth-child(3){z-index:3;}
  .ally:nth-child(4){z-index:2;}
  .ally:nth-child(5){z-index:1;}
  .ally:nth-child(even) .av{margin-top:6px;}
  .ally.act{z-index:9;}
  .ally.act .av{
    filter:drop-shadow(0 0 10px var(--gold)) brightness(1.3);
    transform:translateY(-8px);
  }
  .av{
    position:relative;width:76px;height:98px;
    animation:bob 2.4s ease-in-out infinite;
    transition:transform .15s, filter .2s;
  }
  .ally:nth-child(1) .av{animation-delay:0s;}
  .ally:nth-child(2) .av{animation-delay:.45s;}
  .ally:nth-child(3) .av{animation-delay:.9s;}
  .ally:nth-child(4) .av{animation-delay:.25s;}
  .ally:nth-child(5) .av{animation-delay:.65s;}
  .head{
    position:absolute;top:4px;left:50%;transform:translateX(-50%);
    width:32px;height:28px;background:#ecd2ae;border-radius:9px;z-index:2;
  }
  .torso{
    position:absolute;top:29px;left:50%;transform:translateX(-50%);
    width:46px;height:44px;border-radius:11px 11px 13px 13px;z-index:1;
  }
  .legs{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:38px;height:18px;
  }
  .legs::before,.legs::after{
    content:'';position:absolute;bottom:0;
    width:15px;height:18px;border-radius:5px 5px 6px 6px;
    background:var(--leg,#41395c);
  }

'use strict';
/* ====================== 데이터 정의 ====================== */

// v0.15: 터짐 연출 타이밍/예산 (FABLE_TASK_015)

const ACTS = {

};
const BATTLES = [

// 파티 편성: TYPES 인덱스 배열. 항목을 빼면 4인 파티 표시도 같은 코드로 대응

function aliveHeroes(){ return PARTY.filter(t=>heroHp[t] > 0); }

/* ── v0.15: 매치 터짐 FX — 팡! (섬광+링+파편+에너지 잔상), 연쇄 단계 강화 ──
   원칙: transform/opacity 애니메이션만 사용, 파편 총량 상한, 수명 후 노드 전부 제거 */
function spawnBurstFX(groups, chain){
  const layer = $('#burstLayer');
  if(!layer) return;
  const wrapR = $('#boardWrap').getBoundingClientRect();
  const tier = Math.min(chain, 3); // 1연쇄/2연쇄/3연쇄+ 3단계
  const cellCount = groups.reduce((s,g)=>s+g.cells.length, 0);
  // 파편 수: 연쇄가 높을수록 +, 단 동시 터짐이 많으면 자동 감축 (총량 ≤ FX_MAX_SHARDS)
  const perCell = Math.max(1, Math.min(2 + tier, Math.floor(FX_MAX_SHARDS / Math.max(1, cellCount))));
  const nodes = [];
  const frag = document.createDocumentFragment();
  for(const g of groups){
    const color = TYPE_COLORS[g.type] || '#fff';
    let cx = 0, cy = 0, n = 0;
    for(const i of g.cells){
      const el = document.querySelector('.cell[data-i="'+i+'"]');
      if(!el) continue;
      const r = el.getBoundingClientRect();
      const x = r.left + r.width/2 - wrapR.left;
      const y = r.top + r.height/2 - wrapR.top;
      cx += x; cy += y; n++;
      // ① 셀 중심 속성색 섬광
      const fl = document.createElement('div');
      fl.className = 'fxFlash';
      fl.style.left = x+'px'; fl.style.top = y+'px';
      fl.style.setProperty('--fc', color);
      frag.appendChild(fl); nodes.push(fl);
      // ② 스톤 파편: 무작위 방향, 연쇄일수록 멀리
      for(let s=0; s<perCell; s++){
        const sh = document.createElement('div');
        sh.className = 'fxShard';
        const ang = Math.random()*Math.PI*2;
        const dist = (16 + Math.random()*14) * (1 + tier*0.25);
        sh.style.left = x+'px'; sh.style.top = y+'px';
        sh.style.setProperty('--fc', color);
        sh.style.setProperty('--dx', (Math.cos(ang)*dist)+'px');
        sh.style.setProperty('--dy', (Math.sin(ang)*dist)+'px');
        frag.appendChild(sh); nodes.push(sh);
      }
    }
    if(n > 0){
      cx /= n; cy /= n;
      // ③ 그룹 중심 확산 링: 연쇄 단계로 반경 강화
      const ring = document.createElement('div');
      ring.className = 'fxRing';
      ring.style.left = cx+'px'; ring.style.top = cy+'px';
      ring.style.setProperty('--fc', color);
      ring.style.setProperty('--fs', (2.6 + tier*1.1).toFixed(2));
      frag.appendChild(ring); nodes.push(ring);
      // ④ 에너지 잔상: 보드 하단(파티 방향)으로 흘러내림 — 행동 자원 확보감
      const w = document.createElement('div');
      w.className = 'fxWisp';
      w.style.left = cx+'px'; w.style.top = cy+'px';
      w.style.setProperty('--fc', color);
      w.style.setProperty('--wy', Math.max(40, wrapR.height - cy - 8)+'px');
      frag.appendChild(w); nodes.push(w);
    }
  }
  layer.appendChild(frag);
  // 이번 호출분만 제거 (다음 연쇄 FX와 간섭 없음) — DOM 누적 방지
  setTimeout(()=>{ nodes.forEach(nd=>nd.remove()); }, FX_LIFE_MS);
}

/* ── 행동선: 하단 영웅 → 퍼즐판 침범 → 상단 적 ── */
// 영웅 칩 참조: 블록 타입 ID → PARTY 내 위치로 변환 (편성 유연화 대응)
function heroChipEl(typeId){
  const pos = PARTY.indexOf(typeId);
  return pos >= 0 ? ($('#heroes').children[pos] || null) : null;
}

// 요소 중심 좌표 (#app 기준 px)
function centerOf(el){
  const a = $('#app').getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return [r.left + r.width/2 - a.left, r.top + r.height/2 - a.top];
}

// SVG 행동선: 짧게 그려졌다 사라진다. 레이어는 pointer-events:none
function drawLine(fromEl, toEl, color, dashed){
  const fx = $('#fxLayer');
  if(!fromEl || !toEl) return;
  // 연쇄 폭주 시 행동선 과밀 방지: 최대 10개 유지
  while(fx.children.length >= 10) fx.removeChild(fx.firstChild);
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const [x1,y1] = centerOf(fromEl);
  const [x2,y2] = centerOf(toEl);
  const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
  ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
  ln.setAttribute('stroke',color);
  ln.setAttribute('stroke-width','3');
  ln.setAttribute('stroke-linecap','round');
  ln.setAttribute('opacity','0.85');
  const len = Math.hypot(x2-x1, y2-y1);
  if(dashed){
    ln.setAttribute('stroke-dasharray','7 6'); // 궁수: 점선 관통
  }else{
    ln.setAttribute('stroke-dasharray', len);
    ln.setAttribute('stroke-dashoffset', len);
    ln.animate([{strokeDashoffset:len},{strokeDashoffset:0}], {duration:200, fill:'forwards'});
  }
  fx.appendChild(ln);
  ln.animate([{opacity:.85},{opacity:0}], {duration:250, delay:280, fill:'forwards'});
  setTimeout(()=>ln.remove(), 560); // 짧게 사라짐 — 다음 조작 방해 금지
}

/* ══ 행동선 문법 (v0.12) ══
   기본 공격선  = drawStrikeLine : 직선/완만한 곡선 — 빠르고 명확
   점선 행동선  = drawAimLine    : 예고/조준/집중 — 느린 맥동, 피해 없음
   번개형      = drawBoltLine   : 특수 스킬 전용 (마왕의 균열 등) — 지그재그 ══ */

/* ── 기본 공격선: 완만한 2차 곡선 (스킬처럼 보이지 않는 단순 타격) ── */
function drawStrikeLine(fromEl, toEl, color, blocked){
  const fx = $('#fxLayer');
  if(!fromEl || !toEl) return;
  while(fx.children.length >= 12) fx.removeChild(fx.firstChild);
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const [x1,y1] = centerOf(fromEl);
  const [x2,y2] = centerOf(toEl);
  // 중점에서 수직 방향으로 살짝 휘는 고정 곡률 (지터 없음 — 기본기다움)
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const dx = x2-x1, dy = y2-y1;
  const len0 = Math.hypot(dx,dy) || 1;
  const bend = 14; // 완만한 곡률
  const cx = mx + (-dy/len0)*bend;
  const cy = my + (dx/len0)*bend;
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', 'M'+x1.toFixed(1)+','+y1.toFixed(1)+' Q'+cx.toFixed(1)+','+cy.toFixed(1)+' '+x2.toFixed(1)+','+y2.toFixed(1));
  p.setAttribute('fill','none');
  p.setAttribute('stroke', blocked ? '#d87a8a' : (color || '#e0504a'));
  p.setAttribute('stroke-width','3.5');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('opacity','0.95');
  fx.appendChild(p);
  const len = p.getTotalLength();
  p.setAttribute('stroke-dasharray', len);
  p.setAttribute('stroke-dashoffset', len);
  p.animate([{strokeDashoffset:len},{strokeDashoffset:0}], {duration:150, fill:'forwards'});
  p.animate([{opacity:.95},{opacity:0}], {duration:200, delay:200, fill:'forwards'});
  setTimeout(()=>p.remove(), 430); // 빠르게 소멸 — 실시간 템포 보호
}

/* ── 점선 행동선: 예고/조준 (피해 미발생을 맥동으로 표현, 호출자가 제거 책임) ── */

/* ── 번개형 행동선: 특수 스킬 전용 (현재 사용처: 마왕의 균열 일격) ── */
function drawBoltLine(fromEl, toEl, blocked){
  const fx = $('#fxLayer');
  if(!fromEl || !toEl) return;
  while(fx.children.length >= 10) fx.removeChild(fx.firstChild);
  const app = $('#app');
  fx.setAttribute('width', app.clientWidth);
  fx.setAttribute('height', app.clientHeight);
  const [x1,y1] = centerOf(fromEl);
  const [x2,y2] = centerOf(toEl);
  // 중간점 2개에 좌우 지터 → 찢는 듯한 번개 형태
  const pts = [[x1,y1]];
  for(let k=1; k<=2; k++){
    const t = k/3;
    pts.push([
      x1 + (x2-x1)*t + (Math.random()*28 - 14),
      y1 + (y2-y1)*t + (Math.random()*16 - 8)
    ]);
  }
  pts.push([x2,y2]);
  const pl = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  pl.setAttribute('points', pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' '));
  pl.setAttribute('fill','none');
  pl.setAttribute('stroke', blocked ? '#d87a8a' : '#e0504a'); // 위협적 적색 계열
  pl.setAttribute('stroke-width','3.5');
  pl.setAttribute('stroke-linejoin','round');
  pl.setAttribute('stroke-linecap','round');
  pl.setAttribute('opacity','0.95');
  fx.appendChild(pl);
  const len = pl.getTotalLength();
  pl.setAttribute('stroke-dasharray', len);
  pl.setAttribute('stroke-dashoffset', len);
  pl.animate([{strokeDashoffset:len},{strokeDashoffset:0}], {duration:170, fill:'forwards'});
  pl.animate([{opacity:.95},{opacity:0}], {duration:220, delay:250, fill:'forwards'});
  setTimeout(()=>pl.remove(), 500); // 0.5초 내 소멸 — 보드를 가리지 않음
}

/* ====================== 보드 생성/판정 ====================== */
function genBoard(){
  const b = new Array(ROWS*COLS);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let t;
      do{
        t = rand(TYPES.length);
      }while(
        (c>=2 && b[idx(r,c-1)]===t && b[idx(r,c-2)]===t) ||
        (r>=2 && b[idx(r-1,c)]===t && b[idx(r-2,c)]===t)
      );
      b[idx(r,c)] = t;
    }
  }
  return b;
}

// 매치된 셀 집합 반환
function findMatchedCells(b){
  const matched = new Set();
  // 가로
  for(let r=0;r<ROWS;r++){
    let run=1;
    for(let c=1;c<=COLS;c++){
      if(c<COLS && b[idx(r,c)]!==null && b[idx(r,c)]===b[idx(r,c-1)]) run++;
      else{
        if(run>=3 && b[idx(r,c-1)]!==null)
          for(let k=c-run;k<c;k++) matched.add(idx(r,k));
        run=1;
      }
    }
  }
  // 세로
  for(let c=0;c<COLS;c++){
    let run=1;
    for(let r=1;r<=ROWS;r++){
      if(r<ROWS && b[idx(r,c)]!==null && b[idx(r,c)]===b[idx(r-1,c)]) run++;
      else{
        if(run>=3 && b[idx(r-1,c)]!==null)
          for(let k=r-run;k<r;k++) matched.add(idx(k,c));
        run=1;
      }
    }
  }
  return matched;
}

// 매치 셀을 같은 타입 연결 그룹으로 묶기 (L/T 모양은 하나의 그룹 = 더 큰 행동)
function findMatchGroups(b){
  const matched = findMatchedCells(b);
  const visited = new Set();
  const groups = [];
  for(const start of matched){
    if(visited.has(start)) continue;
    const type = b[start];
    const cells = [];
    const stack = [start];
    visited.add(start);
    while(stack.length){
      const i = stack.pop();
      cells.push(i);
      const [r,c] = rc(i);
      [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
        const ni = idx(nr,nc);
        if(matched.has(ni) && !visited.has(ni) && b[ni]===type){
          visited.add(ni);
          stack.push(ni);
        }
      });
    }
    groups.push({type, cells});
  }
  return groups;
}

function hasValidMove(b){
  const test = b.slice();
  const trySwap = (a,bI)=>{
    [test[a],test[bI]] = [test[bI],test[a]];
    const ok = findMatchedCells(test).size>0;
    [test[a],test[bI]] = [test[bI],test[a]];
    return ok;
  };
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(c<COLS-1 && trySwap(idx(r,c), idx(r,c+1))) return true;
      if(r<ROWS-1 && trySwap(idx(r,c), idx(r+1,c))) return true;
    }
  }
  return false;
}

function ensurePlayable(){
  if(!hasValidMove(board)){
    board = genBoard();
    addLog('교환 가능한 블록이 없어 보드를 재배열했다.', 'sys');
    renderBoard();
  }
}

  if(kind==='elite')  return '<div class="mAv"><div class="eHelm"></div><div class="gHead"></div><div class="eTorso"></div><div class="eBlade"></div></div>';

function renderEnemies(hitIdx, hitAll){
  const area = $('#enemyArea');
  area.innerHTML = '';
  area.classList.remove('showcase');
  const mk = (e,i)=>{
    const d = document.createElement('div');
    d.className = 'mob kind-'+e.kind
      + (e.hp<=0?' dead':'')
      + ((hitIdx===i || (hitAll && e.hp>0))?' hit':'')
      + (e.charging?' charge':'');
    d.dataset.ei = i; // 진영(전열/후열) 분리 후에도 인덱스로 추적
    const pct = Math.max(0, e.hp/e.maxHp*100);
    d.innerHTML =
      (e.charging ? '<div class="intent">⚡ 강공 준비</div>' : '') +
      monsterAvatar(e.kind) +
      '<div class="mini"><i style="width:'+pct+'%"></i></div>' +
      '<div class="gauge"><i style="width:'+Math.min(100, e.gauge||0)+'%"></i></div>';
    return d;
  };
  // 3열: 후후열(위, 가장 작게) → 중간열 → 전열(아래, 크게)
  const back = document.createElement('div'); back.className = 'rowBack';
  const mid = document.createElement('div'); mid.className = 'rowMid';
  const front = document.createElement('div'); front.className = 'rowFront';
  enemies.forEach((e,i)=>{
    (e.row==='back' ? back : e.row==='mid' ? mid : front).appendChild(mk(e,i));
  });
  if(back.children.length) area.appendChild(back);
  if(mid.children.length) area.appendChild(mid);
  area.appendChild(front);
  // 마법사 집중 중이면 원형 파동 예고 표시
  if(mageCharge){
    const pre = document.createElement('div');
    pre.className = 'wavePre';
    area.appendChild(pre);
  }
}

/* ====================== 전투 로직 ====================== */
function aliveEnemies(){ return enemies.filter(e=>e.hp>0); }

function queueAction(type, size, chain){
  const tier = size>=5 ? 3 : size===4 ? 2 : 1;
  const mult = 1 + CHAIN_BONUS*(chain-1);
  actionQueue.push({type, tier, mult, chain});
}

// 행동 대기 배지 갱신 (R&D 표시)
function updateQueueBadge(){
  const b = $('#queueBadge');
  const n = actionQueue.length;
  if(n>0){ b.style.display='block'; b.textContent='행동 대기 '+n; }
  else b.style.display='none';
}

// 영웅 행동 1건 실행 (연출 포함) — 실행 시점에 대상 생존 재확인
async function performHeroAction(a){
    if(aliveEnemies().length===0 && ACTS[a.type][a.tier].dmg) return;
    renderParty(a.type); // 행동하는 영웅 칩 강조 (act 클래스)
    const spec = ACTS[a.type][a.tier];

    if(a.type===0){ // 전사: 선두 단일 공격 — 대상이 흔들리고 피해 수치가 뜬다
      const tgt = aliveEnemies()[0];
      if(tgt){
        const dmg = Math.round(spec.dmg * a.mult);
        tgt.hp -= dmg;
        renderEnemies(enemies.indexOf(tgt)); // 일반 피해: 플로팅+행동선으로 전달
        drawLine(heroChipEl(0), enemyEl(enemies.indexOf(tgt)), '#aebcdc'); // 전사: 퍼즐판 관통 행동선
        floatText(enemyEl(enemies.indexOf(tgt)), '-'+dmg, 'dmg');
        if(tgt.hp<=0) addLog(tgt.name+' 처치!', 'gold');
      }
    }
    else if(a.type===1){ // 마법사 v0.8: 집중 → 예고 → 원형 파동 (직업 개성 1차 프로토타입)
      const targets = aliveEnemies();
      if(mageCharge){
        // 집중 해방: 비축 마력 + 현재 위력의 원형 파동
        const dmg = mageCharge.dmg + Math.round(spec.dmg * a.mult);
        mageCharge = null;
        drawWave(); // 원형 확산 폭발 연출
        targets.forEach(e=>{ e.hp -= dmg; });
        banner('💥 원형 파동! 모든 적에게 '+dmg+' 피해', 'boss');
        addLog('원형 파동! 모든 적에게 '+dmg+' 피해', 'gold');
        renderEnemies(null, true);
        targets.forEach(e=>{
          floatText(enemyEl(enemies.indexOf(e)), '-'+dmg, 'dmg');
          if(e.hp<=0) addLog(e.name+' 처치!', 'gold');
        });
      } else if(a.tier >= 2){
        // 4매치 이상: 즉시 공격 대신 집중 (마력 비축)
        mageCharge = { dmg: Math.round(spec.dmg * a.mult) };
        banner('🔮 마법사 집중! 다음 불꽃 매치에 원형 파동', 'shield');
        addLog('마법사가 마력을 모은다... ('+spec.label+' 비축 '+mageCharge.dmg+')', 'gold');
        renderParty(a.type);   // 집중 링 표시
        renderEnemies();       // 적 진영에 예고 원 표시
        floatText(heroChipEl(1), '🔮 집중', 'guard');
      } else {
        // 3매치: 기존 즉시 광역
        const dmg = Math.round(spec.dmg * a.mult);
        targets.forEach(e=>{ e.hp -= dmg; });
        renderEnemies(null, true); // 일반 광역: 플로팅으로 전달
        targets.forEach(e=>{
          drawLine(heroChipEl(1), enemyEl(enemies.indexOf(e)), '#e0633e');
          floatText(enemyEl(enemies.indexOf(e)), '-'+dmg, 'dmg');
          if(e.hp<=0) addLog(e.name+' 처치!', 'gold');
        });
      }
    }
    else if(a.type===2){ // 사제 v0.9: HP 비율이 가장 낮은 아군 우선 회복
      const heal = Math.round(spec.heal * a.mult);
      const alive = aliveHeroes();
      if(alive.length){
        const tgt = alive.reduce((m,t)=>
          (heroHp[t]/HERO_MAX[t]) < (heroHp[m]/HERO_MAX[m]) ? t : m, alive[0]);
        const before = heroHp[tgt];
        heroHp[tgt] = Math.min(HERO_MAX[tgt], heroHp[tgt] + heal);
        const gained = heroHp[tgt] - before;
        renderParty(a.type); // 회복: 대상 플로팅+회복선으로 전달
        drawLine(heroChipEl(2), heroChipEl(tgt), '#58b878'); // 회복선: 사제 → 회복 대상 영웅
        floatText(heroChipEl(tgt), '+'+gained, 'heal');      // 누가 회복되었는지 직접 표시
      }
    }
    else if(a.type===3){ // 수호자: 피해 감소 — v0.12: 6초 지속 창 (실시간 대응)
      shieldRed = Math.max(shieldRed, spec.red);
      shieldUntil = Date.now() + SHIELD_MS;
      if(spec.counter){
        shieldCounter = Math.max(shieldCounter, Math.round(spec.counter * a.mult));
      }
      // 방어 상태는 배지("방어 중 · N% 감소")+황금 링이 상시 전달 — 토스트 X
      renderParty(a.type); // shielded 외곽선 즉시 반영
      drawGuardRing(); // 임시 정책: 보호는 "파티 전체" — 링이 진영을 감싼다
      floatText(heroChipEl(3), '🛡 방어', 'guard');
    }
    else if(a.type===4){ // 궁수: 최저 HP 적 저격 — 표식 + 타격 반응
      const pool = aliveEnemies();
      const tgt = pool.length ? pool.reduce((m,e)=> e.hp<m.hp ? e : m, pool[0]) : null;
      if(tgt){
        const dmg = Math.round(spec.dmg * a.mult);
        tgt.hp -= dmg;
        renderEnemies(enemies.indexOf(tgt)); // 일반 피해: 플로팅+점선으로 전달
        drawLine(heroChipEl(4), enemyEl(enemies.indexOf(tgt)), '#b48ae0', true); // 궁수: 점선 관통선
        floatText(enemyEl(enemies.indexOf(tgt)), '🎯 -'+dmg, 'dmg');
        if(tgt.hp<=0) addLog(tgt.name+' 처치!', 'gold');
      }
    }
}

/* ── 영웅 행동 큐 프로세서 (v0.13): 보드와 독립 — 조작을 막지 않는다 ──
   매치가 만든 행동을 0.45초 간격으로 순차 재생. 큐 실행 중 새 매치 → 뒤에 이어 쌓임 */
const HERO_ACTION_GAP = 450; // 0.4~0.55초 권장 범위
async function processHeroActions(){
  if(heroQueueBusy) return;
  heroQueueBusy = true;
  while(actionQueue.length){
    if(state==='over'){ actionQueue = []; break; } // 승리/패배 후 결과 뒤집기 방지
    const a = actionQueue.shift();
    updateQueueBadge();
    await performHeroAction(a);
    if(aliveEnemies().length===0){
      actionQueue = [];
      updateQueueBadge();
      heroQueueBusy = false;
      await onBattleWon();
      return;
    }
    await delay(HERO_ACTION_GAP);
  }
  heroQueueBusy = false;
  updateQueueBadge();
  renderParty(); // act 강조 클래스 해제 (행동 종료)
}

// 적 공격 대상 선정 (임시 우선순위): 수호자 생존 → 전사 생존 → 최저 HP 생존 영웅
// 향후 몬스터별 타겟팅으로 확장 가능하도록 단일 지점으로 분리
function pickDefender(){
  const alive = aliveHeroes();
  if(!alive.length) return null;
  if(heroHp[3] > 0) return 3; // 수호자
  if(heroHp[0] > 0) return 0; // 전사
  return alive.reduce((m,t)=> heroHp[t]<heroHp[m] ? t : m, alive[0]);
}

/* ══ 실시간 행동 게이지 엔진 (v0.12) ══
   - 100ms 틱: 게이지 증가, 만충 시 공격 큐 투입
   - 큐는 150ms 간격으로 순차 처리 (다수전 연출 폭주 방지)
   - 게이지는 퍼즐 해소 중에도 계속 흐른다 (전장이 멈추지 않음)
   - 정지 조건: 승리/패배/전환(state==='over'), 쇼케이스 표시 중 ══ */
const TICK_MS = 100;
const SHIELD_MS = 6000;     // v0.12 임시: 방패 효과는 6초 지속 (페이즈 개념 소멸로 시간제 전환)
const BOSS_PREP_MS = 2600;  // 마왕 강공 준비 시간 — 방패 블록을 찾을 여유
const SPEEDS = {slime:9, goblin:12, bat:17, elite:8, boss:11}; // %/초 (임시값)

let shieldUntil = 0;
let attackQueue = [];
let attackBusy = false;

function queueAttack(e, big){
  attackQueue.push({e, big});
  processAttacks();
}

async function processAttacks(){
  if(attackBusy) return;
  attackBusy = true;
  while(attackQueue.length){
    const job = attackQueue.shift();
    if(state==='over') break;
    if(job.e.hp<=0) continue;
    if(aliveHeroes().length===0) break;
    if(job.big) await bossBigAttack(job.e);
    else await enemyAttack(job.e);
    await delay(150); // 동시 만충 시 짧은 시차 처리
  }
  attackBusy = false;
}

// 일반 공격: 완만한 곡선 타격선 → 임팩트 → 개별 피해
async function enemyAttack(e){
  const ei = enemies.indexOf(e);
  const tgt = pickDefender();
  if(tgt===null) return;
  const raw = e.atk;
  const eff = Math.round(raw * (1 - shieldRed));
  const blocked = shieldRed>0 && eff<raw;
  drawStrikeLine(enemyEl(ei), heroChipEl(tgt), '#e0504a', blocked);
  await delay(160);
  if(blocked) drawBlockFlash(heroChipEl(tgt));
  const prevHp = heroHp[tgt];
  heroHp[tgt] -= eff;
  if(prevHp > 0 && heroHp[tgt] <= 0) addLog('💔 '+TYPES[tgt].hero+'이(가) 쓰러졌다!', 'boss'); // 강한 정보
  // 일반 피해/막힘: 대상 플로팅("-N" / "🛡 raw→eff")이 전달 — 토스트 X
  renderParty();
  hurtHero(tgt);
  floatText(heroChipEl(tgt), blocked ? '🛡 '+raw+'→'+eff : '-'+eff, blocked?'guard':'dmg');
  if(shieldCounter>0){
    e.hp -= shieldCounter;
    renderEnemies(enemies.indexOf(e));
    floatText(enemyEl(enemies.indexOf(e)), '⚔ -'+shieldCounter, 'guard'); // 반격: 플로팅
    if(e.hp<=0){
      addLog(e.name+' 처치!', 'gold');
      if(aliveEnemies().length===0){ await onBattleWon(); return; }
    }
  }
  if(aliveHeroes().length===0){
    clearAimLines();
    onDefeat();
  }
}

// 마왕 강공 준비: 점선 조준선(전원) + 붉은 펄스 — 보고 대응하는 공격
function startBossPrep(e){
  e.charging = true;
  e.prepEnd = Date.now() + BOSS_PREP_MS;
  banner('😈 미니 마왕이 어둠을 모은다!', 'boss');
  addLog('미니 마왕이 어둠을 모은다. 강공이 온다 — 방패를!', 'boss');
  renderEnemies();
  const ei = enemies.indexOf(e);
  aliveHeroes().forEach(t=>drawAimLine(enemyEl(ei), heroChipEl(t), '#d8554a'));
}

// 마왕 강공 (C안 유지): 암흑 파동 + 전원 균열 번개 — 번개형은 특수 스킬 전용 문법
async function bossBigAttack(e){
  clearAimLines();
  const ei = enemies.indexOf(e);
  const eff = Math.round(BOSS_BIG_EACH * (1 - shieldRed));
  const blocked = shieldRed>0 && eff<BOSS_BIG_EACH;
  banner(blocked
    ? '🛡 수호자의 방패! 전원 '+BOSS_BIG_EACH+' → '+eff
    : '💢 마왕의 균열 일격! 전원 '+eff+' 피해', blocked?'shield':'boss');
  drawDarkWave(enemyEl(ei));
  const hitList = aliveHeroes();
  hitList.forEach((t,k)=>{
    setTimeout(()=>drawBoltLine(enemyEl(ei), heroChipEl(t), blocked), k*45);
  });
  await delay(300);
  hitList.forEach(t=>{
    const prev = heroHp[t];
    heroHp[t] -= eff;
    if(prev > 0 && heroHp[t] <= 0) addLog('💔 '+TYPES[t].hero+'이(가) 쓰러졌다!', 'boss');
  });
  addLog(blocked
    ? '수호자의 방패! 마왕의 일격, 전원 '+BOSS_BIG_EACH+' 피해가 '+eff+'로 감소.'
    : '마왕의 일격! 생존 영웅 전원에게 '+eff+' 피해!', blocked?'shield':'boss');
  renderParty();
  hitList.forEach(t=>{
    hurtHero(t);
    if(blocked) drawBlockFlash(heroChipEl(t));
    floatText(heroChipEl(t), blocked ? '🛡 '+BOSS_BIG_EACH+'→'+eff : '-'+eff, blocked?'guard':'dmg');
  });
  if(shieldCounter>0){
    e.hp -= shieldCounter;
    renderEnemies(ei);
    floatText(enemyEl(ei), '⚔ -'+shieldCounter, 'guard'); // 반격: 플로팅
    if(e.hp<=0){
      addLog(e.name+' 처치!', 'gold');
      if(aliveEnemies().length===0){ await onBattleWon(); return; }
    }
  }
  if(aliveHeroes().length===0){
    clearAimLines();
    onDefeat();
  }
}

// 게이지 UI 증분 갱신 (재렌더 없이 width/클래스만 — idle 애니메이션 보존, 부하 최소)
function updateGauges(){
  enemies.forEach((e,i)=>{
    const el = enemyEl(i);
    if(!el) return;
    const g = el.querySelector('.gauge i');
    if(g) g.style.width = Math.min(100, e.gauge||0) + '%';
    el.classList.toggle('ready', e.hp>0 && !e.charging && (e.gauge||0) >= 85);
  });
}

// 메인 틱: 게이지 진행/방패 만료/공격 트리거
function tick(){
  if(state==='over' || showcase) return; // 승리/패배/전환·쇼케이스 중 정지
  const now = Date.now();
  if(shieldRed>0 && now >= shieldUntil){
    shieldRed = 0; shieldCounter = 0;
    renderParty();
  }
  for(const e of enemies){
    if(e.hp<=0) continue;
    if(e.boss && e.charging){
      if(now >= e.prepEnd){
        e.charging = false;
        e.gauge = 0;
        renderEnemies();
        queueAttack(e, true);
      }
      continue;
    }
    e.gauge = (e.gauge||0) + e.speed * (TICK_MS/1000); // speed = %/초 → 틱당 speed×0.1
    if(e.gauge >= 100){
      if(e.boss){
        bossTurn++;
        if(bossTurn % 3 === 0){ e.gauge = 100; startBossPrep(e); continue; }
      }
      e.gauge = 0;
      queueAttack(e, false);
    }
  }
  updateGauges();
}
setInterval(tick, TICK_MS);

/* ====================== 진행 흐름 ====================== */
async function resolveBoard(){
  let chain = 0;
  while(true){
    const groups = findMatchGroups(board);
    if(groups.length===0) break;
    chain++;
    // 매치/연쇄 정보: 보드 위 플로팅 + 티커 (로그 패널 없음)
    let slot = 0;
    if(chain>1){
      const txt = chain+'연쇄! 위력 +'+Math.round(CHAIN_BONUS*100*(chain-1))+'%';
      floatBoard(txt, 'gold chainPop', slot++); // v0.15: 연쇄는 바운스 팝
    }
    for(const g of groups){
      queueAction(g.type, g.cells.length, chain);
      const t = TYPES[g.type];
      const txt = t.sym+' '+t.block+' 문장 '+g.cells.length+'개!';
      floatBoard(txt, 'sys', slot++, TYPE_COLORS[g.type]); // v0.15: 속성색 발광 — 힘 확보감
    }

    // 삭제 연출 (v0.15): ① 응축 반응(primed) → ② 팡 터짐(removing + 버스트 FX)
    const removeSet = new Set();
    groups.forEach(g=>g.cells.forEach(c=>removeSet.add(c)));
    const matchedEls = [];
    document.querySelectorAll('.cell').forEach(c=>{
      if(removeSet.has(+c.dataset.i)) matchedEls.push(c);
    });
    matchedEls.forEach(c=>c.classList.add('primed'));
    await delay(PRIME_MS);
    spawnBurstFX(groups, chain);              // 좌표는 셀 삭제 전에 채취
    matchedEls.forEach(c=>c.classList.add('removing'));
    await delay(POP_MS);

    // 삭제 → 낙하 → 생성
    removeSet.forEach(i=>{ board[i]=null; });
    const spawnSet = new Set();
    for(let c=0;c<COLS;c++){
      let write = ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(board[idx(r,c)]!==null){
          board[idx(write,c)] = board[idx(r,c)];
          if(write!==r) board[idx(r,c)] = null;
          write--;
        }
      }
      for(let r=write;r>=0;r--){
        board[idx(r,c)] = rand(TYPES.length);
        spawnSet.add(idx(r,c));
      }
    }
    renderBoard(spawnSet);
    await delay(260);
  }

  // 보드 안정: 즉시 조작 해제 (v0.13 핵심 — 연출이 손을 막지 않는다)
  boardBusy = false;
  sel = null;
  ensurePlayable();
  updateQueueBadge();
  processHeroActions(); // 영웅 행동은 뒤에서 순차 재생 (비차단)
}

async function onBattleWon(){
  if(state==='over') return; // 영웅 큐/몬스터 큐 동시 도달 시 중복 방지
  state = 'over';            // 즉시 게이지/큐 정지
  attackQueue = [];
  actionQueue = [];
  updateQueueBadge();
  clearAimLines();
  addLog('── '+BATTLES[battleIdx].label+' 승리! ──', 'gold');
  await delay(500);
  if(battleIdx >= BATTLES.length-1){
    showOverlay('전체 클리어!', '마왕을 물리쳤다. 다섯 영웅의 모험은 계속된다...', '처음부터 다시', resetGame);
    return;
  }
  // 승리 회복 (v0.9 임시): 영웅 전원 각자 +15, 각자 최대 HP 초과 불가
  // 쓰러진 영웅도 회복 — 사망/봉인 시스템 미도입이므로 다음 전투 참여 보장
  PARTY.forEach(t=>{
    heroHp[t] = Math.min(HERO_MAX[t], Math.max(0, heroHp[t]) + VICTORY_HEAL);
  });
  addLog('전투 승리! 파티가 숨을 고르며 각자 HP '+VICTORY_HEAL+' 회복.', 'good');
  renderParty();
  PARTY.forEach(t=>floatText(heroChipEl(t), '+', 'heal'));
  showOverlay('승리!',
    BATTLES[battleIdx].label+'을(를) 돌파했다.\n파티가 숨을 고르며 각자 HP '+VICTORY_HEAL+' 회복.',
    '다음 전투 ▶', ()=>{
    battleIdx++;
    setupBattle();
    state = 'idle';
  });
}

function onDefeat(){
  if(state==='over') return;
  state = 'over';
  attackQueue = [];
  actionQueue = [];
  updateQueueBadge();
  clearAimLines();
  addLog('파티가 쓰러졌다...', 'bad');
  showOverlay('패배', '파티의 HP가 0이 되었다.\n블록을 다시 모아 도전하자.', '다시 시작', resetGame);
}

function setupBattle(){
  // 실시간 게이지: 종별 속도 부여 + 0~35% 무작위 시차 (동시 만충 방지)
  enemies = BATTLES[battleIdx].enemies.map(e=>({
    ...e, hp:e.maxHp, charging:false,
    speed: SPEEDS[e.kind] || 10,
    gauge: Math.random()*35,
  }));
  attackQueue = [];
  actionQueue = [];
  boardBusy = false;
  updateQueueBadge();
  clearAimLines();
  shieldUntil = 0;
  bossTurn = 0;
  shieldRed = 0;
  shieldCounter = 0;
  mageCharge = null; // 전투 간 집중 미이월
  showcase = false;
  $('#showcaseBtn').textContent = '👁 진형';
  board = genBoard();
  if(!hasValidMove(board)) board = genBoard();
  sel = null;
  addLog('═══ '+BATTLES[battleIdx].label+' 시작 ═══', 'gold');
  enemies.forEach(e=>addLog(e.name+' 등장! (HP '+e.maxHp+')', 'sys'));
  renderAll();
}

function showOverlay(title, text, btnLabel, onClick){
  $('#ovTitle').textContent = title;
  $('#ovText').textContent = text;
  $('#ovBtn').textContent = btnLabel;
  $('#ovBtn').onclick = ()=>{ hideOverlay(); onClick(); };
  $('#overlay').classList.add('show');
}
function hideOverlay(){ $('#overlay').classList.remove('show'); }

function resetGame(){
  battleIdx = 0;
  initHeroHp(); // 영웅별 HP 초기화 (전투 간에는 이월)
  actionQueue = [];
  $('#ticker').innerHTML = '';
  $('#banner').className = '';
  addLog('Emblem Quest Lab — 블록을 맞춰 영웅을 움직여라!', 'gold');
  addLog('블록을 탭해 선택하고, 인접한 블록을 탭해 교환한다.', 'sys');
  setupBattle();
  state = 'idle';
}

/* ====================== 입력 ====================== */
function adjacent(a,b){
  const [r1,c1]=rc(a), [r2,c2]=rc(b);
  return Math.abs(r1-r2)+Math.abs(c1-c2)===1;
}

async function trySwap(a,b){
  if(showcase){ showcase = false; $('#showcaseBtn').textContent = '👁 진형'; renderEnemies(); }
  boardBusy = true; // 보드 변형 시작 — 교환/삭제/낙하/연쇄 동안만 잠금
  [board[a],board[b]] = [board[b],board[a]];
  sel = null;
  renderBoard();
  await delay(170);
  if(findMatchedCells(board).size===0){
    [board[a],board[b]] = [board[b],board[a]];
    renderBoard();
    await delay(150);
    boardBusy = false;
    return;
  }
  await resolveBoard();
}

// 탭-탭 교환 (fallback): 블록 선택 → 인접 블록 선택
function tapCell(i){
  if(!canPlay()) return;
  if(sel===null){
    sel = i; renderBoard();
  }else if(sel===i){
    sel = null; renderBoard();
  }else if(adjacent(sel,i)){
    trySwap(sel,i);
  }else{
    sel = i; renderBoard();
  }
}

/* ── 스와이프 교환: 누르고 → 밀면 → 가장 큰 방향으로 인접 교환 ── */
const SWIPE_DIST = 18; // 판정 거리(px)

// 스와이프 방향 판정: 큰 축 우선. 보드 밖이면 null (무시)
function swipeTarget(i, dx, dy){
  const dir = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? [0,1] : [0,-1])
    : (dy > 0 ? [1,0] : [-1,0]);
  const [r,c] = rc(i);
  const nr = r + dir[0], nc = c + dir[1];
  if(nr<0 || nr>=ROWS || nc<0 || nc>=COLS) return null; // 보드 밖 스와이프 무시
  return idx(nr,nc);
}

let drag = null;
const boardEl = $('#board');

boardEl.addEventListener('pointerdown', e=>{
  const cell = e.target.closest('.cell');
  if(!cell || !canPlay()) return;
  drag = { i:+cell.dataset.i, x:e.clientX, y:e.clientY, swiped:false };
});

boardEl.addEventListener('pointermove', e=>{
  if(!drag || drag.swiped || !canPlay()) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if(Math.hypot(dx,dy) < SWIPE_DIST) return;
  drag.swiped = true; // 한 번의 스와이프 = 한 번의 교환
  const target = swipeTarget(drag.i, dx, dy);
  if(target===null){ drag = null; return; }
  sel = null;
  trySwap(drag.i, target); // 매치 없으면 trySwap이 자동 복귀
  drag = null;
});

boardEl.addEventListener('pointerup', e=>{
  if(!drag) return;
  const moved = Math.hypot(e.clientX - drag.x, e.clientY - drag.y);
  const i = drag.i;
  drag = null;
  if(moved < 10 && canPlay()) tapCell(i); // 거의 안 움직였으면 탭으로 처리
});

boardEl.addEventListener('pointercancel', ()=>{ drag = null; });

$('#showcaseBtn').addEventListener('click', ()=>{
  if((boardBusy || state==='over') && !showcase) return;
  showcase = !showcase;
  if(showcase){
    renderShowcase();
    banner('👁 수용력 쇼케이스 — 3열 × 6 (18체)', '');
    $('#showcaseBtn').textContent = '↩ 전투';
  }else{
    renderEnemies();
    $('#showcaseBtn').textContent = '👁 진형';
  }
});

$('#restartBtn').addEventListener('click', ()=>{
  if(boardBusy) return;
  hideOverlay();
  attackQueue = [];
  clearAimLines();
  resetGame();
});

/* ====================== 시작 ====================== */
resetGame();
</script>
